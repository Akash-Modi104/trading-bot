# /etc/logrotate.d/trading-bot
# Install with:
#   sudo cp server/logrotate.conf /etc/logrotate.d/trading-bot
#   sudo logrotate -d /etc/logrotate.d/trading-bot   # dry-run check
#   sudo logrotate -f /etc/logrotate.d/trading-bot   # force first rotation

/var/log/dashboard.log
/var/log/dashboard.err.log
/var/log/scanner.log
/var/log/scanner.err.log
/var/log/tradingbot.log
/var/log/tradingbot.err.log
/var/log/open-webui.out.log
/var/log/open-webui.err.log
{
    daily
    rotate 14
    maxsize 50M
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    # copytruncate avoids needing to signal supervisor — works because Python uses
    # standard buffered file writes; the file handle keeps writing to the truncated file.
}
