# AlgoTrader — Nginx reverse proxy config
# Place at: /etc/nginx/sites-available/algotrader
# Then: ln -sf /etc/nginx/sites-available/algotrader /etc/nginx/sites-enabled/
#       rm -f /etc/nginx/sites-enabled/default
#       nginx -t && systemctl reload nginx

upstream algotrader {
    server 127.0.0.1:5001;
    keepalive 8;
}

# Redirect HTTP → HTTPS (only active after SSL is configured)
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt ACME challenge — must stay on HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS when SSL cert exists
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — filled in by ssl_setup.sh
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # SSL certs (ssl_setup.sh sets these)
    ssl_certificate     /etc/ssl/algotrader/fullchain.pem;
    ssl_certificate_key /etc/ssl/algotrader/privkey.pem;

    # Modern TLS settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer;

    # Rate limiting zone (defined globally below)
    limit_req zone=api burst=20 nodelay;

    # ── SSE endpoint (no buffering, long timeout) ──────────
    location /api/stream {
        proxy_pass         http://algotrader;
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;
    }

    # ── All other routes ────────────────────────────────────
    location / {
        proxy_pass         http://algotrader;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# Rate limiting — 30 req/s per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
