<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlgoTrader Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel (in-browser JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Inter + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, html[data-theme="dark"] {
      --bg:          #060d18;
      --bg-card:     #0b1629;
      --bg-hover:    #0f1e35;
      --bg-input:    #0d1e38;
      --border:      #162440;
      --border-lt:   #1e3356;

      --blue:        #3b82f6;
      --blue-bg:     rgba(59,130,246,.12);
      --green:       #10b981;
      --green-bg:    rgba(16,185,129,.12);
      --red:         #ef4444;
      --red-bg:      rgba(239,68,68,.12);
      --yellow:      #f59e0b;
      --yellow-bg:   rgba(245,158,11,.12);
      --purple:      #8b5cf6;
      --purple-bg:   rgba(139,92,246,.12);

      --text:        #e2e8f0;
      --muted:       #64748b;
      --dim:         #334155;
    }

    html[data-theme="light"] {
      --bg:          #f5f7fa;
      --bg-card:     #ffffff;
      --bg-hover:    #f1f5f9;
      --bg-input:    #f8fafc;
      --border:      #e2e8f0;
      --border-lt:   #cbd5e1;

      --text:        #0f172a;
      --muted:       #64748b;
      --dim:         #94a3b8;
    }
    html[data-theme="light"] thead th { background: rgba(245,247,250,.95); }
    html[data-theme="light"] ::-webkit-scrollbar-thumb { background: #cbd5e1; }

    /* ── Mobile responsive ──────────────────────────────────── */
    @media (max-width: 900px) {
      header > div:first-child { padding: 8px 12px !important; }
      .responsive-grid-2 { grid-template-columns: 1fr !important; }
      .hide-on-mobile { display: none !important; }
      table { font-size: 11px; }
      thead th, tbody td { padding: 7px 8px !important; }
      .card-hdr { flex-wrap: wrap; }
      main { padding: 12px !important; }
    }
    @media (max-width: 640px) {
      .header-stack { flex-direction: column !important; align-items: flex-start !important; }
      .header-stack > * { width: 100%; justify-content: space-between !important; }
    }

    /* ── Mobile design pass v3 ──────────────────────────────── */
    @media (max-width: 1024px) {
      /* Collapse all multi-col grids on tablet+ */
      div[style*="gridTemplateColumns"]:not([style*="auto-fill"]),
      div[style*="grid-template-columns"]:not([style*="auto-fill"]) {
        grid-template-columns: 1fr !important;
      }
    }
    @media (max-width: 900px) {
      div[style*="auto-fill"] { grid-template-columns: repeat(auto-fill,minmax(150px,1fr)) !important; gap:8px !important; }
      iframe { height: 50vh !important; }
    }
    @media (max-width: 768px) {
      html { font-size: 13px; }
      body { -webkit-text-size-adjust: 100%; }
      main { padding: 8px !important; }
      .card { border-radius: 10px !important; margin: 0 !important; }
      .card-hdr { padding: 11px 13px !important; gap:8px !important; flex-wrap: wrap !important; }
      .card-title { font-size: 13px !important; font-weight: 600 !important; }
      .badge { font-size: 9px !important; padding: 2px 6px !important; }
      /* Buttons */
      .btn { padding: 9px 13px !important; font-size: 13px !important; min-height: 36px; border-radius: 7px !important; }
      .btn[style*="padding:'4px 12px'"] { padding: 6px 10px !important; font-size: 11px !important; }
      /* Inputs (16px to disable iOS auto-zoom) */
      input, select, textarea { font-size: 16px !important; padding: 10px 12px !important; border-radius: 8px !important; }
      input[type=checkbox], input[type=radio] { transform: scale(1.15); margin: 0 4px; }
      label { line-height: 1.4 !important; }
      /* Auto-fill grids on phone: 2 cols max */
      div[style*="auto-fill"] { grid-template-columns: repeat(2,1fr) !important; gap:8px !important; }
      /* Tables: convert to scrollable block */
      table { font-size: 12px !important; min-width: 100%; }
      thead th, tbody td { padding: 8px 6px !important; white-space: nowrap; }
      .card > div > table, .card > table {
        display: block !important; overflow-x: auto !important;
        -webkit-overflow-scrolling: touch; max-width: 100%;
      }
      /* Hide low-priority columns on phone-sized tables */
      table thead th:nth-child(n+5), table tbody td:nth-child(n+5) { display: none !important; }
      /* Iframes */
      iframe { height: 50vh !important; }
      /* Charts - use intrinsic responsive height */
      canvas { max-height: 250px !important; }
      /* Modal-ish cards take full width */
      .fadein { max-width: 100% !important; }
      /* Hide noisy "hide-on-mobile" class */
      .hide-on-mobile { display: none !important; }
    }
    /* Item 30: Toast position on mobile */
    @media (max-width: 768px) {
      .toast-container, [data-toast-container] {
        bottom: 16px !important; top: auto !important;
        right: 8px !important; left: 8px !important;
        max-width: calc(100vw - 16px);
      }
    }

    @media (max-width: 480px) {
      html { font-size: 12.5px; }
      main { padding: 6px !important; }
      header { padding: 6px 10px !important; }
      .card { border-radius: 8px !important; }
      .card-hdr { padding: 9px 10px !important; }
      .card-title { font-size: 12.5px !important; }
      .badge { font-size: 9px !important; }
      .btn { padding: 8px 11px !important; font-size: 12.5px !important; min-height: 36px; }
      thead th, tbody td { padding: 6px 5px !important; font-size: 11px !important; }
      /* Auto-fill: single col on phone */
      div[style*="auto-fill"] { grid-template-columns: 1fr !important; }
      /* Hide more low-priority columns in tables */
      table thead th:nth-child(n+4), table tbody td:nth-child(n+4) { display: none !important; }
      /* Sticky header with nav tabs */
      header { position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
      header nav, header [role="tablist"], .nav-tabs {
        overflow-x: auto !important; -webkit-overflow-scrolling: touch; white-space: nowrap !important;
        scrollbar-width: none;
      }
      header nav::-webkit-scrollbar, .nav-tabs::-webkit-scrollbar { display: none; }
      header nav button, .nav-tabs button { flex: 0 0 auto !important; min-width: 80px; }
      /* Smaller chart heights */
      canvas { max-height: 200px !important; }
      iframe { height: 60vh !important; }
      /* Profile/settings forms */
      .card[style*="maxWidth:880"] { max-width: 100% !important; }
    }
    /* Touch target minimums */
    @media (hover: none) and (pointer: coarse) {
      button, a.btn, .btn { min-height: 40px; }
      input[type=checkbox], input[type=radio] { transform: scale(1.2); }
      a, button { -webkit-tap-highlight-color: rgba(59,130,246,.25); }
    }

    /* Touch target minimums */
    @media (hover: none) and (pointer: coarse) {
      button, a.btn, .btn { min-height: 40px; }
      input[type=checkbox], input[type=radio] { transform: scale(1.2); }
    }

    html { font-size: 14px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-lt); }

    .mono { font-family: 'JetBrains Mono', monospace; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      padding: 9px 14px;
      text-align: left;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      background: rgba(6,13,24,.9);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1;
      white-space: nowrap;
    }
    tbody td {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(22,36,64,.7);
      vertical-align: middle;
    }
    tbody tr:hover td { background: var(--bg-hover); }
    tbody tr:last-child td { border-bottom: none; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .card-hdr {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .empty {
      padding: 36px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .btn {
      padding: 8px 14px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      border: 1px solid;
      font-family: 'Inter', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      letter-spacing: .02em;
    }
    .btn:hover { filter: brightness(1.2); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); filter: brightness(.95); }
    .btn-green  { background: rgba(16,185,129,.12);  color: #10b981; border-color: rgba(16,185,129,.35); }
    .btn-red    { background: rgba(239,68,68,.12);   color: #ef4444; border-color: rgba(239,68,68,.35); }
    .btn-blue   { background: rgba(59,130,246,.12);  color: #3b82f6; border-color: rgba(59,130,246,.35); }
    .btn-yellow { background: rgba(245,158,11,.12);  color: #f59e0b; border-color: rgba(245,158,11,.35); }
    .btn-ghost  { background: transparent; color: var(--muted); border-color: var(--border); }

    input[type="number"] {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      outline: none;
      transition: border-color .15s;
    }
    input[type="number"]:focus { border-color: var(--blue); }

    @keyframes pulse  { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }
    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .pulse  { animation: pulse  1.8s ease-in-out infinite; }
    .spin   { animation: spin   1s  linear      infinite; }
    .fadein { animation: fadein .25s ease; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Error boundary (prevents blank page on render crashes) ── */
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { err: null }; }
      static getDerivedStateFromError(e) { return { err: e }; }
      render() {
        if (this.state.err) return (
          <div style={{padding:32,textAlign:'center',color:'#ef4444'}}>
            <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
            <div style={{fontWeight:700,marginBottom:8}}>Something went wrong</div>
            <div style={{fontSize:13,color:'var(--muted)',marginBottom:16,fontFamily:'JetBrains Mono'}}>{String(this.state.err?.message || this.state.err)}</div>
            <button className="btn btn-blue" onClick={()=>this.setState({err:null})}>Retry</button>
          </div>
        );
        return this.props.children;
      }
    }

    /* ── Format helpers ──────────────────────────────────────── */
    const f$ = n =>
      n == null ? '—' : (n < 0 ? '-' : '') + '$' +
      Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2});

    const fpct = n =>
      n == null ? '—' : (n >= 0 ? '+' : '') + n.toFixed(2) + '%';

    const clr = (n, pos='#10b981', neg='#ef4444', zero='#64748b') =>
      n == null ? zero : n > 0 ? pos : n < 0 ? neg : zero;

    const timeAgo = (ts) => {
      if (!ts) return '—';
      const d = new Date(ts);
      if (isNaN(d)) return String(ts).substring(11,19) || ts;
      const sec = Math.floor((Date.now() - d.getTime()) / 1000);
      if (sec < 60)  return `${sec}s ago`;
      if (sec < 3600) return `${Math.floor(sec/60)}m ago`;
      if (sec < 86400) return `${Math.floor(sec/3600)}h ago`;
      return d.toLocaleDateString();
    };

    /* ── Dot ─────────────────────────────────────────────────── */
    const Dot = ({ on, pulse }) => (
      <span style={{
        display: 'inline-block', width: 8, height: 8, borderRadius: '50%', flexShrink: 0,
        background: on ? '#10b981' : '#ef4444',
        boxShadow: `0 0 6px ${on ? '#10b981' : '#ef4444'}`,
        ...(pulse && on ? { animation: 'pulse 1.8s ease-in-out infinite' } : {}),
      }} />
    );

    /* ── Badge ───────────────────────────────────────────────── */
    const Badge = ({ children, color = '#64748b', bg }) => (
      <span className="badge" style={{
        color,
        background: bg || (color + '1a'),
      }}>{children}</span>
    );

    /* ── Regime badge ────────────────────────────────────────── */
    const Regime = ({ v }) => {
      const map = {
        bullish:  ['#10b981','Bullish'],
        trending: ['#3b82f6','Trending'],
        bearish:  ['#ef4444','Bearish'],
        choppy:   ['#f59e0b','Choppy'],
        unknown:  ['#64748b','Unknown'],
      };
      const [c, label] = map[v?.toLowerCase()] || map.unknown;
      return <Badge color={c}>{label}</Badge>;
    };

    /* ── Win-rate bar ────────────────────────────────────────── */
    const WinBar = ({ wins = 0, losses = 0 }) => {
      const total = wins + losses;
      const pct   = total ? Math.round(wins / total * 100) : 0;
      return (
        <div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:11,fontFamily:'JetBrains Mono'}}>
            <span style={{color:'#10b981'}}>{wins}W</span>
            <span style={{color:'#94a3b8',fontWeight:700}}>{pct}%</span>
            <span style={{color:'#ef4444'}}>{losses}L</span>
          </div>
          <div style={{height:5,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
            <div style={{
              height:'100%', width:`${pct}%`, borderRadius:3,
              background:'linear-gradient(90deg,#10b981,#34d399)',
              transition:'width .5s ease',
            }} />
          </div>
        </div>
      );
    };

    /* ── Confidence bar ──────────────────────────────────────── */
    const ConfBar = ({ value = 0 }) => {
      const c = value >= 75 ? '#10b981' : value >= 55 ? '#3b82f6' : '#f59e0b';
      return (
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{flex:1,height:4,background:'var(--border)',borderRadius:2,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${Math.min(value,100)}%`,background:c,borderRadius:2,transition:'width .5s'}} />
          </div>
          <span style={{fontSize:12,fontWeight:700,fontFamily:'JetBrains Mono',color:c,width:28,textAlign:'right'}}>{value}</span>
        </div>
      );
    };

    /* ── Metric card ─────────────────────────────────────────── */
    const MetCard = ({ label, value, sub, color, children }) => (
      <div style={{
        background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:10, padding:'14px 16px',
        transition:'border-color .15s, transform .15s', cursor:'default',
      }}
        onMouseEnter={e=>{ e.currentTarget.style.borderColor='var(--border-lt)'; e.currentTarget.style.transform='translateY(-2px)'; }}
        onMouseLeave={e=>{ e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.transform=''; }}
      >
        <div style={{fontSize:10,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--muted)',marginBottom:8}}>{label}</div>
        <div style={{fontSize:22,fontWeight:700,fontFamily:'JetBrains Mono',color:color||'var(--text)',lineHeight:1}}>{value}</div>
        {sub   && <div style={{fontSize:11,color:'var(--muted)',marginTop:5}}>{sub}</div>}
        {children && <div style={{marginTop:8}}>{children}</div>}
      </div>
    );

    /* ── P&L chart ───────────────────────────────────────────── */
    const PnLChart = ({ curve }) => {
      const ref   = useRef(null);
      const chart = useRef(null);
      const dep   = JSON.stringify(curve);

      useEffect(() => {
        if (!ref.current || !window.Chart) return;
        chart.current?.destroy();

        const labels = curve?.length ? curve.map(p => p.time) : ['09:30','—'];
        const vals   = curve?.length ? curve.map(p => p.pnl)  : [0, 0];
        const last   = vals[vals.length - 1] ?? 0;
        const c      = last >= 0 ? '#10b981' : '#ef4444';
        const cBg    = last >= 0 ? 'rgba(16,185,129,.1)' : 'rgba(239,68,68,.1)';

        chart.current = new window.Chart(ref.current.getContext('2d'), {
          type: 'line',
          data: {
            labels,
            datasets: [{
              data: vals,
              borderColor: c,
              backgroundColor: cBg,
              fill: true,
              tension: 0.4,
              pointRadius: vals.length > 20 ? 0 : 4,
              pointHoverRadius: 5,
              pointBackgroundColor: c,
              borderWidth: 2,
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#0b1629',
                borderColor: '#162440',
                borderWidth: 1,
                titleColor: '#64748b',
                bodyColor: c,
                callbacks: { label: ctx => ' ' + f$(ctx.raw) }
              }
            },
            scales: {
              x: {
                grid: { color: 'rgba(22,36,64,.6)' },
                ticks: { color: '#64748b', font: { size: 10, family: 'JetBrains Mono' }, maxTicksLimit: 8 }
              },
              y: {
                grid: { color: 'rgba(22,36,64,.6)' },
                ticks: {
                  color: '#64748b',
                  font: { size: 10, family: 'JetBrains Mono' },
                  callback: v => '$' + v.toFixed(0)
                },
                grace: '10%',
              }
            }
          }
        });
        return () => chart.current?.destroy();
      }, [dep]);

      return (
        <div style={{ height: 230, position: 'relative' }}>
          <canvas ref={ref} />
          {(!curve || curve.length === 0) && (
            <div style={{
              position:'absolute', inset:0, display:'flex', alignItems:'center',
              justifyContent:'center', color:'var(--muted)', fontSize:13, pointerEvents:'none'
            }}>No completed trades yet today</div>
          )}
        </div>
      );
    };

    /* ── Positions table ─────────────────────────────────────── */
    const Positions = ({ rows = [], equity = 0 }) => (
      <div className="card" style={{height:'100%'}}>
        <div className="card-hdr">
          <span className="card-title">📍 Open Positions</span>
          <Badge color="#3b82f6">{rows.length} / 3</Badge>
        </div>
        <div style={{overflowX:'auto',maxHeight:290,overflowY:'auto'}}>
          <table>
            <thead><tr>
              <th>Symbol</th><th>Qty</th><th>Entry</th><th>Current</th><th>P&L %</th>
              {equity > 0 && <th className="hide-on-mobile">% Equity</th>}
              <th>Stop</th>
            </tr></thead>
            <tbody>
              {rows.length === 0
                ? <tr><td colSpan="7"><div className="empty">No open positions</div></td></tr>
                : rows.map((p, i) => {
                  const posValue = (p.curr || p.entry || 0) * (p.qty || 0);
                  const equityPct = equity > 0 ? (posValue / equity * 100) : null;
                  return (
                    <tr key={i}>
                      <td style={{borderLeft:`3px solid ${clr(p.pct)}`}}>
                        <span style={{fontWeight:700}}>{p.sym}</span>
                      </td>
                      <td className="mono">{p.qty}</td>
                      <td className="mono">{f$(p.entry)}</td>
                      <td className="mono">{f$(p.curr)}</td>
                      <td className="mono" style={{color:clr(p.pct),fontWeight:700}}>{fpct(p.pct)}</td>
                      {equity > 0 && <td className="mono hide-on-mobile" style={{color:'var(--muted)',fontSize:11}}>{equityPct != null ? equityPct.toFixed(1)+'%' : '—'}</td>}
                      <td className="mono" style={{color:'var(--muted)'}}>{f$(p.stop)}</td>
                    </tr>
                  );
                })
              }
            </tbody>
          </table>
        </div>
      </div>
    );

    /* ── AI Picks ────────────────────────────────────────────── */
    const Picks = ({ rows = [] }) => (
      <div className="card" style={{height:'100%'}}>
        <div className="card-hdr">
          <span className="card-title">🎯 AI Scanner Picks</span>
          {rows.length > 0 && <Badge color="#10b981">{rows.length} picks</Badge>}
        </div>
        <div style={{maxHeight:290,overflowY:'auto'}}>
          {rows.length === 0
            ? <div className="empty"><div style={{fontSize:22,marginBottom:8}}>⏳</div>Waiting for scanner results…</div>
            : rows.map((p, i) => (
              <div key={i} style={{
                padding:'11px 16px',
                borderBottom:'1px solid rgba(22,36,64,.6)',
                display:'flex', justifyContent:'space-between', alignItems:'center', gap:12,
              }}>
                <div style={{minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:15}}>{p.symbol}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>
                    {p.sector}
                    {p.rel_volume != null && <span style={{color:'#3b82f6',marginLeft:6}}>{p.rel_volume}× vol</span>}
                    {p.pre_market_gap > 0 && <span style={{color:'#f59e0b',marginLeft:6}}>+{p.pre_market_gap}% gap</span>}
                  </div>
                  <div style={{fontSize:11,color:'#94a3b8',marginTop:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:200}}
                    title={p.reason}>{p.reason}</div>
                </div>
                <div style={{flexShrink:0,minWidth:120,textAlign:'right'}}>
                  <ConfBar value={p.confidence} />
                  {p.news_sentiment && (
                    <div style={{marginTop:5}}>
                      <Badge
                        color={p.news_sentiment==='positive'?'#10b981':p.news_sentiment==='negative'?'#ef4444':'#64748b'}
                      >{p.news_sentiment}</Badge>
                    </div>
                  )}
                </div>
              </div>
            ))
          }
        </div>
      </div>
    );

    /* ── Trade history ───────────────────────────────────────── */
    const Trades = ({ rows = [], full, showBroker = false, exportUrl }) => (
      <div className="card" style={{height:'100%'}}>
        <div className="card-hdr">
          <span className="card-title">📋 {full ? 'Full Trade History' : "Today's Trades"}</span>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <Badge color="#64748b">{rows.length}</Badge>
            {exportUrl && (
              <a href={exportUrl} download style={{textDecoration:'none'}}>
                <button className="btn btn-ghost" style={{padding:'3px 9px',fontSize:11}}>⬇ CSV</button>
              </a>
            )}
          </div>
        </div>
        <div style={{overflowX:'auto',maxHeight: full ? 600 : 290, overflowY:'auto'}}>
          <table>
            <thead><tr>
              <th>Time</th><th>Symbol</th><th>Side</th><th>Qty</th><th>Price</th><th>P&L</th>
              {showBroker && <th className="hide-on-mobile">Broker</th>}
              <th>Reason</th>
            </tr></thead>
            <tbody>
              {rows.length === 0
                ? <tr><td colSpan={showBroker?8:7}><div className="empty">No trades today</div></td></tr>
                : rows.map((t, i) => {
                  const buy  = t.action?.toLowerCase() === 'buy';
                  const hasPnl = !buy && t.pct != null;
                  const ccy = t.currency === 'INR' ? '₹' : '$';
                  const fPrice = v => v == null ? '—' : ccy + Math.abs(Number(v)).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
                  return (
                    <tr key={i}>
                      <td className="mono" style={{color:'var(--muted)',fontSize:11}} title={String(t.time||'')}>
                        {timeAgo(t.time)}
                      </td>
                      <td style={{fontWeight:700,borderLeft:`3px solid ${buy?'#10b981':'#ef4444'}`}}>{t.sym}</td>
                      <td>
                        <Badge color={buy?'#10b981':'#ef4444'}>{t.action?.toUpperCase()}</Badge>
                      </td>
                      <td className="mono">{t.qty||'—'}</td>
                      <td className="mono">{fPrice(t.price)}</td>
                      <td className="mono" style={{color:hasPnl?clr(t.pct):'var(--muted)',fontWeight:hasPnl?700:400}}>
                        {hasPnl ? fpct(t.pct) : '—'}
                      </td>
                      {showBroker && <td className="hide-on-mobile" style={{fontSize:10,color:'var(--muted)'}}>{t.broker||'—'}</td>}
                      <td style={{color:'var(--muted)',fontSize:11,maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}
                        title={t.reason}>{t.reason?.substring(0,35)}{t.reason?.length>35?'…':''}</td>
                    </tr>
                  );
                })
              }
            </tbody>
          </table>
        </div>
      </div>
    );

    /* ── Combined trades tab ─────────────────────────────────── */
    const CombinedTradesTab = () => {
      const [data, setData] = useState(null);
      const [err,  setErr]  = useState(null);
      const [loading, setLoading] = useState(true);
      const [range, setRange] = useState('day');
      const [broker, setBroker] = useState('all');
      const mountedRef = useRef(true);
      useEffect(() => { mountedRef.current = true; return () => { mountedRef.current = false; }; }, []);
      const load = useCallback(() => {
        if (!mountedRef.current) return;
        setLoading(true);
        fetch(`/api/trades/combined?range=${range}&broker=${broker}`)
          .then(r => r.ok ? r.json() : r.json().then(e => Promise.reject(e)))
          .then(d => { if (mountedRef.current) { setData(d); setErr(null); } })
          .catch(e => { if (mountedRef.current) setErr(String(e?.message || 'Failed')); })
          .finally(() => { if (mountedRef.current) setLoading(false); });
      }, [range, broker]);
      useEffect(() => { load(); }, [load]);
      return (
        <div className="fadein">
          <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
            {['day','week','month','all'].map(r => (
              <button key={r} className={`btn ${range===r?'btn-blue':'btn-ghost'}`}
                style={{padding:'4px 12px',fontSize:12}} onClick={() => setRange(r)}>
                {r.charAt(0).toUpperCase()+r.slice(1)}
              </button>
            ))}
            <span style={{color:'var(--muted)',fontSize:11,margin:'0 4px'}}>|</span>
            {['all','alpaca','angelone','zerodha','indian'].map(b => (
              <button key={b} className={`btn ${broker===b?'btn-blue':'btn-ghost'}`}
                style={{padding:'4px 10px',fontSize:11}} onClick={() => setBroker(b)}>
                {b}
              </button>
            ))}
            <a href="/api/export/combined.csv" download style={{marginLeft:'auto',textDecoration:'none'}}>
              <button className="btn btn-ghost" style={{padding:'4px 12px',fontSize:12}}>⬇ Export CSV</button>
            </a>
          </div>
          {loading && !data && <div className="empty" style={{padding:40}}>Loading…</div>}
          {err && <div className="empty" style={{padding:20,color:'#ef4444'}}>{err} <button className="btn btn-blue" onClick={load}>↻</button></div>}
          {data && (
            <>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:8,marginBottom:12}}>
                {[
                  ['Total trades', data.summary?.total_trades],
                  ['Closed trades', data.summary?.closed_trades],
                  ['Realized P&L (USD)', data.summary?.realized_pnl_usd != null ? '$'+Number(data.summary.realized_pnl_usd).toFixed(2) : '—'],
                  ['Realized P&L (INR)', data.summary?.realized_pnl_inr != null ? '₹'+Number(data.summary.realized_pnl_inr).toFixed(2) : '—'],
                ].map(([label,val],i) => (
                  <div key={i} style={{background:'var(--bg-input)',borderRadius:8,padding:'10px 12px'}}>
                    <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',fontWeight:700}}>{label}</div>
                    <div className="mono" style={{fontSize:16,fontWeight:700,marginTop:4}}>{val ?? '—'}</div>
                  </div>
                ))}
              </div>
              <Trades rows={data.trades || []} full showBroker />
            </>
          )}
        </div>
      );
    };

    /* ── Activity log ────────────────────────────────────────── */
    const Log = ({ rows = [] }) => (
      <div className="card" style={{height:'100%'}}>
        <div className="card-hdr"><span className="card-title">📟 Activity Log</span></div>
        <div style={{
          fontFamily:'JetBrains Mono,monospace', fontSize:12, lineHeight:1.6,
          padding:'12px 16px', maxHeight:280, overflowY:'auto',
          background:'rgba(6,13,24,.6)',
        }}>
          {rows.length === 0
            ? <span style={{color:'var(--muted)',fontStyle:'italic'}}>No activity yet</span>
            : rows.map((item, i) => (
              <div key={i} style={{marginBottom:4,display:'flex',gap:8}}>
                <span style={{color:'#3b82f6',flexShrink:0}}>[{item.t}]</span>
                <span style={{color:'#94a3b8'}}>{item.m}</span>
              </div>
            ))
          }
        </div>
      </div>
    );

    /* ── Controls ────────────────────────────────────────────── */
    const Controls = ({ onAction, paused, pauseReason }) => {
      const [busy, setBusy] = useState(null);
      const [msg,  setMsg]  = useState(null);

      const act = async (action) => {
        if (action === 'close_all' && !confirm('Close ALL open positions now?')) return;
        setBusy(action);
        try {
          const r = await fetch('/api/action', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({action}),
          });
          const d = await r.json();
          setMsg({ ok: d.status === 'success', text: d.status === 'success' ? `✓ ${action} done` : d.message });
        } catch {
          setMsg({ ok: false, text: 'Request failed' });
        } finally {
          setBusy(null);
          setTimeout(() => setMsg(null), 3000);
        }
      };

      return (
        <div className="card">
          <div className="card-hdr"><span className="card-title">⚙️ Bot Controls</span></div>
          <div style={{padding:14}}>
            {paused && (
              <div style={{
                background:'rgba(245,158,11,.1)', border:'1px solid rgba(245,158,11,.3)',
                borderRadius:7, padding:'9px 12px', marginBottom:12,
                color:'#f59e0b', fontSize:12, display:'flex', alignItems:'center', gap:6,
              }}>⚠️ {pauseReason || 'Bot is paused'}</div>
            )}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {[
                ['start',     'btn-green',  '▶ Start'],
                ['stop',      'btn-red',    '⏸ Stop'],
                ['scan',      'btn-blue',   '🔍 Scan'],
                ['close_all', 'btn-yellow', '✕ Close All'],
              ].map(([a, cls, label]) => (
                <button key={a} className={`btn ${cls}`} onClick={() => act(a)}>
                  {busy === a ? <span className="spin" style={{width:12,height:12,border:'2px solid currentColor',borderTopColor:'transparent',borderRadius:'50%',display:'inline-block'}} /> : label}
                </button>
              ))}
            </div>
            {msg && (
              <div style={{
                marginTop:10, padding:'8px 12px', borderRadius:6, fontSize:12,
                background: msg.ok ? 'rgba(16,185,129,.1)' : 'rgba(239,68,68,.1)',
                color:       msg.ok ? '#10b981'            : '#ef4444',
              }}>{msg.text}</div>
            )}
          </div>
        </div>
      );
    };

    /* ── Indian Bot Controls ─────────────────────────────────── */
    const IndianBotControls = ({ health }) => {
      const [busy,    setBusy]    = useState(null);
      const [msg,     setMsg]     = useState(null);
      const [alloc,   setAlloc]   = useState(null);
      const [editing, setEditing] = useState(false);
      const [form,    setForm]    = useState({});

      // Status derived from health
      const status = health?.services?.['indian-bot'] || 'unknown';
      const running = status === 'running';

      useEffect(() => {
        fetch('/api/allocations/zerodha')
          .then(r => r.json())
          .then(d => { setAlloc(d); setForm({
            budget:       d.budget       || '',
            max_positions:d.max_positions|| '',
            stop_pct:     d.stop_pct     || '',
            tp_pct:       d.tp_pct       || '',
          }); })
          .catch(() => {});
      }, []);

      const act = async (action) => {
        if (action === 'indian_start' && !alloc?.auto_trade) {
          setMsg({ ok: false, text: 'Enable auto-trade first (toggle below)' });
          setTimeout(() => setMsg(null), 3000);
          return;
        }
        setBusy(action);
        try {
          const r = await fetch('/api/action', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action }),
          });
          const d = await r.json();
          setMsg({ ok: d.status === 'success',
                   text: d.status === 'success' ? `✓ ${action.replace('indian_','')} done` : (d.message || 'Error') });
        } catch {
          setMsg({ ok: false, text: 'Request failed' });
        } finally {
          setBusy(null);
          setTimeout(() => setMsg(null), 3000);
        }
      };

      const toggleAutoTrade = async () => {
        setBusy('toggle');
        try {
          const r = await fetch('/api/allocations/zerodha/toggle', { method: 'POST' });
          const d = await r.json();
          if (d.ok) setAlloc(prev => ({ ...prev, auto_trade: d.auto_trade }));
        } catch {}
        setBusy(null);
      };

      const saveAlloc = async () => {
        setBusy('save');
        const body = {};
        if (form.budget       !== '') body.budget        = parseFloat(form.budget);
        if (form.max_positions!== '') body.max_positions = parseInt(form.max_positions);
        if (form.stop_pct     !== '') body.stop_pct      = parseFloat(form.stop_pct);
        if (form.tp_pct       !== '') body.tp_pct        = parseFloat(form.tp_pct);
        try {
          const r = await fetch('/api/allocations/zerodha', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          const d = await r.json();
          if (d.ok) { setAlloc(d.allocation); setEditing(false);
            setMsg({ ok: true, text: '✓ Allocation saved' }); }
          else setMsg({ ok: false, text: d.error || 'Save failed' });
        } catch {
          setMsg({ ok: false, text: 'Request failed' });
        } finally {
          setBusy(null);
          setTimeout(() => setMsg(null), 3000);
        }
      };

      const inp = { background:'rgba(15,23,42,.6)', border:'1px solid rgba(99,179,237,.2)',
                    borderRadius:5, color:'var(--text)', padding:'5px 8px', fontSize:12, width:'100%' };
      const lbl = { fontSize:11, color:'var(--muted)', marginBottom:3 };

      return (
        <div className="card">
          <div className="card-hdr" style={{justifyContent:'space-between'}}>
            <span className="card-title">🇮🇳 Indian Bot (Zerodha)</span>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <Dot on={running} />
              <span style={{fontSize:11,fontWeight:600,color:running?'#10b981':'#ef4444'}}>
                {status.toUpperCase()}
              </span>
            </div>
          </div>

          <div style={{padding:14}}>
            {/* Start / Stop / Restart row */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
              {[
                ['indian_start',   'btn-green',  '▶ Start'],
                ['indian_stop',    'btn-red',    '⏸ Stop'],
                ['indian_restart', 'btn-blue',   '↺ Restart'],
              ].map(([a, cls, label]) => (
                <button key={a} className={`btn ${cls}`} onClick={() => act(a)}
                        disabled={!!busy} style={{fontSize:12,padding:'7px 4px'}}>
                  {busy === a
                    ? <span className="spin" style={{width:11,height:11,border:'2px solid currentColor',borderTopColor:'transparent',borderRadius:'50%',display:'inline-block'}} />
                    : label}
                </button>
              ))}
            </div>

            {/* Auto-trade toggle */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                         padding:'9px 12px',background:'rgba(15,23,42,.5)',borderRadius:7,marginBottom:12}}>
              <div>
                <div style={{fontSize:12,fontWeight:600}}>Auto-Trade</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>
                  {alloc?.auto_trade ? 'Bot will enter trades autonomously' : 'Bot will not open new positions'}
                </div>
              </div>
              <button onClick={toggleAutoTrade} disabled={busy==='toggle'}
                      className={`btn ${alloc?.auto_trade ? 'btn-green' : 'btn-ghost'}`}
                      style={{minWidth:56,fontSize:12,padding:'5px 12px'}}>
                {busy==='toggle'
                  ? <span className="spin" style={{width:11,height:11,border:'2px solid currentColor',borderTopColor:'transparent',borderRadius:'50%',display:'inline-block'}} />
                  : alloc?.auto_trade ? 'ON' : 'OFF'}
              </button>
            </div>

            {/* Allocation summary / edit */}
            {alloc && !editing && (
              <div style={{fontSize:12,color:'var(--muted)',marginBottom:10,
                           display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}}>
                <span>Budget: <b style={{color:'var(--text)'}}>
                  {alloc.budget > 0 ? '₹'+Number(alloc.budget).toLocaleString('en-IN') : 'account default'}
                </b></span>
                <span>Max pos: <b style={{color:'var(--text)'}}>
                  {alloc.max_positions > 0 ? alloc.max_positions : 'bot default'}
                </b></span>
                <span>Stop: <b style={{color:'var(--text)'}}>
                  {alloc.stop_pct > 0 ? alloc.stop_pct+'%' : 'bot default'}
                </b></span>
                <span>TP: <b style={{color:'var(--text)'}}>
                  {alloc.tp_pct > 0 ? alloc.tp_pct+'%' : 'bot default'}
                </b></span>
              </div>
            )}

            {!editing && (
              <button className="btn btn-ghost" style={{width:'100%',fontSize:11,padding:'5px 0'}}
                      onClick={() => setEditing(true)}>
                ✏️ Edit Allocation
              </button>
            )}

            {editing && (
              <div style={{background:'rgba(15,23,42,.5)',borderRadius:7,padding:12,marginBottom:8}}>
                <div style={{fontSize:12,fontWeight:600,marginBottom:10,color:'var(--accent)'}}>
                  Fund Allocation — Zerodha
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
                  <div>
                    <div style={lbl}>Budget (₹) — 0 = no cap</div>
                    <input style={inp} type="number" min="0" value={form.budget}
                           onChange={e => setForm(f => ({...f, budget: e.target.value}))} />
                  </div>
                  <div>
                    <div style={lbl}>Max Positions — 0 = bot default</div>
                    <input style={inp} type="number" min="0" value={form.max_positions}
                           onChange={e => setForm(f => ({...f, max_positions: e.target.value}))} />
                  </div>
                  <div>
                    <div style={lbl}>Stop Loss % — 0 = bot default</div>
                    <input style={inp} type="number" min="0" step="0.1" value={form.stop_pct}
                           onChange={e => setForm(f => ({...f, stop_pct: e.target.value}))} />
                  </div>
                  <div>
                    <div style={lbl}>Take Profit % — 0 = bot default</div>
                    <input style={inp} type="number" min="0" step="0.1" value={form.tp_pct}
                           onChange={e => setForm(f => ({...f, tp_pct: e.target.value}))} />
                  </div>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-green" style={{flex:1,fontSize:12}}
                          onClick={saveAlloc} disabled={busy==='save'}>
                    {busy==='save' ? '…' : '✓ Save'}
                  </button>
                  <button className="btn btn-ghost" style={{flex:1,fontSize:12}}
                          onClick={() => setEditing(false)}>
                    Cancel
                  </button>
                </div>
              </div>
            )}

            {msg && (
              <div style={{marginTop:8,padding:'7px 10px',borderRadius:6,fontSize:12,
                           background: msg.ok?'rgba(16,185,129,.1)':'rgba(239,68,68,.1)',
                           color:       msg.ok?'#10b981':'#ef4444'}}>
                {msg.text}
              </div>
            )}
          </div>
        </div>
      );
    };

    /* ── System health ───────────────────────────────────────── */
    const Health = ({ health }) => {
      const svcs = [
        { key: 'trading-bot', icon: '🤖', label: 'Trading Bot' },
        { key: 'scanner',     icon: '🔍', label: 'AI Scanner'  },
        { key: 'dashboard',   icon: '📊', label: 'Dashboard'   },
      ];
      return (
        <div className="card">
          <div className="card-hdr"><span className="card-title">💻 System Health</span></div>
          {[...svcs, { key: '_ollama', icon: '🧠', label: 'Ollama LLM' }].map(s => {
            const st = s.key === '_ollama'
              ? (health?.ollama === 'online' ? 'running' : health?.ollama || 'unknown')
              : (health?.services?.[s.key] || 'unknown');
            const ok = st === 'running' || st === 'online';
            return (
              <div key={s.key} style={{
                display:'flex', alignItems:'center', justifyContent:'space-between',
                padding:'10px 14px', borderBottom:'1px solid rgba(22,36,64,.5)',
              }}>
                <span style={{fontSize:13}}>{s.icon} {s.label}</span>
                <div style={{display:'flex',alignItems:'center',gap:7}}>
                  <Dot on={ok} />
                  <span style={{fontSize:12,fontWeight:600,color:ok?'#10b981':'#ef4444'}}>{st.toUpperCase()}</span>
                </div>
              </div>
            );
          })}
        </div>
      );
    };

    /* ── Strategy editor ─────────────────────────────────────── */
    const Strategy = ({ params }) => {
      const [editing, setEditing] = useState(false);
      const [form,    setForm]    = useState({});
      const [saved,   setSaved]   = useState(false);

      useEffect(() => { if (params) setForm(params); }, [JSON.stringify(params)]);

      const numDefs = [
        { key:'ema_fast',            label:'EMA Fast',             desc:'Fast EMA period'               },
        { key:'ema_slow',            label:'EMA Slow',             desc:'Slow EMA period'               },
        { key:'rsi_buy_min',         label:'RSI Min',              desc:'Min RSI to enter'              },
        { key:'rsi_buy_max',         label:'RSI Max',              desc:'Max RSI to enter'              },
        { key:'stop_loss_pct',       label:'Stop Loss %',          desc:'Per-trade stop loss'           },
        { key:'take_profit_pct',     label:'Take Profit %',        desc:'Per-trade target'              },
        { key:'partial_tp_pct',      label:'Partial TP %',         desc:'Sell 50% at this gain'         },
        { key:'max_positions',       label:'Max Positions',        desc:'Max concurrent trades'         },
        { key:'budget_per_trade',    label:'Budget / Trade $',     desc:'Dollar size per trade'         },
        { key:'min_confidence',      label:'Min AI Confidence',    desc:'AI score threshold (0-100)'    },
        { key:'daily_loss_limit_pct',label:'Daily Loss Limit %',   desc:'Pause trading after this loss' },
        { key:'vix_pause_threshold', label:'VIX Pause',            desc:'Reduce size above this'        },
        { key:'vix_stop_threshold',  label:'VIX Stop',             desc:'Stop trading above this'       },
        { key:'rel_vol_min',         label:'Min Rel Volume',       desc:'Relative volume threshold'     },
        { key:'max_drawdown_pct',    label:'Max Drawdown %',       desc:'Pause if 7d equity dip exceeds this' },
        { key:'consecutive_loss_pause',     label:'Consec Losses Pause',  desc:'# of losses before cooldown'  },
        { key:'consecutive_loss_cooldown_min', label:'Cooldown Min',     desc:'Pause duration in minutes'   },
        { key:'risk_per_trade_pct',  label:'Risk / Trade %',       desc:'ATR-scaled position sizing'   },
        { key:'max_spread_pct',      label:'Max Spread %',         desc:'Reject if bid-ask too wide'   },
      ];
      const txtDefs = [
        { key:'ollama_model', label:'Ollama Model', desc:'e.g. qwen2.5:3b · llama3.2:1b · mistral:7b' },
      ];

      const save = async () => {
        try {
          await fetch('/api/config', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify(form),
          });
          setSaved(true); setEditing(false);
          setTimeout(() => setSaved(false), 3000);
        } catch {}
      };

      return (
        <div className="card fadein">
          <div className="card-hdr">
            <span className="card-title">⚙️ Strategy Parameters</span>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              {saved && <span style={{color:'#10b981',fontSize:12,fontWeight:600}}>✓ Saved</span>}
              {editing
                ? <>
                    <button className="btn btn-ghost" style={{padding:'4px 12px',fontSize:12}} onClick={() => setEditing(false)}>Cancel</button>
                    <button className="btn btn-green" style={{padding:'4px 12px',fontSize:12}} onClick={save}>Save Changes</button>
                  </>
                : <button className="btn btn-blue" style={{padding:'4px 12px',fontSize:12}} onClick={() => setEditing(true)}>✏️ Edit</button>
              }
            </div>
          </div>
          <div style={{padding:16, display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))', gap:12}}>
            {numDefs.map(d => (
              <div key={d.key} style={{background:'rgba(6,13,24,.7)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                <div style={{fontSize:10,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',marginBottom:7}}>{d.label}</div>
                {editing
                  ? <input type="number" step="any" value={form[d.key] ?? ''}
                      onChange={e => setForm(f => ({...f, [d.key]: parseFloat(e.target.value)}))} />
                  : <div style={{fontSize:20,fontWeight:700,fontFamily:'JetBrains Mono',color:'#3b82f6'}}>{params?.[d.key] ?? '—'}</div>
                }
                <div style={{fontSize:11,color:'#475569',marginTop:5}}>{d.desc}</div>
              </div>
            ))}
            {txtDefs.map(d => (
              <div key={d.key} style={{background:'rgba(6,13,24,.7)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                <div style={{fontSize:10,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',marginBottom:7}}>{d.label}</div>
                {editing
                  ? <input type="text"
                      value={form[d.key] ?? ''}
                      onChange={e => setForm(f => ({...f, [d.key]: e.target.value}))}
                      style={{width:'100%',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',padding:'6px 10px',fontSize:13,fontFamily:'JetBrains Mono',outline:'none'}}
                    />
                  : <div style={{fontSize:15,fontWeight:700,fontFamily:'JetBrains Mono',color:'#8b5cf6'}}>{params?.[d.key] || <span style={{color:'var(--muted)'}}>—</span>}</div>
                }
                <div style={{fontSize:11,color:'#475569',marginTop:5}}>{d.desc}</div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    /* ── System tab ──────────────────────────────────────────── */
    const SystemTab = ({ health, data }) => {
      const m = data?.metrics || {};
      const rows = [
        { label:'Bot Started',    value: m.started  || '—' },
        { label:'Last Scan',      value: m.last_scan || '—' },
        { label:'Regime',         value: <Regime v={m.regime} /> },
        { label:'VIX',            value: <span style={{fontFamily:'JetBrains Mono',fontWeight:700,color:m.vix==null?'#64748b':m.vix<20?'#10b981':m.vix<28?'#f59e0b':'#ef4444'}}>{m.vix?.toFixed(1)??'—'}</span> },
        { label:'Trading Paused', value: <span style={{color:m.paused?'#f59e0b':'#10b981',fontWeight:600}}>{m.paused?'Yes':'No'}</span> },
        { label:'Open Positions', value: <span style={{fontFamily:'JetBrains Mono',fontWeight:700}}>{m.open_positions??0} / {data?.params?.max_positions??3}</span> },
      ];
      return (
        <div className="fadein" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <Health health={health} />
          <div className="card">
            <div className="card-hdr"><span className="card-title">📈 Runtime Info</span></div>
            {rows.map((r, i) => (
              <div key={i} style={{
                display:'flex', justifyContent:'space-between', alignItems:'center',
                padding:'11px 16px', borderBottom:'1px solid rgba(22,36,64,.5)',
              }}>
                <span style={{color:'var(--muted)',fontSize:13}}>{r.label}</span>
                <span style={{fontWeight:500,fontSize:13}}>{r.value}</span>
              </div>
            ))}
          </div>
        </div>
      );
    };

    /* ── Toast notification system ──────────────────────────── */
    const ToastCtx = React.createContext({ push: () => {} });
    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = useState([]);
      const push = useCallback((msg, type = 'info') => {
        const id = Date.now() + Math.random();
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4500);
      }, []);
      return (
        <ToastCtx.Provider value={{ push }}>
          {children}
          <div style={{position:'fixed',bottom:20,right:20,zIndex:9999,
                       display:'flex',flexDirection:'column',gap:8,maxWidth:340}}>
            {toasts.map(t => {
              const colors = {
                success: ['#10b981', 'rgba(16,185,129,.95)'],
                error:   ['#ef4444', 'rgba(239,68,68,.95)'],
                warning: ['#f59e0b', 'rgba(245,158,11,.95)'],
                info:    ['#3b82f6', 'rgba(59,130,246,.95)'],
              }[t.type] || ['#3b82f6', 'rgba(59,130,246,.95)'];
              return (
                <div key={t.id} className="fadein" style={{
                  background: colors[1], color: '#fff', padding: '11px 16px',
                  borderRadius: 8, fontSize: 13, fontWeight: 500,
                  boxShadow: '0 8px 24px rgba(0,0,0,.3)',
                  borderLeft: `4px solid ${colors[0]}`,
                }}>{t.msg}</div>
              );
            })}
          </div>
        </ToastCtx.Provider>
      );
    };
    const useToast = () => React.useContext(ToastCtx);

    /* ── Profile tab: name, theme, Alpaca / Angel One / Zerodha connect ── */
    const ProfileTab = ({ me, onMe }) => {
      const toast = useToast();
      const [name,  setName]  = useState(me?.name  || '');
      const [theme, setTheme] = useState(me?.theme || 'dark');

      // Alpaca connect form
      const [apiKey,    setApiKey]    = useState('');
      const [secKey,    setSecKey]    = useState('');
      const [isPaper,   setIsPaper]   = useState(true);
      const [busy,      setBusy]      = useState(false);

      // Angel One connect form
      const [aoApiKey,   setAoApiKey]   = useState('');
      const [aoClientId, setAoClientId] = useState('');
      const [aoPassword, setAoPassword] = useState('');
      const [aoTotp,     setAoTotp]     = useState('');
      const [aoBusy,     setAoBusy]     = useState(false);

      // Zerodha connect form
      const [zrdApiKey,    setZrdApiKey]    = useState('');
      const [zrdApiSecret, setZrdApiSecret] = useState('');
      const [zrdBusy,      setZrdBusy]      = useState(false);
      const [zrdReqToken,  setZrdReqToken]  = useState('');
      const [zrdTokenBusy, setZrdTokenBusy] = useState(false);

      // Password change
      const [curPw, setCurPw] = useState('');
      const [newPw, setNewPw] = useState('');

      // Sessions + audit
      const [sessions, setSessions] = useState([]);
      const [audit,    setAudit]    = useState([]);

      // Telegram notifications
      const [tgConfigured, setTgConfigured] = useState(false);
      const [tgToken,      setTgToken]      = useState('');
      const [tgChatId,     setTgChatId]     = useState('');
      const [tgEnabled,    setTgEnabled]    = useState(true);
      const [tgEvents,     setTgEvents]     = useState({buy:1,sell:1,eod:1,vix:1,startup:1});
      const [tgKeyPreview, setTgKeyPreview] = useState('');
      const [tgBusy,       setTgBusy]       = useState(false);

      const loadTelegram = () => {
        fetch('/api/telegram/status').then(r => r.json()).then(d => {
          setTgConfigured(!!d.configured);
          if (d.configured) {
            setTgChatId(d.chat_id || '');
            setTgEnabled(!!d.enabled);
            setTgEvents(Object.assign({buy:1,sell:1,eod:1,vix:1,startup:1}, d.events || {}));
            setTgKeyPreview(d.bot_token_redacted || '');
          }
        }).catch(() => {});
      };

      const saveTelegram = async () => {
        if (!tgToken.trim() || !tgChatId.trim()) {
          toast.push('Bot token and chat ID are required', 'error');
          return;
        }
        setTgBusy(true);
        try {
          const r = await fetch('/api/telegram/save', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({bot_token: tgToken, chat_id: tgChatId, enabled: tgEnabled, events: tgEvents}),
          });
          const d = await r.json();
          if (r.ok) {
            toast.push('Saved. Sending test message…', 'success');
            setTgToken('');
            await fetch('/api/telegram/test', {method:'POST'});
            loadTelegram();
          } else {
            toast.push(d.error || 'Save failed', 'error');
          }
        } finally { setTgBusy(false); }
      };

      const testTelegram = async () => {
        setTgBusy(true);
        try {
          const r = await fetch('/api/telegram/test', {method:'POST'});
          const d = await r.json();
          toast.push(d.ok ? 'Test message sent — check Telegram' : (d.error || 'Test failed'), d.ok ? 'success' : 'error');
        } finally { setTgBusy(false); }
      };

      const deleteTelegram = async () => {
        if (!confirm('Remove Telegram credentials and stop notifications?')) return;
        await fetch('/api/telegram/delete', {method:'POST'});
        setTgToken(''); setTgChatId(''); setTgConfigured(false); setTgKeyPreview('');
        toast.push('Telegram removed', 'info');
      };

      useEffect(() => {
        fetch('/api/sessions').then(r => r.json()).then(setSessions).catch(() => {});
        fetch('/api/audit').then(r => r.json()).then(setAudit).catch(() => {});
        loadTelegram();
      }, []);

      const saveProfile = async () => {
        const r = await fetch('/api/profile', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ name, theme }),
        });
        if (r.ok) {
          toast.push('Profile saved', 'success');
          applyThemeAttr(theme);
          onMe();
        } else {
          toast.push('Save failed', 'error');
        }
      };

      const connectAlpaca = async () => {
        if (!apiKey || !secKey) {
          toast.push('Both keys are required', 'error');
          return;
        }
        setBusy(true);
        try {
          const r = await fetch('/api/alpaca/connect', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ api_key: apiKey, secret_key: secKey, is_paper: isPaper }),
          });
          const d = await r.json();
          if (r.ok) {
            toast.push(`Connected to Alpaca ${isPaper ? 'paper' : 'LIVE'} (${d.account?.account_number?.slice(0,8) || '—'})`, 'success');
            setApiKey(''); setSecKey('');
            onMe();
          } else {
            toast.push(d.message || 'Validation failed: ' + (d.details?.message || JSON.stringify(d.details).slice(0,80)), 'error');
          }
        } finally { setBusy(false); }
      };

      const disconnectAlpaca = async () => {
        if (!confirm('Disconnect your Alpaca account from this dashboard?')) return;
        await fetch('/api/alpaca/disconnect', { method: 'POST' });
        toast.push('Alpaca disconnected', 'info');
        onMe();
      };

      // ── Angel One ──────────────────────────────────────────
      const connectAngelOne = async () => {
        if (!aoApiKey || !aoClientId || !aoPassword || !aoTotp) {
          toast.push('All four Angel One fields are required', 'error'); return;
        }
        setAoBusy(true);
        try {
          const r = await fetch('/api/angelone/connect', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ api_key:aoApiKey, client_id:aoClientId, password:aoPassword, totp_secret:aoTotp }),
          });
          const d = await r.json();
          if (r.ok) {
            toast.push(`Angel One connected: ${d.client_id}`, 'success');
            setAoApiKey(''); setAoClientId(''); setAoPassword(''); setAoTotp('');
            onMe();
          } else {
            toast.push(d.message || d.details || 'Validation failed', 'error');
          }
        } finally { setAoBusy(false); }
      };

      const disconnectAngelOne = async () => {
        if (!confirm('Disconnect your Angel One account?')) return;
        await fetch('/api/angelone/disconnect', { method:'POST' });
        toast.push('Angel One disconnected', 'info');
        onMe();
      };

      // ── Zerodha ─────────────────────────────────────────────
      const saveZerodha = async () => {
        if (!zrdApiKey || !zrdApiSecret) {
          toast.push('API Key and API Secret are required', 'error'); return;
        }
        setZrdBusy(true);
        try {
          const r = await fetch('/api/zerodha/connect', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ api_key:zrdApiKey, api_secret:zrdApiSecret }),
          });
          const d = await r.json();
          if (r.ok) {
            toast.push('Zerodha credentials saved — visit the login URL to activate', 'success');
            setZrdApiKey(''); setZrdApiSecret('');
            onMe();
          } else {
            toast.push(d.message || 'Save failed', 'error');
          }
        } finally { setZrdBusy(false); }
      };

      const activateZerodha = async () => {
        if (!zrdReqToken) { toast.push('Paste the request_token', 'error'); return; }
        setZrdTokenBusy(true);
        try {
          const r = await fetch('/api/zerodha/session', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ request_token: zrdReqToken }),
          });
          const d = await r.json();
          if (r.ok) {
            toast.push('Zerodha session activated!', 'success');
            setZrdReqToken('');
            onMe();
          } else {
            toast.push(d.error || 'Session activation failed', 'error');
          }
        } finally { setZrdTokenBusy(false); }
      };

      const disconnectZerodha = async () => {
        if (!confirm('Disconnect your Zerodha account?')) return;
        await fetch('/api/zerodha/disconnect', { method:'POST' });
        toast.push('Zerodha disconnected', 'info');
        onMe();
      };

      const changePassword = async () => {
        if (newPw.length < 8) { toast.push('New password must be 8+ chars', 'error'); return; }
        const r = await fetch('/api/change_password', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ current_password: curPw, new_password: newPw }),
        });
        const d = await r.json();
        if (r.ok) {
          toast.push('Password changed — please log in again', 'success');
          setTimeout(() => window.location.href = '/login', 1500);
        } else {
          toast.push(d.message || 'Failed to change password', 'error');
        }
      };

      const revokeSession = async (tail) => {
        if (!confirm('Revoke this session?')) return;
        await fetch('/api/sessions/revoke', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ token_tail: tail }),
        });
        toast.push('Session revoked', 'info');
        fetch('/api/sessions').then(r => r.json()).then(setSessions);
      };

      const logout = async () => {
        await fetch('/api/logout', { method: 'POST' });
        window.location.href = '/login';
      };

      const alp = me?.alpaca || {};

      return (
        <div className="fadein" style={{display:'grid',gridTemplateColumns:'1fr',gap:16,maxWidth:880,margin:'0 auto'}}>

          {/* Account */}
          <div className="card">
            <div className="card-hdr"><span className="card-title">👤 Account</span></div>
            <div style={{padding:18,display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              <div>
                <label style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Email</label>
                <div style={{fontFamily:'JetBrains Mono',fontSize:14,marginTop:6}}>{me?.email}</div>
              </div>
              <div>
                <label style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Plan</label>
                <div style={{fontSize:14,marginTop:6}}>
                  <Badge color={me?.plan==='pro'?'#10b981':'#64748b'}>{me?.plan?.toUpperCase()}</Badge>
                </div>
              </div>
              <div>
                <label style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Display name</label>
                <input type="text" value={name} onChange={e => setName(e.target.value)}
                  style={{width:'100%',marginTop:6,background:'var(--bg-input)',border:'1px solid var(--border)',
                          borderRadius:6,padding:'7px 10px',color:'var(--text)',fontSize:13}} />
              </div>
              <div>
                <label style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Theme</label>
                <div style={{display:'flex',gap:6,marginTop:6}}>
                  {['dark','light','auto'].map(t => (
                    <button key={t} onClick={() => setTheme(t)}
                      className={`btn ${theme===t?'btn-blue':'btn-ghost'}`}
                      style={{flex:1,padding:'7px 10px',fontSize:12,textTransform:'capitalize'}}>{t}</button>
                  ))}
                </div>
              </div>
              <div style={{gridColumn:'span 2',display:'flex',gap:8,justifyContent:'flex-end'}}>
                <button className="btn btn-green" onClick={saveProfile}>Save changes</button>
              </div>
            </div>
          </div>

          {/* Alpaca connection */}
          <div className="card">
            <div className="card-hdr">
              <span className="card-title">🔌 Alpaca Account</span>
              {alp.connected && (
                <Badge color={alp.is_paper ? '#3b82f6' : '#ef4444'}>
                  {alp.is_paper ? 'PAPER' : 'LIVE'}
                </Badge>
              )}
            </div>
            <div style={{padding:18}}>
              {alp.connected ? (
                <div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                    <div>
                      <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Account #</div>
                      <div style={{fontFamily:'JetBrains Mono',fontSize:13,marginTop:5}}>{alp.account_number || '—'}</div>
                    </div>
                    <div>
                      <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>API key</div>
                      <div style={{fontFamily:'JetBrains Mono',fontSize:13,marginTop:5}}>{alp.key_preview}</div>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                    <button className="btn btn-red" onClick={disconnectAlpaca}>Disconnect</button>
                  </div>
                </div>
              ) : (
                <div>
                  <div style={{padding:'10px 14px',background:'rgba(59,130,246,.08)',
                               border:'1px solid rgba(59,130,246,.25)',borderRadius:7,fontSize:13,marginBottom:14}}>
                    <b>Get your keys:</b> visit <a href="https://app.alpaca.markets/paper/dashboard/overview"
                       target="_blank" rel="noopener" style={{color:'#3b82f6'}}>alpaca.markets → Paper Account → View API Keys</a>.
                    Your secret key is shown only once at creation.
                  </div>
                  <label style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>API Key ID</label>
                  <input type="text" value={apiKey} onChange={e => setApiKey(e.target.value)}
                    placeholder="PKxxxxxxxxxxxxxxxxxx"
                    style={{width:'100%',marginTop:5,background:'var(--bg-input)',border:'1px solid var(--border)',
                            borderRadius:6,padding:'9px 12px',color:'var(--text)',fontSize:13,fontFamily:'JetBrains Mono'}} />
                  <label style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',marginTop:12,display:'block'}}>Secret Key</label>
                  <input type="password" value={secKey} onChange={e => setSecKey(e.target.value)}
                    placeholder="••••••••••••••••••••••••••••••••"
                    style={{width:'100%',marginTop:5,background:'var(--bg-input)',border:'1px solid var(--border)',
                            borderRadius:6,padding:'9px 12px',color:'var(--text)',fontSize:13,fontFamily:'JetBrains Mono'}} />
                  <div style={{marginTop:14,display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
                    <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}>
                      <input type="radio" checked={isPaper} onChange={() => setIsPaper(true)} />
                      Paper trading <Badge color="#3b82f6">Recommended</Badge>
                    </label>
                    <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}>
                      <input type="radio" checked={!isPaper} onChange={() => setIsPaper(false)} />
                      Live trading <Badge color="#ef4444">Real money</Badge>
                    </label>
                  </div>
                  {!isPaper && (
                    <div style={{marginTop:12,padding:'10px 14px',background:'rgba(239,68,68,.1)',
                                 border:'1px solid rgba(239,68,68,.3)',borderRadius:7,fontSize:13,color:'#ef4444'}}>
                      ⚠️ Live trading uses real money. Test thoroughly in paper mode for at least 30 days first.
                    </div>
                  )}
                  <div style={{marginTop:16,display:'flex',justifyContent:'flex-end'}}>
                    <button className="btn btn-green" disabled={busy} onClick={connectAlpaca}>
                      {busy ? 'Validating…' : 'Validate & Connect'}
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* Angel One connection */}
          {(() => {
            const ao = me?.angelone || {};
            const inp = {width:'100%',marginTop:5,background:'var(--bg-input)',border:'1px solid var(--border)',
                         borderRadius:6,padding:'9px 12px',color:'var(--text)',fontSize:13,fontFamily:'JetBrains Mono'};
            const lbl = {fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',marginTop:12,display:'block'};
            return (
              <div className="card">
                <div className="card-hdr">
                  <span className="card-title">🏦 Angel One (SmartAPI)</span>
                  {ao.connected && <Badge color="#f97316">CONNECTED</Badge>}
                </div>
                <div style={{padding:18}}>
                  {ao.connected ? (
                    <div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                        <div>
                          <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,textTransform:'uppercase'}}>Client ID</div>
                          <div style={{fontFamily:'JetBrains Mono',fontSize:13,marginTop:5}}>{ao.client_id}</div>
                        </div>
                        <div>
                          <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,textTransform:'uppercase'}}>Connected at</div>
                          <div style={{fontSize:12,marginTop:5,color:'var(--muted)'}}>{ao.validated_at?.slice(0,16).replace('T',' ')}</div>
                        </div>
                      </div>
                      <div style={{display:'flex',gap:8,justifyContent:'space-between',alignItems:'center'}}>
                        <span style={{fontSize:12,color:'var(--muted)'}}>Trading on NSE · BSE · NFO · MCX</span>
                        <button className="btn btn-red" onClick={disconnectAngelOne}>Disconnect</button>
                      </div>
                    </div>
                  ) : (

        if (target === 'live' && confirm !== 'I UNDERSTAND THE RISKS') {
          toast.push('Type the confirmation phrase exactly to switch to LIVE', 'error');
          return;
        }
        if (!k || !s) { toast.push('Both keys required', 'error'); return; }
        setBusy(true);
        try {
          const r = await fetch('/api/admin/bot_mode', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({mode: target, api_key: k, secret_key: s, confirm}),
          });
          const d = await r.json();
          if (r.ok) {
            toast.push(`Bot switched to ${d.mode.toUpperCase()} (${d.account?.number?.slice(0,8) || ''})`, 'success');
            setK(''); setS(''); setConfirm('');
            load();

            toast.push(d.error + (d.details ? `: ${typeof d.details === 'string' ? d.details : JSON.stringify(d.details).slice(0,140)}` : ''), 'error');

        try {
          const r = await fetch('/api/admin/panic_flat', {method:'POST'});

    function applyThemeAttr(theme) {

        ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')

      document.documentElement.setAttribute('data-theme', t);

    /* ── Equity curve chart (line, like PnLChart but $ over time) ─── */
    const EquityChart = ({ history }) => {
      const ref = useRef(null), chart = useRef(null);
      const dep = JSON.stringify(history);
      useEffect(() => {
        if (!ref.current || !window.Chart) return;
        chart.current?.destroy();
        const labels = history.map(h => h.date);
        const vals   = history.map(h => h.equity);
        chart.current = new window.Chart(ref.current.getContext('2d'), {
          type: 'line',
          data: {
            labels,
            datasets: [{
              data: vals,
              borderColor: '#3b82f6',
              backgroundColor: 'rgba(59,130,246,.1)',
              fill: true, tension: 0.3, pointRadius: 2, borderWidth: 2,
            }],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false },
              tooltip: { callbacks: { label: ctx => ' ' + f$(ctx.raw) } } },
            scales: {
              x: { grid: { color: 'rgba(22,36,64,.6)' },
                   ticks: { color: '#64748b', font: { size: 10 }, maxTicksLimit: 12 } },
              y: { grid: { color: 'rgba(22,36,64,.6)' },
                   ticks: { color: '#64748b', font: { size: 10 },
                            callback: v => '$' + v.toLocaleString() } },
            },
          },
        });
        return () => chart.current?.destroy();
      }, [dep]);

            <MetCard label="Total P&L"      value={f$(realized + unrealized)} color={clr(realized + unrealized)} />
            <MetCard label="Closed Trades"  value={sum.closed_trades ?? 0}    color="#3b82f6" />

                : !history?.daily?.length
                  ? <div className="empty">No closed trades in this range</div>

                      <thead><tr>
                        <th>Date</th><th>Trades</th><th>Wins</th><th>Losses</th>
                        <th>Win Rate</th><th>Best %</th><th>Worst %</th><th>Realized P&L</th>
                      </tr></thead>
                      <tbody>
                        {history.daily.slice().reverse().map((d, i) => (
                          <tr key={i}>
                            <td className="mono">{d.date}</td>

              <span className="card-title">📋 All Trades In Range</span>
              <Badge color="#64748b">{history?.trades?.length ?? 0}</Badge>

              {loading

          </div>
