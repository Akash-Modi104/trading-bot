            <label style={lbl}>Exchange</label>
            <select style={inp} value={exch} onChange={e=>setExch(e.target.value)}>
              {(exchanges||['NSE','BSE']).map(ex=><option key={ex}>{ex}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>Stop Loss (pts/price)</label>
            <input style={inp} type="number" step="0.05" value={sl} onChange={e=>setSl(e.target.value)} />
          </div>
          <div>
            <label style={lbl}>Target / Squareoff (pts/price)</label>
            <input style={inp} type="number" step="0.05" value={target} onChange={e=>setTarget(e.target.value)} />
          </div>
          <div style={{gridColumn:'span 2',display:'flex',justifyContent:'flex-end',gap:8,marginTop:4}}>
            <button className={`btn ${side==='BUY'?'btn-green':'btn-red'}`}
              disabled={loading||!sym||!qty} onClick={submit}>
              {loading ? 'Placing…' : `Place ${side}`}
            </button>
          </div>
        </div>
      );
    };

    const IndianPositionsTable = ({ positions, onSquareOff, squaringOff }) => {
      const rows = Array.isArray(positions) ? positions.filter(p => parseInt(p.netqty ?? p.quantity ?? 0) !== 0) : [];
      if (!positions || rows.length === 0)
        return <div className="empty">No open positions</div>;
      return (
        <div style={{overflowX:'auto'}}>
          <table>
            <thead><tr><th>Symbol</th><th>Exchange</th><th>Qty</th><th>Avg Buy</th><th>LTP</th><th>P&amp;L</th><th>Product</th></tr></thead>
            <tbody>
              {rows.map((p,i)=>{
                const qty    = parseInt(p.netqty ?? p.quantity ?? 0);
                const pnl    = parseFloat(p.unrealisedpnl ?? p.pnl ?? p.unrealised ?? 0);
                const avgBuy = parseFloat(p.averageprice ?? p.average_price ?? 0);
                const ltp    = parseFloat(p.ltp ?? 0);
                return (
                  <tr key={i}>
                    <td className="mono" style={{fontWeight:700}}>{p.tradingsymbol ?? p.trading_symbol}</td>
                    <td>{p.exchange}</td>
                    <td style={{color:qty>0?'#10b981':'#ef4444',fontWeight:600}}>{qty}</td>
                    <td className="mono">{INR(avgBuy)}</td>
                    <td className="mono">{INR(ltp)}</td>
                    <td className="mono" style={{color:pnl>=0?'#10b981':'#ef4444',fontWeight:700}}>{INR(pnl)}</td>
                    <td><Badge color="#3b82f6">{p.producttype ?? p.product}</Badge></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {onSquareOff && (
            <div style={{marginTop:12,display:'flex',justifyContent:'flex-end'}}>
              <button className="btn btn-red" disabled={squaringOff} onClick={onSquareOff}>
                {squaringOff ? 'Squaring Off…' : '⚡ Square Off All Positions'}
              </button>
            </div>
          )}
        </div>
      );
    };

    const IndianOrdersTable = ({ orders, onCancel }) => {
      if (!Array.isArray(orders) || orders.length === 0) return <div className="empty">No orders</div>;
      return (
        <div style={{overflowX:'auto'}}>
          <table>
            <thead><tr><th>Time</th><th>Symbol</th><th>Side</th><th>Type</th><th>Qty</th><th>Price</th><th>Status</th><th></th></tr></thead>
            <tbody>
              {orders.slice().reverse().map((o,i)=>{
                const status = (o.status ?? o.orderstatus ?? '').toUpperCase();
                const side   = (o.transactiontype ?? o.transaction_type ?? '').toUpperCase();
                const ts     = (o.ordertime ?? o.order_timestamp ?? o.updatetime ?? '').slice(0,16);
                return (
                  <tr key={i}>
                    <td className="mono" style={{fontSize:11,color:'var(--muted)'}}>{ts}</td>
                    <td className="mono" style={{fontWeight:700}}>{o.tradingsymbol ?? o.trading_symbol}</td>
                    <td><Badge color={side==='BUY'?'#10b981':'#ef4444'}>{side}</Badge></td>
                    <td style={{fontSize:11}}>{o.ordertype ?? o.order_type}</td>
                    <td className="mono">{o.quantity ?? o.qty}</td>
                    <td className="mono">{o.price??0 > 0 ? INR(o.price ?? o.averageprice) : 'MKT'}</td>
                    <td><Badge color={status==='COMPLETE'?'#10b981':status.includes('REJECT')||status.includes('CANCEL')?'#ef4444':'#f59e0b'}>{status}</Badge></td>
                    <td>
                      {(status === 'OPEN' || status === 'PENDING' || status === 'TRIGGER PENDING') && onCancel && (
                        <button className="btn btn-red" style={{padding:'3px 10px',fontSize:11}}
                          onClick={()=>onCancel(o.orderid ?? o.order_id, o.variety ?? 'NORMAL')}>
                          Cancel
                        </button>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    };


    /* ── Panic flat button (cross-broker emergency close) ────── */
    const PanicFlatBtn = ({ onDone }) => {
      const [busy, setBusy] = useState(false);
      const toast = useToast();
      const go = async () => {
        if (!confirm('⚠️ PANIC FLAT\n\nThis will cancel ALL open orders and close ALL positions across Alpaca, Angel One, and Zerodha simultaneously.\n\nType OK to confirm.')) return;
        setBusy(true);
        try {
          const r = await fetch('/api/admin/panic_flat', {method:'POST'});
          const d = await r.json();
          if (d.ok) {
            toast.push('Panic flat submitted to all brokers', 'success');
            if (onDone) onDone();
          } else {
            toast.push(d.error || 'Panic flat failed', 'error');
          }
        } catch(e) {
          toast.push(String(e?.message || 'Network error'), 'error');
        } finally {
          setBusy(false);
        }
      };
      return (
        <button className="btn btn-red" disabled={busy} onClick={go} style={{minWidth:160}}>
          {busy ? 'Closing all…' : '🚨 Panic Flat All'}
        </button>
      );
    };

    /* ── Account Switcher dropdown ──────────────────────────── */
    const BROKER_LABELS = {alpaca:'Alpaca', angelone:'Angel One', zerodha:'Zerodha', indian:'Indian Bot'};
    const BROKER_COLORS = {alpaca:'#5BA8FF', angelone:'#f97316', zerodha:'#6366f1', indian:'#10b981'};

    const ModeBadge = ({mode}) => (
      <span className={`mode-badge ${(mode||'live').toLowerCase()}`}>
        {(mode||'LIVE').toUpperCase()}
      </span>
    );

    const BrokerSwitcher = ({ broker, setBroker, me, aggData, onLogout }) => {
      const [open, setOpen] = React.useState(false);
      const wrapRef = React.useRef(null);
      useEffect(() => {
        if (!open) return;
        // Listen with a delay so this same tap event doesn't close immediately
        let armed = false;
        const arm = () => { armed = true; };
        const h = e => {
          if (!armed) return;
          if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
        };
        const t = setTimeout(arm, 50);
        document.addEventListener('pointerdown', h);
        document.addEventListener('mousedown', h);
        document.addEventListener('touchstart', h);
        return () => {
          clearTimeout(t);
          document.removeEventListener('pointerdown', h);
          document.removeEventListener('mousedown', h);
          document.removeEventListener('touchstart', h);
        };
      }, [open]);

      const fmtShort = (v, ccy) => {
        if (v == null) return '';
        const n = Number(v); if (isNaN(n)) return '';
        const sym = ccy === 'INR' ? '₹' : '$';
        if (Math.abs(n) >= 100000) return sym + (n/100000).toFixed(1) + 'L';
        if (Math.abs(n) >= 1000)   return sym + (n/1000).toFixed(1) + 'k';
        return sym + n.toFixed(0);
      };

      const BROKERS = [
        { k:'alpaca',   label:'Alpaca',     color:'#5BA8FF',
          connected: !!me?.alpaca?.connected,
          initials: (me?.alpaca?.account_number||'AP').slice(0,2).toUpperCase(),
          mode: me?.alpaca?.is_paper ? 'PAPER' : 'LIVE',
          preview: me?.alpaca?.account_number ? '••' + me.alpaca.account_number.slice(-2) : me?.alpaca?.key_preview || '',
          equity: aggData?.brokers?.alpaca?.equity, ccy:'USD',
        },
        { k:'angelone', label:'Angel One',  color:'#f97316',
          connected: !!me?.angelone?.connected,
          initials: (me?.angelone?.client_id||'AO').slice(0,2).toUpperCase(),
          mode:'LIVE',
          preview: me?.angelone?.client_id ? '••' + (me.angelone.client_id||'').slice(-2) : '',
          equity: aggData?.brokers?.angelone?.available_cash, ccy:'INR',
        },
        { k:'zerodha',  label:'Zerodha',    color:'#6366f1',
          connected: !!(me?.zerodha?.connected && me?.zerodha?.has_access_token),
          initials:'ZL', mode:'LIVE',
          preview: me?.zerodha?.has_access_token ? '••active' : 'needs login',
          equity: aggData?.brokers?.zerodha?.available_cash, ccy:'INR',
        },
      ];

      const connected    = BROKERS.filter(b => b.connected);
      const disconnected = BROKERS.filter(b => !b.connected);
      const curr = BROKERS.find(b => b.k === broker) || connected[0] || BROKERS[0];

      return (
        <div className="acct-wrap" ref={wrapRef}>
          <button className="acct-btn" onClick={() => setOpen(o => !o)}>
            <div className="acct-avatar" style={{background:curr.color}}>{curr.initials}</div>
            <div style={{textAlign:'left',flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,lineHeight:1.2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                {curr.label}
              </div>
              <div style={{fontSize:10,color:'var(--ink-3)',fontFamily:'var(--font-mono)',display:'flex',alignItems:'center',gap:4,marginTop:1}}>
                {curr.preview} · <ModeBadge mode={curr.mode} />
              </div>
            </div>
            <span style={{color:'var(--ink-4)',fontSize:10,flexShrink:0}}>{open?'▲':'▼'}</span>
          </button>

          {open && (
            <div className="acct-drop">
              <div className="acct-drop-head">Trading Account</div>

              {connected.length === 0 && (
                <div style={{padding:16,fontSize:13,color:'var(--ink-3)',textAlign:'center'}}>
                  No brokers connected yet
                </div>
              )}

              {/* Connected brokers — switchable */}
              {connected.map(b => (
                <div key={b.k} className={`acct-item${broker===b.k?' active':''}`}
                  onClick={() => { setBroker(b.k); setOpen(false); }}>
                  <div className="acct-avatar" style={{background:b.color,width:34,height:34,borderRadius:8,fontSize:12}}>
                    {b.initials}
                  </div>
                  <div className="acct-info">
                    <div className="acct-name">
                      {b.label} <ModeBadge mode={b.mode} />
                    </div>
                    <div className="acct-sub">
                      {b.preview}
                      {b.equity != null && <span style={{color:'var(--ink-2)',marginLeft:6}}>· {fmtShort(b.equity, b.ccy)}</span>}
                    </div>
                  </div>
                  {broker === b.k && <span className="acct-check">✓</span>}
                </div>
              ))}

              {/* Disconnected brokers — go to profile to connect */}
              {disconnected.length > 0 && (
                <>
                  <div className="acct-divider" />
                  <div style={{padding:'8px 14px 4px',fontSize:9,fontWeight:700,letterSpacing:'.12em',
                                textTransform:'uppercase',color:'var(--ink-4)'}}>Not Connected</div>
                  {disconnected.map(b => (
                    <div key={b.k} className="acct-item"
                      style={{opacity:0.6}}
                      onClick={() => { setOpen(false); window._setTab?.('profile'); }}>
                      <div className="acct-avatar" style={{background:b.color,width:34,height:34,borderRadius:8,fontSize:12,opacity:0.6}}>
                        {b.initials}
                      </div>
                      <div className="acct-info">
                        <div className="acct-name">{b.label}</div>
                        <div className="acct-sub" style={{color:'var(--accent)'}}>Tap to connect →</div>
                      </div>
                    </div>
                  ))}
                </>
              )}

              <div className="acct-divider" />
              <div className="acct-action" onClick={() => { setOpen(false); window._setTab?.('profile'); }}>
                <span style={{fontSize:15}}>＋</span> Connect new broker
              </div>
              <div className="acct-action" onClick={() => { setOpen(false); window._setTab?.('profile'); }}>
                <span style={{fontSize:15}}>⚙</span> Account settings
              </div>
              <div className="acct-divider" />
              <div className="acct-action danger" onClick={() => { setOpen(false); onLogout?.(); }}>
                <span style={{fontSize:15}}>→</span> Sign out
              </div>
            </div>
          )}
        </div>
      );
    };

    /* ── Broker history tab (non-Alpaca) ────────────────────── */
    const BrokerHistoryTab = ({ broker }) => (
      <div className="fadein">
        <div className="card" style={{padding:'14px 18px',marginBottom:16,background:'var(--accent-soft)',border:'1px solid var(--accent)'}}>
          <div style={{fontSize:13,color:'var(--accent)',fontWeight:600}}>
            📅 Showing trade history for {BROKER_LABELS[broker]}
          </div>
          <div style={{fontSize:12,color:'var(--ink-3)',marginTop:4}}>
            Deep historical analytics (Sharpe, MDD, equity curve) require Alpaca bot data. Switch to Alpaca to access full analytics.
          </div>
        </div>
        <CombinedTradesTab defaultBroker={broker} lockBroker />
      </div>
    );

    /* ── Broker analytics tab (non-Alpaca) ───────────────────── */
    const BrokerAnalyticsTab = ({ broker }) => (
      <div className="fadein">
        <div className="card" style={{maxWidth:640,margin:'0 auto'}}>
          <div className="card-hdr"><span className="card-title">📈 Analytics — {BROKER_LABELS[broker]}</span></div>
          <div style={{padding:32,textAlign:'center'}}>
            <div style={{fontSize:36,marginBottom:12}}>📊</div>
            <div style={{fontSize:15,fontWeight:600,marginBottom:8}}>Analytics computed from Alpaca bot logs</div>
            <div style={{fontSize:13,color:'var(--ink-3)',maxWidth:420,margin:'0 auto',lineHeight:1.6}}>
              Sharpe ratio, Sortino, Max Drawdown and signal attribution are derived from the Alpaca bot's trade log.
              For {BROKER_LABELS[broker]} trade history, use the <b>History</b> or <b>Combined</b> tabs.
            </div>
            <div style={{marginTop:20,display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
              <button className="btn primary" onClick={() => window._setTab?.('history')}>📅 View History</button>
              <button className="btn ghost" onClick={() => window._setTab?.('combined')}>🌐 Combined Trades</button>
            </div>
          </div>
        </div>
      </div>
    );

    /* ── Zerodha Overview (mirrors Alpaca layout) ─────────────── */
    const ZerodhaOverview = ({ aggData, loading, health }) => {
      const zInfo = aggData?.brokers?.zerodha || {};
      const zPos  = zInfo.positions || [];
      const openPnl = zPos.reduce((s,p) => s + (Number(p.pnl)||0), 0);
      const zFmt = v => {
        if (v == null || v === '') return '—';
        const n = Number(v); if (isNaN(n)) return '—';
        return (n < 0 ? '-₹' : '₹') + Math.abs(n).toLocaleString('en-IN', {maximumFractionDigits:2});
      };
      const zFmtCompact = v => {
        if (v == null || v === '') return '—';
        const n = Number(v); if (isNaN(n)) return '—';
        const abs = Math.abs(n);
        const sign = n < 0 ? '-' : '';
        if (abs >= 10000000) return `${sign}₹${(abs/10000000).toFixed(2)}Cr`;
        if (abs >= 100000)   return `${sign}₹${(abs/100000).toFixed(2)}L`;
        if (abs >= 1000)     return `${sign}₹${(abs/1000).toFixed(1)}k`;
        return `${sign}₹${abs.toFixed(0)}`;
      };
      const zClr = v => Number(v) > 0 ? 'var(--up)' : Number(v) < 0 ? 'var(--down)' : 'var(--ink-3)';

      // Live bot state
      const [bot, setBot] = useState(null);
      useEffect(() => {
        const load = () => fetch('/api/indian/state').then(r => r.json()).then(setBot).catch(() => {});
        load();
        const id = setInterval(load, 8000);
        return () => clearInterval(id);
      }, []);

      const botStatus = health?.services?.['indian-bot'] || 'unknown';
      const botRunning = botStatus === 'running';
      const dailyPnl = bot?.daily_pnl ?? 0;
      const dailyTrades = bot?.daily_trades ?? 0;
      const watchlist = bot?.watchlist || [];
      const log = bot?.log || [];
      const vix = bot?.vix;
      const alloc = bot?.allocation || {};

      if (!loading && !zInfo.connected) return (
        <div className="fadein">
          <div className="card" style={{maxWidth:560,margin:'40px auto'}}>
            <div className="card-hdr"><span className="card-title">Zerodha — Not Connected</span></div>
            <div style={{padding:24,textAlign:'center'}}>
              <div style={{fontSize:14,color:'var(--ink-3)',marginBottom:16}}>Connect your Zerodha account in Profile to view live data.</div>
              <button className="btn primary" onClick={() => window._setTab?.('profile')}>Go to Profile →</button>
            </div>
          </div>
        </div>
      );

      return (
        <div className="fadein">
          {/* Paused banner */}
          {bot?.trading_paused && (
            <div style={{background:'var(--warn-soft)',border:'1px solid transparent',borderRadius:'var(--r)',padding:'11px 16px',marginBottom:16,color:'var(--warn)',display:'flex',alignItems:'center',gap:8,fontSize:13}}>
              <span>⚠</span>
              <span style={{fontWeight:700}}>Trading Paused</span>
              {bot?.pause_reason && <span style={{color:'var(--ink-3)'}}>— {bot.pause_reason}</span>}
            </div>
          )}

          {/* Error banner */}
          {!loading && zInfo.error && (
            <div style={{background:'var(--down-soft)',color:'var(--down)',border:'1px solid var(--down)',borderRadius:'var(--r)',padding:'10px 14px',marginBottom:16,fontSize:13,display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
              <span>⚠ Zerodha API: {zInfo.error}</span>
              <button className="btn ghost" style={{padding:'3px 10px',fontSize:11,flexShrink:0}} onClick={() => window._setTab?.('profile')}>Re-login →</button>
            </div>
          )}

          {/* KPI cards — 4 col grid (mirrors Alpaca) */}
          <div className="kpis">
            <div className="kpi">
              <div className="lbl">Available Cash</div>
              <div className="val">{zFmtCompact(zInfo.available_cash)}</div>
              <div className="sub"><span style={{color:'var(--ink-3)'}}>Budget/trade: {zFmtCompact(alloc.budget_per_trade)}</span></div>
            </div>

            <div className="kpi">
              <div className="lbl">Day P&amp;L</div>
              <div className="val" style={{color:zClr(dailyPnl)}}>{dailyPnl>=0?'+':''}{Number(dailyPnl).toFixed(2)}%</div>
              <div className="sub">{dailyTrades} trade{dailyTrades!==1?'s':''} today</div>
              <div className="progress" style={{marginTop:8}}>
                <span style={{width:`${Math.min(Math.abs(dailyPnl)/3*100,100)}%`,background:dailyPnl>=0?'var(--up)':'var(--down)'}} />
              </div>
            </div>

            <div className="kpi">
              <div className="lbl">Open Positions</div>
              <div className="val">{zPos.length}<span style={{fontSize:16,color:'var(--ink-3)'}}> / {alloc.max_positions ?? '—'}</span></div>
              <div className="sub"><span style={{color:zClr(openPnl)}}>{openPnl>=0?'+':''}{zFmt(openPnl)} open</span></div>
              <div className="progress" style={{marginTop:8}}>
                <span style={{width:`${Math.min(zPos.length/(alloc.max_positions||5)*100,100)}%`}} />
              </div>
            </div>

            <div className="kpi">
              <div className="lbl">Bot Status</div>
              <div className="val" style={{fontSize:22,color:botRunning?'var(--up)':'var(--ink-3)'}}>
                {botRunning ? 'Active' : (botStatus.charAt(0).toUpperCase()+botStatus.slice(1))}
              </div>
              <div className="sub">
                {vix != null && <span>VIX: <span className="mono" style={{color:vix>=20?'var(--warn)':'var(--ink-2)'}}>{vix.toFixed(2)}</span></span>}
                {bot?.last_scan && <span style={{color:'var(--ink-4)',marginLeft:8}}>· {new Date(bot.last_scan).toLocaleTimeString('en-IN',{hour12:false}).slice(0,8)}</span>}
              </div>
            </div>
          </div>

          {/* Row 2: Positions + Bot Controls (mirrors Alpaca: Positions + Chart) */}
          <div className="row-2">
            <div className="card" style={{height:'100%'}}>
              <div className="card-hdr">
                <span className="card-title">Open Positions</span>
                <span className="pill accent">{zPos.length} / {alloc.max_positions ?? '—'}</span>
              </div>
              {zPos.length === 0
                ? <div className="empty">No open positions</div>
                : zPos.map((p,i) => {
                  const pnl = Number(p.pnl)||0;
                  const pct = p.avg ? ((Number(p.ltp||p.avg) - Number(p.avg)) / Number(p.avg) * 100) : 0;
                  return (
                    <div key={i} className="pos-row">
                      <div style={{display:'flex',alignItems:'center',gap:10,minWidth:0}}>
                        <div className="tick-glyph">{(p.symbol||'?').slice(0,3)}</div>
                        <div style={{minWidth:0}}>
                          <div style={{fontWeight:700,fontSize:13,color:'var(--ink)'}}>{p.symbol}</div>
                          <div style={{fontSize:11,color:'var(--ink-3)',fontFamily:'var(--font-mono)',marginTop:1}}>
                            {p.qty} × {zFmt(p.avg)}
                          </div>
                        </div>
                      </div>
                      <div style={{textAlign:'right',flexShrink:0}}>
                        <div style={{fontFamily:'var(--font-mono)',fontWeight:700,fontSize:14,color:zClr(pct)}}>{pct>=0?'+':''}{pct.toFixed(2)}%</div>
                        <div style={{fontSize:11,color:zClr(pnl),marginTop:2,fontFamily:'var(--font-mono)'}}>{zFmt(pnl)}</div>
                      </div>
                    </div>
                  );
                })
              }
            </div>
            <IndianBotControls health={health} />
          </div>

          {/* Row 3: Watchlist + Activity Log (mirrors Alpaca: Picks + Trades) */}
          <div className="row-2-eq">
            {/* Watchlist card */}
            <div className="card" style={{height:'100%'}}>
              <div className="card-hdr">
                <span className="card-title">🎯 Bot Watchlist</span>
                {watchlist.length > 0 && <Badge color="#10b981">{watchlist.length} symbols</Badge>}
              </div>
              <div style={{maxHeight:300,overflowY:'auto'}}>
                {watchlist.length === 0
                  ? <div className="empty"><div style={{fontSize:22,marginBottom:8}}>⏳</div>Bot not running — start it to populate watchlist</div>
                  : (
                    <div data-watchlist-grid style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(110px,1fr))',gap:6,padding:'12px'}}>
                      {watchlist.map((sym, i) => (
                        <div key={i} className="mono" style={{
                          background:'var(--bg-2)',border:'1px solid var(--line-soft)',
                          borderRadius:6,padding:'8px 10px',fontSize:12,fontWeight:600,
                          textAlign:'center',color:'var(--ink-2)',
                        }}>{sym}</div>
                      ))}
                    </div>
                  )
                }
              </div>
            </div>

            {/* Activity Log */}
            <Log rows={log.slice(0, 30).map(item => ({t: item.t, m: item.m}))} />
          </div>

          {/* Row 4: Today's Zerodha trades (no broker filter pills) */}
          <div style={{marginTop:16}}>
            <CombinedTradesTab defaultBroker="zerodha" lockBroker />
          </div>
        </div>
      );
    };

    /* ── Broker-aware overview (non-Alpaca) ─────────────────── */
    const BrokerAggregateOverview = ({ broker, aggData: aggProp, health }) => {
      const [agg, setAgg] = useState(aggProp || null);
      const [loading, setLoading] = useState(!aggProp);
      const load = useCallback(() => {
        fetch('/api/aggregate/overview')
          .then(r => r.json())
          .then(d => { setAgg(d); setLoading(false); })
          .catch(() => setLoading(false));
      }, []);
      useEffect(() => { if (!aggProp) { load(); const id = setInterval(load, 30000); return () => clearInterval(id); } }, [aggProp, load]);
      useEffect(() => { if (aggProp) { setAgg(aggProp); setLoading(false); } }, [aggProp]);

      if (broker === 'zerodha' || broker === 'indian') {
        return <ZerodhaOverview aggData={agg} loading={loading} health={health} />;
      }

      const info = agg?.brokers?.[broker] || {};
      const ccy = info.currency || (broker==='alpaca' ? 'USD' : 'INR');
      const fmt = v => {
        if (v == null || v === '') return '—';
        const n = Number(v); if (isNaN(n)) return '—';
        const sym = ccy === 'INR' ? '₹' : '$';
        return (n < 0 ? '-' + sym : sym) + Math.abs(n).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
      };
      const clr2 = v => Number(v) > 0 ? 'var(--up)' : Number(v) < 0 ? 'var(--down)' : 'var(--ink-3)';

      if (loading && !agg) return <div className="empty" style={{padding:40}}>Loading {BROKER_LABELS[broker]} data…</div>;

      if (!info.connected) return (
        <div className="fadein">
          <div className="card" style={{maxWidth:560,margin:'40px auto'}}>
            <div className="card-hdr"><span className="card-title">{BROKER_LABELS[broker]} — Not Connected</span></div>
            <div style={{padding:24,textAlign:'center'}}>
              <div style={{fontSize:14,color:'var(--ink-3)',marginBottom:16}}>Connect your {BROKER_LABELS[broker]} account in Profile.</div>
              <button className="btn primary" onClick={() => window._setTab?.('profile')}>Go to Profile</button>
            </div>
          </div>
        </div>
      );

      const positions = info.positions || [];
      const openPnl   = positions.reduce((s,p) => s + (Number(p.pnl)||0), 0);

      return (
        <div className="fadein">
          {info.error && (
            <div style={{background:'var(--down-soft)',color:'var(--down)',border:'1px solid var(--down)',borderRadius:'var(--r)',padding:'10px 14px',marginBottom:16,fontSize:13}}>
              {info.error}
            </div>
          )}
          <div className="kpis" style={{marginBottom:16}}>
            {(info.equity != null) && <div className="kpi"><div className="lbl">Equity</div><div className="val">{fmt(info.equity)}</div></div>}
            {(info.buying_power != null) && <div className="kpi"><div className="lbl">Buying Power</div><div className="val">{fmt(info.buying_power)}</div></div>}
            {(info.available_cash != null) && <div className="kpi"><div className="lbl">Available Cash</div><div className="val">{fmt(info.available_cash)}</div></div>}
            <div className="kpi">
              <div className="lbl">Open Positions</div>
              <div className="val">{positions.length}</div>
            </div>
            {positions.length > 0 && <div className="kpi">
              <div className="lbl">Open P&amp;L</div>
              <div className="val" style={{color:clr2(openPnl)}}>{fmt(openPnl)}</div>
            </div>}
          </div>

          {positions.length > 0 && (
            <div className="card" style={{marginBottom:16}}>
              <div className="card-hdr">
                <span className="card-title">Positions</span>
                <button className="btn ghost" style={{padding:'3px 9px',fontSize:11}} onClick={load}>↻</button>
              </div>
              <div style={{overflow:'auto'}}>
                <table>
                  <thead><tr><th>Symbol</th><th>Exchange</th><th>Qty</th><th>Avg</th><th>LTP</th><th>P&amp;L</th></tr></thead>
                  <tbody>
                    {positions.map((p,i) => (
                      <tr key={i}>
                        <td className="mono" style={{fontWeight:600}}>{p.symbol}</td>
                        <td style={{fontSize:11,color:'var(--ink-3)'}}>{p.exchange||'—'}</td>
                        <td className="mono">{p.qty}</td>
                        <td className="mono">{fmt(p.avg)}</td>
                        <td className="mono">{fmt(p.ltp)}</td>
                        <td className="mono" style={{color:clr2(p.pnl)}}>{fmt(p.pnl)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {(info.recent_orders||[]).length > 0 && (
            <div className="card" style={{marginBottom:16}}>
              <div className="card-hdr"><span className="card-title">Recent Orders</span></div>
              <div style={{overflow:'auto'}}>
                <table>
                  <thead><tr><th>Symbol</th><th>Side</th><th>Qty</th><th>Price</th><th>Status</th><th>Time</th></tr></thead>
                  <tbody>
                    {(info.recent_orders).map((o,i) => (
                      <tr key={i}>
                        <td className="mono" style={{fontWeight:600}}>{o.sym}</td>
                        <td><span className={`pill ${(o.side||'').toLowerCase()==='buy'?'up':'down'}`}>{(o.side||'').toUpperCase()}</span></td>
                        <td className="mono">{o.qty}</td>
                        <td className="mono">{fmt(o.px)}</td>
                        <td><span className="pill">{o.status}</span></td>
                        <td className="mono" style={{fontSize:11,color:'var(--ink-3)'}}>{o.ts?.slice(0,16).replace('T',' ')}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          <div className="card">
            <div className="card-hdr"><span className="card-title">Today's Trades</span></div>
            <div style={{padding:'4px 0'}}><CombinedTradesTab defaultBroker={broker} /></div>
          </div>
        </div>
      );
    };

    /* ── Alpaca broker tab ───────────────────────────────────── */
    const AlpacaTab = ({ me }) => {
      const [info, setInfo] = useState(null);
      const [loading, setLoading] = useState(true);
      const [err, setErr] = useState(null);
      const load = useCallback(() => {
        setLoading(true);
        fetch('/api/aggregate/overview')
          .then(r => r.ok ? r.json() : r.json().then(e => Promise.reject(e)))
          .then(d => { setInfo(d?.brokers?.alpaca || {}); setErr(null); })
          .catch(e => setErr(e?.error || 'Failed to load'))
          .finally(() => setLoading(false));
      }, []);
      useEffect(() => { load(); const id = setInterval(load, 30000); return () => clearInterval(id); }, [load]);

      const alp = me?.alpaca || {};
      const fmtUSD = v => {
        if (v == null || v === '') return '—';
        const n = Number(v); if (isNaN(n)) return '—';
        return (n < 0 ? '-$' : '$') + Math.abs(n).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
      };
      const clr = v => Number(v) > 0 ? 'var(--up)' : Number(v) < 0 ? 'var(--down)' : 'var(--ink-3)';

      if (!alp.connected) return (
        <div className="fadein">
          <div className="card" style={{maxWidth:560,margin:'40px auto'}}>
            <div className="card-hdr"><span className="card-title">🔌 Alpaca Not Connected</span></div>
            <div style={{padding:24,textAlign:'center'}}>
              <div style={{fontSize:14,color:'var(--ink-3)',marginBottom:16}}>
                Connect your Alpaca account in Profile to view positions and orders here.
              </div>
              <button className="btn primary" onClick={() => window._setTab?.('profile')}>Go to Profile</button>
            </div>
          </div>
        </div>
      );

      if (loading && !info) return <div className="empty" style={{padding:40}}>Loading Alpaca data…</div>;
      if (err && !info) return <div className="empty" style={{padding:40,color:'var(--down)'}}>{err} <button className="btn primary" style={{marginLeft:8}} onClick={load}>↻</button></div>;

      return (
        <div className="fadein">
          <div className="kpis" style={{marginBottom:16}}>
            <div className="kpi">
              <div className="lbl">Equity</div>
              <div className="val">{fmtUSD(info?.equity)}</div>
              <div className="sub"><span style={{color:'var(--ink-3)'}}>{alp.is_paper ? 'Paper' : 'Live'} · {alp.account_number?.slice(0,8) || '—'}</span></div>
            </div>
            <div className="kpi">
              <div className="lbl">Buying Power</div>
              <div className="val">{fmtUSD(info?.buying_power)}</div>
            </div>
            <div className="kpi">
              <div className="lbl">Open Positions</div>
              <div className="val">{(info?.positions || []).length}</div>
            </div>
            <div className="kpi">
              <div className="lbl">API Key</div>
              <div className="val" style={{fontSize:16,fontFamily:'var(--font-mono)'}}>{alp.key_preview || '—'}</div>
              <div className="sub"><span className={`pill ${alp.is_paper ? 'up' : 'down'}`}>{alp.is_paper ? 'PAPER' : 'LIVE'}</span></div>
            </div>
          </div>

          <div className="card" style={{marginBottom:16}}>
            <div className="card-hdr">
              <span className="card-title">Positions</span>
              <button className="btn ghost" style={{padding:'3px 9px',fontSize:11}} onClick={load}>↻ Refresh</button>
            </div>
            {!(info?.positions?.length) ? <div className="empty">No open positions</div> : (
              <div style={{overflow:'auto'}}>
                <table>
                  <thead><tr><th>Symbol</th><th>Qty</th><th>Avg Cost</th><th>Current</th><th>P&amp;L</th></tr></thead>
                  <tbody>
                    {(info.positions).map((p,i) => (
                      <tr key={i}>
                        <td className="mono" style={{fontWeight:600}}>{p.symbol}</td>
                        <td className="mono">{p.qty}</td>
                        <td className="mono">{fmtUSD(p.avg)}</td>
                        <td className="mono">{fmtUSD(p.ltp)}</td>
                        <td className="mono" style={{color:clr(p.pnl)}}>{fmtUSD(p.pnl)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          <div className="card">
            <div className="card-hdr"><span className="card-title">Recent Orders</span></div>
            {!(info?.recent_orders?.length) ? <div className="empty">No recent orders</div> : (
              <div style={{overflow:'auto'}}>
                <table>
                  <thead><tr><th>Symbol</th><th>Side</th><th>Qty</th><th>Fill Price</th><th>Status</th><th>Time</th></tr></thead>
                  <tbody>
                    {(info.recent_orders).map((o,i) => (
                      <tr key={i}>
                        <td className="mono" style={{fontWeight:600}}>{o.sym}</td>
                        <td><span className={`pill ${(o.side||'').toLowerCase()==='buy'?'up':'down'}`}>{(o.side||'').toUpperCase()}</span></td>
                        <td className="mono">{o.qty}</td>
                        <td className="mono">{fmtUSD(o.px)}</td>
                        <td><span className="pill">{o.status}</span></td>
                        <td className="mono" style={{fontSize:11,color:'var(--ink-3)'}}>{o.ts?.slice(0,16).replace('T',' ')}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    };

    /* ── All Accounts unified tab ───────────────────────────── */
    const AllAccountsTab = () => {
      const [data, setData] = useState(null);
      const [err, setErr] = useState(null);
      const [loading, setLoading] = useState(true);
      const mountedRef = useRef(true);
      useEffect(() => { mountedRef.current = true; return () => { mountedRef.current = false; }; }, []);
      const load = useCallback(() => {
        if (!mountedRef.current) return;
        setLoading(true);
        fetch('/api/aggregate/overview')
          .then(r => r.ok ? r.json() : r.json().then(e => Promise.reject(e)))
          .then(d => { if (mountedRef.current) { setData(d); setErr(null); } })
          .catch(e => { if (mountedRef.current) setErr(e?.error || String(e?.message || 'Failed to load')); })
          .finally(() => { if (mountedRef.current) setLoading(false); });
      }, []);
      useEffect(() => { load(); const id = setInterval(load, 30000); return () => clearInterval(id); }, [load]);

      if (loading && !data) return <div className="empty" style={{padding:40}}>Loading aggregate view…</div>;
      if (err && !data) return <div className="empty" style={{padding:40}}><div style={{color:'var(--down)',marginBottom:12}}>Error: {err}</div><button className="btn primary" onClick={load}>↻ Retry</button></div>;
      const b = data?.brokers || {};
      const totals = data?.totals || {};

      const fmtCcy = (v, ccy) => {
        if (v == null || v === '') return '—';
        const n = Number(v);
        if (Number.isNaN(n)) return String(v);
        const sign = ccy === 'INR' ? '₹' : '$';
        return sign + n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
      };
      const pnlClr = v => Number(v) > 0 ? '#10b981' : Number(v) < 0 ? '#ef4444' : 'var(--muted)';

      const StatusPill = ({connected, mode, error}) => (
        <span className={`pill ${error ? 'down' : connected ? (mode === 'live' ? 'down' : 'up') : ''}`}>
          {error ? 'ERROR' : connected ? (mode === 'live' ? 'LIVE' : 'CONNECTED') : 'NOT CONNECTED'}
        </span>
      );

      const BrokerCard = ({name, label, info, ccy}) => {
        if (!info?.connected) return (
          <div className="card">
            <div className="card-hdr">
              <span className="card-title">{label}</span>
              <StatusPill connected={false} />
            </div>
            <div style={{padding:18,color:'var(--muted)',fontSize:13}}>
              Not connected. Open the {label} tab to add credentials.
            </div>
          </div>
        );
        if (info.error) return (
          <div className="card">
            <div className="card-hdr">
              <span className="card-title">{label}</span>
              <StatusPill connected={true} error={true} />
            </div>
            <div style={{padding:18,color:'#ef4444',fontSize:13,fontFamily:'JetBrains Mono'}}>
              {info.error}
            </div>
          </div>
        );
        return (
          <div className="card">
            <div className="card-hdr">
              <span className="card-title">{label}</span>
              <StatusPill connected={true} mode={info.mode} />
            </div>
            <div style={{padding:18}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                {info.account && <div>
                  <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',fontWeight:700}}>Account</div>
                  <div className="mono" style={{fontSize:13,marginTop:4}}>{info.account}</div>
                </div>}
                {info.equity != null && <div>
                  <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',fontWeight:700}}>Equity</div>
                  <div className="mono" style={{fontSize:13,marginTop:4}}>{fmtCcy(info.equity, info.currency || ccy)}</div>
                </div>}
                {info.available_cash != null && <div>
                  <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',fontWeight:700}}>Cash</div>
                  <div className="mono" style={{fontSize:13,marginTop:4}}>{fmtCcy(info.available_cash, info.currency || ccy)}</div>
                </div>}
                {info.buying_power != null && <div>
                  <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',fontWeight:700}}>Buying power</div>
                  <div className="mono" style={{fontSize:13,marginTop:4}}>{fmtCcy(info.buying_power, info.currency || ccy)}</div>
                </div>}
                <div>
                  <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',fontWeight:700}}>Open positions</div>
                  <div className="mono" style={{fontSize:13,marginTop:4}}>{(info.positions || []).length}</div>
                </div>
              </div>
              {(info.positions || []).length > 0 && (
                <div style={{overflowX:'auto'}}>
                  <table>
                    <thead><tr><th>Symbol</th><th>Qty</th><th>Avg</th><th>LTP</th><th>P&L</th></tr></thead>
                    <tbody>
                      {info.positions.map((p,i) => (
                        <tr key={i}>
                          <td className="mono">{p.symbol}{p.exchange ? <span style={{color:'var(--muted)',marginLeft:4,fontSize:10}}>{p.exchange}</span> : null}</td>
                          <td className="mono">{p.qty}</td>
                          <td className="mono">{fmtCcy(p.avg, p.currency)}</td>
                          <td className="mono">{fmtCcy(p.ltp, p.currency)}</td>
                          <td className="mono" style={{color:pnlClr(p.pnl),fontWeight:700}}>{fmtCcy(p.pnl, p.currency)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
              {(info.recent_orders || []).length > 0 && (
                <div style={{marginTop:14}}>
                  <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',marginBottom:6}}>Recent orders</div>
                  <div style={{overflowX:'auto'}}>
                    <table>
                      <thead><tr><th>Time</th><th>Sym</th><th>Side</th><th>Qty</th><th>Px</th><th>Status</th></tr></thead>
                      <tbody>
                        {info.recent_orders.slice(0,5).map((o,i) => (
                          <tr key={i}>
                            <td className="mono" style={{fontSize:10}}>{(o.ts||'').slice(0,16).replace('T',' ')}</td>
                            <td className="mono">{o.sym}</td>
                            <td className="mono" style={{color:o.side === 'BUY' ? '#10b981' : '#ef4444',fontWeight:700}}>{o.side}</td>
                            <td className="mono">{o.qty}</td>
                            <td className="mono">{o.px}</td>
                            <td style={{fontSize:11,color:'var(--muted)'}}>{o.status}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      };

      const connectedCount = ['alpaca','angelone','zerodha'].filter(k => b[k]?.connected).length;

      return (
        <div className="fadein" style={{display:'grid',gridTemplateColumns:'1fr',gap:16,maxWidth:1640,margin:'0 auto'}}>
          {/* Summary banner */}
          <div className="card">
            <div className="card-hdr">
              <span className="card-title">🌐 All Accounts</span>
              <button className="btn ghost" style={{padding:'4px 12px',fontSize:11}} onClick={load}>↻ Refresh</button>
            </div>
            <div style={{padding:18,display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:10}}>
              <div style={{padding:12,background:'var(--bg-input)',borderRadius:8}}>
                <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',fontWeight:700}}>Connected brokers</div>
                <div className="mono" style={{fontSize:22,fontWeight:700,marginTop:4}}>{connectedCount} <span style={{color:'var(--muted)',fontSize:14}}>/ 3</span></div>
              </div>
              <div style={{padding:12,background:'var(--bg-input)',borderRadius:8}}>
                <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',fontWeight:700}}>Open positions</div>
                <div className="mono" style={{fontSize:22,fontWeight:700,marginTop:4}}>{totals.positions || 0}</div>
              </div>
              <div style={{padding:12,background:'var(--bg-input)',borderRadius:8}}>
                <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',fontWeight:700}}>Open P&L (USD)</div>
                <div className="mono" style={{fontSize:22,fontWeight:700,marginTop:4,color:pnlClr(totals.open_pnl_usd)}}>{fmtCcy(totals.open_pnl_usd, 'USD')}</div>
              </div>
              <div style={{padding:12,background:'var(--bg-input)',borderRadius:8}}>
                <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',fontWeight:700}}>Open P&L (INR)</div>
                <div className="mono" style={{fontSize:22,fontWeight:700,marginTop:4,color:pnlClr(totals.open_pnl_inr)}}>{fmtCcy(totals.open_pnl_inr, 'INR')}</div>{data?.fx?.inr_usd && Number(totals.open_pnl_inr) !== 0 && <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>≈ {fmtCcy(Number(totals.open_pnl_inr) * data.fx.inr_usd, 'USD')} @ {data.fx.usd_inr.toFixed(1)}</div>}
              </div>
            </div>
          </div>

          {/* Panic flat button — closes all positions across all brokers */}
          {totals.positions > 0 && (
            <div className="card" style={{borderColor:'var(--down)'}}>
              <div style={{padding:'14px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
                <div>
                  <div style={{fontWeight:700,color:'var(--down)',fontSize:14}}>Emergency Close All</div>
                  <div style={{fontSize:12,color:'var(--ink-3)',marginTop:2}}>Cancel all open orders and liquidate all positions across every connected broker.</div>
                </div>
                <PanicFlatBtn onDone={load} />
              </div>
            </div>
          )}

          {/* Per-broker cards */}
          <BrokerCard name="alpaca"   label="🇺🇸 Alpaca"    info={b.alpaca}   ccy="USD" />
          <BrokerCard name="angelone" label="🇮🇳 Angel One" info={b.angelone} ccy="INR" />
          <BrokerCard name="zerodha"  label="🇮🇳 Zerodha"   info={b.zerodha}  ccy="INR" />
        </div>
      );
    };

    /* ── Angel One Tab ────────────────────────────────────────── */
    const AngelOneTab = ({ me }) => {
      const toast       = useToast();
      const ao          = me?.angelone || {};
      const [view,      setView]      = useState('positions');
      const [positions, setPositions] = useState(null);
      const [holdings,  setHoldings]  = useState(null);
      const [orders,    setOrders]    = useState(null);
      const [account,   setAccount]   = useState(null);
      const [loading,   setLoading]   = useState(false);
      const [sqOff,     setSqOff]     = useState(false);
      const [orderBusy, setOrderBusy] = useState(false);
      const [search,    setSearch]    = useState('');
      const [searchRes, setSearchRes] = useState([]);
      const [searching, setSearching] = useState(false);

      const mountedRef = useRef(true);
      useEffect(() => {
        mountedRef.current = true;
        return () => { mountedRef.current = false; };
      }, []);

      const load = useCallback(async (what, signal) => {
        if (!mountedRef.current) return;
        setLoading(true);
        try {
          const r = await fetch(`/api/angelone/${what}`, { signal });
          const d = await r.json();
          if (!mountedRef.current) return;
          if (!r.ok) throw new Error(d?.error || d?.message || 'Failed');
          if (d?.status === false) throw new Error(d?.message || 'API error');
          if (what === 'positions') setPositions(Array.isArray(d) ? d : []);
          else if (what === 'holdings') setHoldings(Array.isArray(d) ? d : []);
          else if (what === 'orders')   setOrders(Array.isArray(d) ? d : []);
          else if (what === 'account')  setAccount(d && typeof d === 'object' && !Array.isArray(d) && !d.error ? d : null);
        } catch(e) {
          if (e.name === 'AbortError') return;
          if (mountedRef.current) toast.push(String(e?.message || e), 'error');
        } finally {
          if (mountedRef.current) setLoading(false);
        }
      }, []);

      // Single effect: load account once on connect, reload active view on view-change
      useEffect(() => {
        if (!ao.connected) return;
        const ctrl = new AbortController();
        if (view === 'positions') {
          load('account', ctrl.signal);
          load('positions', ctrl.signal);
        } else if (view === 'holdings') load('holdings', ctrl.signal);
        else if (view === 'orders')     load('orders', ctrl.signal);
        return () => ctrl.abort();
      }, [ao.connected, view, load]);

      const placeOrder = async (params) => {
        setOrderBusy(true);
        try {
          const r = await fetch('/api/angelone/order', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify(params),
          });
          const d = await r.json();
          if (!r.ok) throw new Error(d.message || d.error || 'Order failed');
          toast.push(`Order placed: ${d.order_id}`, 'success');
          setTimeout(() => load('orders'), 1500);
        } catch(e) { toast.push(e.message, 'error'); }
        finally { setOrderBusy(false); }
      };

      const cancelOrder = async (orderId, variety) => {
        if (!confirm(`Cancel order ${orderId}?`)) return;
        try {
          const r = await fetch(`/api/angelone/order/${orderId}?variety=${variety||'NORMAL'}`, { method:'DELETE' });
          const d = await r.json();
          if (!r.ok) throw new Error(d.message || d.error || 'Cancel failed');
          toast.push('Order cancelled', 'info');
          load('orders');
        } catch(e) { toast.push(e.message, 'error'); }
      };

      const squareOff = async () => {
        if (!confirm('Square off ALL Angel One intraday positions?')) return;
        setSqOff(true);
        try {
          const r = await fetch('/api/angelone/squareoff', { method:'POST' });
          const d = await r.json();
          if (!r.ok) throw new Error(d.message || d.error || 'Failed');
          const ok  = (d.results||[]).filter(x=>x.ok).length;
          const bad = (d.results||[]).filter(x=>!x.ok).length;
          toast.push(`Square off: ${ok} closed${bad?', '+bad+' failed':''}`, ok?'success':'error');
          load('positions');
        } catch(e) { toast.push(e.message, 'error'); }
        finally { setSqOff(false); }
      };

      const doSearch = async () => {
        if (!search) return;
        setSearching(true);
        try {
          const r = await fetch(`/api/angelone/search?exchange=NSE&q=${encodeURIComponent(search)}`);
          const d = await r.json();
          if (!r.ok) throw new Error(d.error||'Search failed');
          setSearchRes(d||[]);
        } catch(e) { toast.push(e.message,'error'); }
        finally { setSearching(false); }
      };

      if (!ao.connected) return (
        <div className="fadein" style={{maxWidth:600,margin:'40px auto',textAlign:'center'}}>
          <div className="card" style={{padding:32}}>
            <div style={{fontSize:40,marginBottom:12,color:'var(--ink-3)'}}>◈</div>
            <h2 style={{fontSize:18,fontWeight:700,marginBottom:8,color:'var(--ink)'}}>Angel One Not Connected</h2>
            <p style={{color:'var(--ink-3)',fontSize:14,marginBottom:20}}>
              Connect your Angel One account from the Profile tab to start trading on NSE/BSE.
            </p>
            <button className="btn primary" onClick={()=>window._setTab?.('profile')}>
              Go to Profile →
            </button>
          </div>
        </div>
      );

      return (
        <div className="fadein" style={{display:'grid',gridTemplateColumns:'1fr',gap:16}}>

          {/* Account summary */}
          {account && (
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:12}}>
              <MetCard label="Net Balance"      value={INR(account.net)}            color="#10b981" />
              <MetCard label="Available Cash"   value={INR(account.available_cash)} color="#3b82f6" />
              <MetCard label="Used Margin"      value={INR(account.used_margin)}    color="#f59e0b" />
              <MetCard label="M2M Unrealised"   value={INR(account.m2m_unrealised)} color={parseFloat(account.m2m_unrealised||0)>=0?'#10b981':'#ef4444'} />
              <MetCard label="M2M Realised"     value={INR(account.m2m_realised)}   color={parseFloat(account.m2m_realised||0)>=0?'#10b981':'#ef4444'} />
              <MetCard label="Client"           value={account.client_id}           color="#8b5cf6" />
            </div>
          )}

          {/* Sub-nav */}
          <div style={{display:'flex',gap:8,borderBottom:'1px solid var(--border)',paddingBottom:8}}>
            {['positions','holdings','orders','order','search'].map(v=>(
              <button key={v} onClick={()=>setView(v)}
                style={{padding:'6px 14px',fontSize:13,fontWeight:500,background:'none',border:'none',
                  color:view===v?'#3b82f6':'var(--muted)',
                  borderBottom:`2px solid ${view===v?'#3b82f6':'transparent'}`,cursor:'pointer'}}>
                {v.charAt(0).toUpperCase()+v.slice(1)}
              </button>
            ))}
            <button onClick={()=>load(view==='order'||view==='search'?'positions':view)}
              style={{marginLeft:'auto',padding:'5px 12px',fontSize:12,background:'var(--bg-input)',
                border:'1px solid var(--border)',borderRadius:6,cursor:'pointer',color:'var(--text)'}}>
              🔄 Refresh
            </button>
          </div>

          <div className="card">
            <div style={{padding:16}}>
              {loading && <div style={{textAlign:'center',padding:20,color:'var(--muted)'}}>Loading…</div>}

              {!loading && view === 'positions' && (
                <IndianPositionsTable positions={positions} onSquareOff={squareOff} squaringOff={sqOff} />
              )}
              {!loading && view === 'holdings' && (
                holdings == null
                  ? <div className="empty">Click refresh</div>
                  : holdings.length === 0
                    ? <div className="empty">No holdings</div>
                    : <div style={{overflowX:'auto'}}>
                        <table>
                          <thead><tr><th>Symbol</th><th>Exchange</th><th>Qty</th><th>Avg Buy</th><th>LTP</th><th>P&amp;L</th></tr></thead>
                          <tbody>
                            {holdings.map((h,i)=>(
                              <tr key={i}>
                                <td className="mono" style={{fontWeight:700}}>{h.tradingsymbol}</td>
                                <td>{h.exchange}</td>
                                <td className="mono">{h.quantity}</td>
                                <td className="mono">{INR(h.averageprice)}</td>
                                <td className="mono">{INR(h.ltp)}</td>
                                <td className="mono" style={{color:parseFloat(h.profitandloss||0)>=0?'#10b981':'#ef4444',fontWeight:700}}>
                                  {INR(h.profitandloss)}
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
              )}
              {!loading && view === 'orders' && (
                <IndianOrdersTable orders={orders} onCancel={cancelOrder} />
              )}
              {view === 'order' && (
                <div>
                  <h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>Place Order — Angel One (NSE/BSE)</h3>
                  <OrderForm
                    onSubmit={placeOrder}
                    loading={orderBusy}
                    exchanges={['NSE','BSE','NFO','MCX']}
                    products={['INTRADAY','DELIVERY','MARGIN','CARRYFORWARD']}
                    orderTypes={['MARKET','LIMIT','STOPLOSS_LIMIT','STOPLOSS_MARKET']}
                  />
                </div>
              )}
              {view === 'search' && (
                <div>
                  <h3 style={{fontSize:14,fontWeight:700,marginBottom:12}}>Symbol Search (NSE)</h3>
                  <div style={{display:'flex',gap:8,marginBottom:14}}>
                    <input value={search} onChange={e=>setSearch(e.target.value)}
                      placeholder="e.g. RELIANCE, TCS, INFY…"
                      onKeyDown={e=>e.key==='Enter'&&doSearch()}
                      style={{flex:1,background:'var(--bg-input)',border:'1px solid var(--border)',
                              borderRadius:6,padding:'8px 12px',color:'var(--text)',fontSize:13}} />
                    <button className="btn btn-blue" disabled={searching} onClick={doSearch}>
                      {searching?'Searching…':'Search'}
                    </button>
                  </div>
                  {searchRes.length > 0 && (
                    <table>
                      <thead><tr><th>Symbol</th><th>Token</th><th>Name</th><th>Exch</th></tr></thead>
                      <tbody>
                        {searchRes.map((s,i)=>(
                          <tr key={i}>
                            <td className="mono" style={{fontWeight:700}}>{s.tradingsymbol}</td>
                            <td className="mono" style={{color:'var(--muted)'}}>{s.symboltoken}</td>
                            <td style={{fontSize:12}}>{s.name}</td>
                            <td>{s.exch_seg}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    /* ── Zerodha Tab ──────────────────────────────────────────── */
    const ZerodhaTab = ({ me }) => {
      const toast       = useToast();
      const zrd         = me?.zerodha || {};
      const [view,      setView]      = useState('positions');
      const [positions, setPositions] = useState(null);
      const [holdings,  setHoldings]  = useState(null);
      const [orders,    setOrders]    = useState(null);
      const [account,   setAccount]   = useState(null);
      const [loading,    setLoading]    = useState(false);
      const [sqOff,      setSqOff]      = useState(false);
      const [orderBusy,  setOrderBusy]  = useState(false);
      const [reqToken,   setReqToken]   = useState('');
      const [tokenBusy,  setTokenBusy]  = useState(false);
      const [sessionExp, setSessionExp] = useState(false); // true when token is expired

      const mountedRef = useRef(true);
      useEffect(() => {
        mountedRef.current = true;
        return () => { mountedRef.current = false; };
      }, []);

      // Auth-error keywords returned by Kite when token is bad/expired
      const _isAuthErr = msg => /api_key|access_token|token|TokenException|Invalid/i.test(msg||'');

      const load = useCallback(async (what, signal) => {
        if (!mountedRef.current) return;
        setLoading(true);
        try {
          const r = await fetch(`/api/zerodha/${what}`, { signal });
          const d = await r.json();
          if (!mountedRef.current) return;
          if (!r.ok) {
            const msg = d?.error || d?.message || 'Failed';
            if (_isAuthErr(msg)) { setSessionExp(true); return; }
            throw new Error(msg);
          }
          setSessionExp(false);
          if (what === 'positions') setPositions(Array.isArray(d?.day) ? d.day : (Array.isArray(d) ? d : []));
          else if (what === 'holdings') setHoldings(Array.isArray(d) ? d : []);
          else if (what === 'orders')   setOrders(Array.isArray(d) ? d : []);
          else if (what === 'account')  setAccount(d && typeof d === 'object' && !Array.isArray(d) && !d.error ? d : null);
        } catch(e) {
          if (e.name === 'AbortError') return;
          if (mountedRef.current) toast.push(String(e?.message || e), 'error');
        } finally {
          if (mountedRef.current) setLoading(false);
        }
      }, []);

      // Single effect: load account + active view, abort on unmount or view-change
      useEffect(() => {
        if (!zrd.connected || !zrd.has_access_token) return;
        const ctrl = new AbortController();
        if (view === 'positions') {
          load('account', ctrl.signal);
          load('positions', ctrl.signal);
        } else if (view === 'holdings') load('holdings', ctrl.signal);
        else if (view === 'orders')     load('orders', ctrl.signal);
        return () => ctrl.abort();
      }, [zrd.connected, zrd.has_access_token, view, load]);

      const activateToken = async () => {
        if (!reqToken) { toast.push('Paste the request_token from the redirect URL', 'error'); return; }
        setTokenBusy(true);
        try {
          const r = await fetch('/api/zerodha/session', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ request_token: reqToken }),
          });
          const d = await r.json();
          if (!r.ok) throw new Error(d.message || d.error || 'Session failed');
          toast.push('Zerodha session established!', 'success');
          setReqToken('');
          window.location.reload();
        } catch(e) { toast.push(e.message, 'error'); }
        finally { setTokenBusy(false); }
      };

      const placeOrder = async (params) => {
        setOrderBusy(true);
        try {
          const r = await fetch('/api/zerodha/order', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({...params, product: params.product || 'MIS'}),
          });
          const d = await r.json();
          if (!r.ok) throw new Error(d.message || d.error || 'Order failed');
          toast.push(`Order placed: ${d.order_id}`, 'success');
          setTimeout(() => load('orders'), 1500);
        } catch(e) { toast.push(e.message, 'error'); }
        finally { setOrderBusy(false); }
      };

      const cancelOrder = async (orderId, variety) => {
        if (!confirm(`Cancel order ${orderId}?`)) return;
        try {
          const r = await fetch(`/api/zerodha/order/${orderId}?variety=${variety||'regular'}`, { method:'DELETE' });
          const d = await r.json();
          if (!r.ok) throw new Error(d.message || d.error || 'Cancel failed');
          toast.push('Order cancelled', 'info');
          load('orders');
        } catch(e) { toast.push(e.message, 'error'); }
      };

      const squareOff = async () => {
        if (!confirm('Square off ALL Zerodha MIS positions?')) return;
        setSqOff(true);
        try {
          const r = await fetch('/api/zerodha/squareoff', { method:'POST' });
          const d = await r.json();
          if (!r.ok) throw new Error(d.message || d.error || 'Failed');
          const ok  = (d.results||[]).filter(x=>x.ok).length;
          const bad = (d.results||[]).filter(x=>!x.ok).length;
          toast.push(`Square off: ${ok} closed${bad?', '+bad+' failed':''}`, ok?'success':'error');
          load('positions');
        } catch(e) { toast.push(e.message, 'error'); }
        finally { setSqOff(false); }
      };

      if (!zrd.connected) return (
        <div className="fadein" style={{maxWidth:600,margin:'40px auto',textAlign:'center'}}>
          <div className="card" style={{padding:32}}>
            <div style={{fontSize:40,marginBottom:12,color:'var(--ink-3)'}}>◉</div>
            <h2 style={{fontSize:18,fontWeight:700,marginBottom:8,color:'var(--ink)'}}>Zerodha Not Connected</h2>
            <p style={{color:'var(--ink-3)',fontSize:14,marginBottom:20}}>
              Connect your Zerodha account from the Profile tab to start trading on NSE/BSE.
            </p>
            <button className="btn primary" onClick={()=>window._setTab?.('profile')}>
              Go to Profile →
            </button>
          </div>
        </div>
      );

      // Connected but no access token yet — need OAuth step
      if (zrd.connected && !zrd.has_access_token) return (
        <div className="fadein" style={{maxWidth:600,margin:'40px auto'}}>
          <div className="card">
            <div className="card-hdr"><span className="card-title">🔐 Zerodha — Activate Session</span></div>
            <div style={{padding:18}}>
              <p style={{fontSize:13,color:'var(--muted)',marginBottom:14}}>
                Zerodha requires a daily login. Click the button below to open Kite login, then paste the
                <code style={{background:'var(--bg-input)',padding:'1px 5px',borderRadius:4,fontSize:12}}>request_token</code>
                from the redirect URL.
              </p>
              <a href={zrd.login_url} target="_blank" rel="noopener"
                className="btn btn-blue" style={{display:'inline-block',marginBottom:14,textDecoration:'none'}}>
                🔗 Open Kite Login
              </a>
              <br/>
              <label style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>
                Paste request_token here
              </label>
              <div style={{display:'flex',gap:8,marginTop:6}}>
                <input value={reqToken} onChange={e=>setReqToken(e.target.value)}
                  placeholder="abc123xyz…"
                  style={{flex:1,background:'var(--bg-input)',border:'1px solid var(--border)',
                          borderRadius:6,padding:'9px 12px',color:'var(--text)',fontSize:13,fontFamily:'JetBrains Mono'}} />
                <button className="btn btn-green" disabled={tokenBusy||!reqToken} onClick={activateToken}>
                  {tokenBusy?'Activating…':'Activate'}
                </button>
              </div>
            </div>
          </div>
        </div>
      );

      // Token expired or invalid — show re-login UI (same as no-token state)
      if (sessionExp) return (
        <div className="fadein" style={{maxWidth:600,margin:'40px auto'}}>
          <div className="card">
            <div className="card-hdr"><span className="card-title">🔐 Zerodha — Session Expired</span></div>
            <div style={{padding:18}}>
              <div style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',
                           borderRadius:7,padding:'10px 14px',marginBottom:16,color:'#ef4444',fontSize:13}}>
                ⚠️ Your Zerodha access token has expired (daily reset at ~6 AM IST). Please re-login.
              </div>
              <a href={zrd.login_url} target="_blank" rel="noopener"
                className="btn btn-blue" style={{display:'inline-block',marginBottom:14,textDecoration:'none'}}>
                🔗 Open Kite Login
              </a>
              <br/>
              <label style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>
                Paste request_token from the redirect URL
              </label>
              <div style={{display:'flex',gap:8,marginTop:6}}>
                <input value={reqToken} onChange={e=>setReqToken(e.target.value)}
                  placeholder="abc123xyz…"
                  style={{flex:1,background:'var(--bg-input)',border:'1px solid var(--border)',
                          borderRadius:6,padding:'9px 12px',color:'var(--text)',fontSize:13,fontFamily:'JetBrains Mono'}} />
                <button className="btn btn-green" disabled={tokenBusy||!reqToken} onClick={activateToken}>
                  {tokenBusy?'Activating…':'Activate'}
                </button>
              </div>
            </div>
          </div>
        </div>
      );

      return (
        <div className="fadein" style={{display:'grid',gridTemplateColumns:'1fr',gap:16}}>

          {account && (
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:12}}>
              <MetCard label="Available Cash"    value={INR(account.available_cash)}   color="#10b981" />
              <MetCard label="Opening Balance"   value={INR(account.opening_balance)}  color="#3b82f6" />
              <MetCard label="Used Margin"       value={INR(account.used_margin)}      color="#f59e0b" />
              <MetCard label="Net"               value={INR(account.net)}              color={(account.net||0)>=0?'#10b981':'#ef4444'} />
              <MetCard label="Client"            value={account.client_id}             color="#8b5cf6" />
            </div>
          )}

          <div style={{display:'flex',gap:8,borderBottom:'1px solid var(--border)',paddingBottom:8}}>
            {['positions','holdings','orders','order'].map(v=>(
              <button key={v} onClick={()=>setView(v)}
                style={{padding:'6px 14px',fontSize:13,fontWeight:500,background:'none',border:'none',
                  color:view===v?'#3b82f6':'var(--muted)',
                  borderBottom:`2px solid ${view===v?'#3b82f6':'transparent'}`,cursor:'pointer'}}>
                {v.charAt(0).toUpperCase()+v.slice(1)}
              </button>
            ))}
            <button onClick={()=>load(view==='order'?'positions':view)}
              style={{marginLeft:'auto',padding:'5px 12px',fontSize:12,background:'var(--bg-input)',
                border:'1px solid var(--border)',borderRadius:6,cursor:'pointer',color:'var(--text)'}}>
              🔄 Refresh
            </button>
          </div>

          <div className="card">
            <div style={{padding:16}}>
              {loading && <div style={{textAlign:'center',padding:20,color:'var(--muted)'}}>Loading…</div>}

              {!loading && view === 'positions' && (
                <IndianPositionsTable positions={positions} onSquareOff={squareOff} squaringOff={sqOff} />
              )}
              {!loading && view === 'holdings' && (
                holdings == null
                  ? <div className="empty">Click refresh</div>
                  : holdings.length === 0
                    ? <div className="empty">No holdings</div>
                    : <div style={{overflowX:'auto'}}>
                        <table>
                          <thead><tr><th>Symbol</th><th>Exchange</th><th>Qty</th><th>Avg Buy</th><th>LTP</th><th>P&amp;L</th></tr></thead>
                          <tbody>
                            {holdings.map((h,i)=>(
                              <tr key={i}>
                                <td className="mono" style={{fontWeight:700}}>{h.tradingsymbol}</td>
                                <td>{h.exchange}</td>
                                <td className="mono">{h.quantity}</td>
                                <td className="mono">{INR(h.average_price)}</td>
                                <td className="mono">{INR(h.last_price)}</td>
                                <td className="mono" style={{color:parseFloat(h.pnl||0)>=0?'#10b981':'#ef4444',fontWeight:700}}>
                                  {INR(h.pnl)}
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
              )}
              {!loading && view === 'orders' && (
                <IndianOrdersTable orders={orders} onCancel={cancelOrder} />
              )}
              {view === 'order' && (
                <div>
                  <h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>Place Order — Zerodha (NSE/BSE)</h3>
                  <OrderForm
                    onSubmit={placeOrder}
                    loading={orderBusy}
                    exchanges={['NSE','BSE','NFO','BFO','MCX','CDS']}
                    products={['MIS','CNC','NRML']}
                    orderTypes={['MARKET','LIMIT','SL','SL-M']}
                  />
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    /*  APP                                                       */
    /* ══════════════════════════════════════════════════════════ */
    const App = () => {
      const [data,      setData]      = useState(null);
      const [health,    setHealth]    = useState(null);
      const [tab,       setTab]       = useState('overview');
      const [connected, setConnected] = useState(false);
      const [clock,     setClock]     = useState('');
      const [me,        setMe]        = useState(null);
      const [broker,    setBroker]    = useState(() => localStorage.getItem('sel_broker') || 'alpaca');
      const [aggData,   setAggData]   = useState(null);
      const lastTradeIds = useRef(new Set());
      useEffect(() => { localStorage.setItem('sel_broker', broker); }, [broker]);

      /* Aggregate data — all broker balances/positions (30s refresh) */
      useEffect(() => {
        const load = () => fetch('/api/aggregate/overview').then(r => r.json()).then(setAggData).catch(() => {});
        load();
        const id = setInterval(load, 30000);
        return () => clearInterval(id);
      }, []);

      const handleLogout = async () => {
        await fetch('/api/logout', { method: 'POST' });
        window.location.href = '/login';
      };

      /* Load current user (and apply server-side theme preference) */
      const loadMe = useCallback(() => {
        fetch('/api/me').then(r => {
          if (r.status === 401) { window.location.href = '/login'; return null; }
          return r.json();
        }).then(d => {
          if (!d) return;
          setMe(d);
          if (d.theme) applyThemeAttr(d.theme);
        }).catch(() => {});
      }, []);
      useEffect(() => { loadMe(); }, [loadMe]);

      /* Handle Zerodha OAuth callback — two cases:
         1. /api/zerodha/callback processed it → ?zerodha_ok=1 or ?zerodha_error=...
         2. Kite redirect URL points to / directly → ?request_token=XXX&status=success */
      useEffect(() => {
        const sp           = new URLSearchParams(window.location.search);
        const ok           = sp.get('zerodha_ok');
        const err          = sp.get('zerodha_error');
        const requestToken = sp.get('request_token');
        const status       = sp.get('status');

        if (!ok && !err && !requestToken) return;

        // Case 1: backend already exchanged the token
        if (ok)  { toast.push('Zerodha session activated!', 'success'); setTab('profile'); loadMe(); }
        if (err) { toast.push('Zerodha activation failed: ' + decodeURIComponent(err).replace(/_/g,' '), 'error'); setTab('profile'); }

        // Case 2: raw Kite redirect landed on / — exchange the token now
        if (requestToken && status === 'success') {
          fetch('/api/zerodha/session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ request_token: requestToken }),
          }).then(r => r.json()).then(d => {
            if (d.ok) {
              toast.push('Zerodha session activated!', 'success');
            } else {
              toast.push('Zerodha activation failed: ' + (d.error || 'unknown error'), 'error');
            }
            setTab('profile');
            loadMe();
          }).catch(() => toast.push('Zerodha session request failed', 'error'));
        }

        window.history.replaceState({}, '', window.location.pathname + window.location.hash);
      }, [loadMe]);

      /* ── Broker health (banner for silently-broken credentials) ───── */
      const [brokerHealth, setBrokerHealth] = useState(null);
      const [healthDismissed, setHealthDismissed] = useState({});
      useEffect(() => {
        const refresh = (force = false) => fetch('/api/brokers/health' + (force ? '?force=1' : ''))
          .then(r => r.ok ? r.json() : null)
          .then(d => d && setBrokerHealth(d))
          .catch(() => {});
        refresh();
        // Poll every 5 minutes — backend caches each broker for 5 min so this is cheap
        const id = setInterval(() => refresh(false), 300000);
        // Also re-check when window regains focus (after user reconnects from another tab)
        const onFocus = () => refresh(true);
        window.addEventListener('focus', onFocus);
        window._refreshBrokerHealth = () => refresh(true);
        return () => { clearInterval(id); window.removeEventListener('focus', onFocus); window._refreshBrokerHealth = null; };
      }, []);
