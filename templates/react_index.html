<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlgoTrader Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel (in-browser JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Inter + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #060d18;
      --bg-card:     #0b1629;
      --bg-hover:    #0f1e35;
      --bg-input:    #0d1e38;
      --border:      #162440;
      --border-lt:   #1e3356;

      --blue:        #3b82f6;
      --blue-bg:     rgba(59,130,246,.12);
      --green:       #10b981;
      --green-bg:    rgba(16,185,129,.12);
      --red:         #ef4444;
      --red-bg:      rgba(239,68,68,.12);
      --yellow:      #f59e0b;
      --yellow-bg:   rgba(245,158,11,.12);
      --purple:      #8b5cf6;
      --purple-bg:   rgba(139,92,246,.12);

      --text:        #e2e8f0;
      --muted:       #64748b;
      --dim:         #334155;
    }

    html { font-size: 14px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-lt); }

    .mono { font-family: 'JetBrains Mono', monospace; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      padding: 9px 14px;
      text-align: left;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      background: rgba(6,13,24,.9);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1;
      white-space: nowrap;
    }
    tbody td {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(22,36,64,.7);
      vertical-align: middle;
    }
    tbody tr:hover td { background: var(--bg-hover); }
    tbody tr:last-child td { border-bottom: none; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .card-hdr {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .empty {
      padding: 36px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .btn {
      padding: 8px 14px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      border: 1px solid;
      font-family: 'Inter', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      letter-spacing: .02em;
    }
    .btn:hover { filter: brightness(1.2); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); filter: brightness(.95); }
    .btn-green  { background: rgba(16,185,129,.12);  color: #10b981; border-color: rgba(16,185,129,.35); }
    .btn-red    { background: rgba(239,68,68,.12);   color: #ef4444; border-color: rgba(239,68,68,.35); }
    .btn-blue   { background: rgba(59,130,246,.12);  color: #3b82f6; border-color: rgba(59,130,246,.35); }
    .btn-yellow { background: rgba(245,158,11,.12);  color: #f59e0b; border-color: rgba(245,158,11,.35); }
    .btn-ghost  { background: transparent; color: var(--muted); border-color: var(--border); }

    input[type="number"] {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      outline: none;
      transition: border-color .15s;
    }
    input[type="number"]:focus { border-color: var(--blue); }

    @keyframes pulse  { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }
    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .pulse  { animation: pulse  1.8s ease-in-out infinite; }
    .spin   { animation: spin   1s  linear      infinite; }
    .fadein { animation: fadein .25s ease; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Format helpers ──────────────────────────────────────── */
    const f$ = n =>
      n == null ? '—' : (n < 0 ? '-' : '') + '$' +
      Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2});

    const fpct = n =>
      n == null ? '—' : (n >= 0 ? '+' : '') + n.toFixed(2) + '%';

    const clr = (n, pos='#10b981', neg='#ef4444', zero='#64748b') =>
      n == null ? zero : n > 0 ? pos : n < 0 ? neg : zero;

    /* ── Dot ─────────────────────────────────────────────────── */
    const Dot = ({ on, pulse }) => (
      <span style={{
        display: 'inline-block', width: 8, height: 8, borderRadius: '50%', flexShrink: 0,
        background: on ? '#10b981' : '#ef4444',
        boxShadow: `0 0 6px ${on ? '#10b981' : '#ef4444'}`,
        ...(pulse && on ? { animation: 'pulse 1.8s ease-in-out infinite' } : {}),
      }} />
    );

    /* ── Badge ───────────────────────────────────────────────── */
    const Badge = ({ children, color = '#64748b', bg }) => (
      <span className="badge" style={{
        color,
        background: bg || (color + '1a'),
      }}>{children}</span>
    );

    /* ── Regime badge ────────────────────────────────────────── */
    const Regime = ({ v }) => {
      const map = {
        bullish:  ['#10b981','Bullish'],
        trending: ['#3b82f6','Trending'],
        bearish:  ['#ef4444','Bearish'],
        choppy:   ['#f59e0b','Choppy'],
        unknown:  ['#64748b','Unknown'],
      };
      const [c, label] = map[v?.toLowerCase()] || map.unknown;
      return <Badge color={c}>{label}</Badge>;
    };

    /* ── Win-rate bar ────────────────────────────────────────── */
    const WinBar = ({ wins = 0, losses = 0 }) => {
      const total = wins + losses;
      const pct   = total ? Math.round(wins / total * 100) : 0;
      return (
        <div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:11,fontFamily:'JetBrains Mono'}}>
            <span style={{color:'#10b981'}}>{wins}W</span>
            <span style={{color:'#94a3b8',fontWeight:700}}>{pct}%</span>
            <span style={{color:'#ef4444'}}>{losses}L</span>
          </div>
          <div style={{height:5,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
            <div style={{
              height:'100%', width:`${pct}%`, borderRadius:3,
              background:'linear-gradient(90deg,#10b981,#34d399)',
              transition:'width .5s ease',
            }} />
          </div>
        </div>
      );
    };

    /* ── Confidence bar ──────────────────────────────────────── */
    const ConfBar = ({ value = 0 }) => {
      const c = value >= 75 ? '#10b981' : value >= 55 ? '#3b82f6' : '#f59e0b';
      return (
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{flex:1,height:4,background:'var(--border)',borderRadius:2,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${Math.min(value,100)}%`,background:c,borderRadius:2,transition:'width .5s'}} />
          </div>
          <span style={{fontSize:12,fontWeight:700,fontFamily:'JetBrains Mono',color:c,width:28,textAlign:'right'}}>{value}</span>
        </div>
      );
    };

    /* ── Metric card ─────────────────────────────────────────── */
    const MetCard = ({ label, value, sub, color, children }) => (
      <div style={{
        background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:10, padding:'14px 16px',
        transition:'border-color .15s, transform .15s', cursor:'default',
      }}
        onMouseEnter={e=>{ e.currentTarget.style.borderColor='var(--border-lt)'; e.currentTarget.style.transform='translateY(-2px)'; }}
        onMouseLeave={e=>{ e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.transform=''; }}
      >
        <div style={{fontSize:10,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--muted)',marginBottom:8}}>{label}</div>
        <div style={{fontSize:22,fontWeight:700,fontFamily:'JetBrains Mono',color:color||'var(--text)',lineHeight:1}}>{value}</div>
        {sub   && <div style={{fontSize:11,color:'var(--muted)',marginTop:5}}>{sub}</div>}
        {children && <div style={{marginTop:8}}>{children}</div>}
      </div>
    );

    /* ── P&L chart ───────────────────────────────────────────── */
    const PnLChart = ({ curve }) => {
      const ref   = useRef(null);
      const chart = useRef(null);
      const dep   = JSON.stringify(curve);

      useEffect(() => {
        if (!ref.current || !window.Chart) return;
        chart.current?.destroy();

        const labels = curve?.length ? curve.map(p => p.time) : ['09:30','—'];
        const vals   = curve?.length ? curve.map(p => p.pnl)  : [0, 0];
        const last   = vals[vals.length - 1] ?? 0;
        const c      = last >= 0 ? '#10b981' : '#ef4444';
        const cBg    = last >= 0 ? 'rgba(16,185,129,.1)' : 'rgba(239,68,68,.1)';

        chart.current = new window.Chart(ref.current.getContext('2d'), {
          type: 'line',
          data: {
            labels,
            datasets: [{
              data: vals,
              borderColor: c,
              backgroundColor: cBg,
              fill: true,
              tension: 0.4,
              pointRadius: vals.length > 20 ? 0 : 4,
              pointHoverRadius: 5,
              pointBackgroundColor: c,
              borderWidth: 2,
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#0b1629',
                borderColor: '#162440',
                borderWidth: 1,
                titleColor: '#64748b',
                bodyColor: c,
                callbacks: { label: ctx => ' ' + f$(ctx.raw) }
              }
            },
            scales: {
              x: {
                grid: { color: 'rgba(22,36,64,.6)' },
                ticks: { color: '#64748b', font: { size: 10, family: 'JetBrains Mono' }, maxTicksLimit: 8 }
              },
              y: {
                grid: { color: 'rgba(22,36,64,.6)' },
                ticks: {
                  color: '#64748b',
                  font: { size: 10, family: 'JetBrains Mono' },
                  callback: v => '$' + v.toFixed(0)
                },
                grace: '10%',
              }
            }
          }
        });
        return () => chart.current?.destroy();
      }, [dep]);

      return (
        <div style={{ height: 230, position: 'relative' }}>
          <canvas ref={ref} />
          {(!curve || curve.length === 0) && (
            <div style={{
              position:'absolute', inset:0, display:'flex', alignItems:'center',
              justifyContent:'center', color:'var(--muted)', fontSize:13, pointerEvents:'none'
            }}>No completed trades yet today</div>
          )}
        </div>
      );
    };

    /* ── Positions table ─────────────────────────────────────── */
    const Positions = ({ rows = [] }) => (
      <div className="card" style={{height:'100%'}}>
        <div className="card-hdr">
          <span className="card-title">📍 Open Positions</span>
          <Badge color="#3b82f6">{rows.length} / 3</Badge>
        </div>
        <div style={{overflowX:'auto',maxHeight:290,overflowY:'auto'}}>
          <table>
            <thead><tr>
              <th>Symbol</th><th>Qty</th><th>Entry</th><th>Current</th><th>P&L %</th><th>Stop</th>
            </tr></thead>
            <tbody>
              {rows.length === 0
                ? <tr><td colSpan="6"><div className="empty">No open positions</div></td></tr>
                : rows.map((p, i) => (
                  <tr key={i}>
                    <td style={{borderLeft:`3px solid ${clr(p.pct)}`}}>
                      <span style={{fontWeight:700}}>{p.sym}</span>
                    </td>
                    <td className="mono">{p.qty}</td>
                    <td className="mono">{f$(p.entry)}</td>
                    <td className="mono">{f$(p.curr)}</td>
                    <td className="mono" style={{color:clr(p.pct),fontWeight:700}}>{fpct(p.pct)}</td>
                    <td className="mono" style={{color:'var(--muted)'}}>{f$(p.stop)}</td>
                  </tr>
                ))
              }
            </tbody>
          </table>
        </div>
      </div>
    );

    /* ── AI Picks ────────────────────────────────────────────── */
    const Picks = ({ rows = [] }) => (
      <div className="card" style={{height:'100%'}}>
        <div className="card-hdr">
          <span className="card-title">🎯 AI Scanner Picks</span>
          {rows.length > 0 && <Badge color="#10b981">{rows.length} picks</Badge>}
        </div>
        <div style={{maxHeight:290,overflowY:'auto'}}>
          {rows.length === 0
            ? <div className="empty"><div style={{fontSize:22,marginBottom:8}}>⏳</div>Waiting for scanner results…</div>
            : rows.map((p, i) => (
              <div key={i} style={{
                padding:'11px 16px',
                borderBottom:'1px solid rgba(22,36,64,.6)',
                display:'flex', justifyContent:'space-between', alignItems:'center', gap:12,
              }}>
                <div style={{minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:15}}>{p.symbol}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>
                    {p.sector}
                    {p.rel_volume != null && <span style={{color:'#3b82f6',marginLeft:6}}>{p.rel_volume}× vol</span>}
                    {p.pre_market_gap > 0 && <span style={{color:'#f59e0b',marginLeft:6}}>+{p.pre_market_gap}% gap</span>}
                  </div>
                  <div style={{fontSize:11,color:'#94a3b8',marginTop:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:200}}
                    title={p.reason}>{p.reason}</div>
                </div>
                <div style={{flexShrink:0,minWidth:120,textAlign:'right'}}>
                  <ConfBar value={p.confidence} />
                  {p.news_sentiment && (
                    <div style={{marginTop:5}}>
                      <Badge
                        color={p.news_sentiment==='positive'?'#10b981':p.news_sentiment==='negative'?'#ef4444':'#64748b'}
                      >{p.news_sentiment}</Badge>
                    </div>
                  )}
                </div>
              </div>
            ))
          }
        </div>
      </div>
    );

    /* ── Trade history ───────────────────────────────────────── */
    const Trades = ({ rows = [], full }) => (
      <div className="card" style={{height:'100%'}}>
        <div className="card-hdr">
          <span className="card-title">📋 {full ? 'Full Trade History' : "Today's Trades"}</span>
          <Badge color="#64748b">{rows.length}</Badge>
        </div>
        <div style={{overflowX:'auto',maxHeight: full ? 600 : 290, overflowY:'auto'}}>
          <table>
            <thead><tr>
              <th>Time</th><th>Symbol</th><th>Side</th><th>Qty</th><th>Price</th><th>P&L</th><th>Reason</th>
            </tr></thead>
            <tbody>
              {rows.length === 0
                ? <tr><td colSpan="7"><div className="empty">No trades today</div></td></tr>
                : rows.map((t, i) => {
                  const buy  = t.action?.toLowerCase() === 'buy';
                  const hasPnl = !buy && t.pct != null;
                  return (
                    <tr key={i}>
                      <td className="mono" style={{color:'var(--muted)',fontSize:11}}>{String(t.time||'').substring(11,19)}</td>
                      <td style={{fontWeight:700,borderLeft:`3px solid ${buy?'#10b981':'#ef4444'}`}}>{t.sym}</td>
                      <td>
                        <Badge color={buy?'#10b981':'#ef4444'}>{t.action?.toUpperCase()}</Badge>
                      </td>
                      <td className="mono">{t.qty||'—'}</td>
                      <td className="mono">{f$(t.price)}</td>
                      <td className="mono" style={{color:hasPnl?clr(t.pct):'var(--muted)',fontWeight:hasPnl?700:400}}>
                        {hasPnl ? fpct(t.pct) : '—'}
                      </td>
                      <td style={{color:'var(--muted)',fontSize:11,maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}
                        title={t.reason}>{t.reason?.substring(0,35)}{t.reason?.length>35?'…':''}</td>
                    </tr>
                  );
                })
              }
            </tbody>
          </table>
        </div>
      </div>
    );

    /* ── Activity log ────────────────────────────────────────── */
    const Log = ({ rows = [] }) => (
      <div className="card" style={{height:'100%'}}>
        <div className="card-hdr"><span className="card-title">📟 Activity Log</span></div>
        <div style={{
          fontFamily:'JetBrains Mono,monospace', fontSize:12, lineHeight:1.6,
          padding:'12px 16px', maxHeight:280, overflowY:'auto',
          background:'rgba(6,13,24,.6)',
        }}>
          {rows.length === 0
            ? <span style={{color:'var(--muted)',fontStyle:'italic'}}>No activity yet</span>
            : rows.map((item, i) => (
              <div key={i} style={{marginBottom:4,display:'flex',gap:8}}>
                <span style={{color:'#3b82f6',flexShrink:0}}>[{item.t}]</span>
                <span style={{color:'#94a3b8'}}>{item.m}</span>
              </div>
            ))
          }
        </div>
      </div>
    );

    /* ── Controls ────────────────────────────────────────────── */
    const Controls = ({ onAction, paused, pauseReason }) => {
      const [busy, setBusy] = useState(null);
      const [msg,  setMsg]  = useState(null);

      const act = async (action) => {
        if (action === 'close_all' && !confirm('Close ALL open positions now?')) return;
        setBusy(action);
        try {
          const r = await fetch('/api/action', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({action}),
          });
          const d = await r.json();
          setMsg({ ok: d.status === 'success', text: d.status === 'success' ? `✓ ${action} done` : d.message });
        } catch {
          setMsg({ ok: false, text: 'Request failed' });
        } finally {
          setBusy(null);
          setTimeout(() => setMsg(null), 3000);
        }
      };

      return (
        <div className="card">
          <div className="card-hdr"><span className="card-title">⚙️ Bot Controls</span></div>
          <div style={{padding:14}}>
            {paused && (
              <div style={{
                background:'rgba(245,158,11,.1)', border:'1px solid rgba(245,158,11,.3)',
                borderRadius:7, padding:'9px 12px', marginBottom:12,
                color:'#f59e0b', fontSize:12, display:'flex', alignItems:'center', gap:6,
              }}>⚠️ {pauseReason || 'Bot is paused'}</div>
            )}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {[
                ['start',     'btn-green',  '▶ Start'],
                ['stop',      'btn-red',    '⏸ Stop'],
                ['scan',      'btn-blue',   '🔍 Scan'],
                ['close_all', 'btn-yellow', '✕ Close All'],
              ].map(([a, cls, label]) => (
                <button key={a} className={`btn ${cls}`} onClick={() => act(a)}>
                  {busy === a ? <span className="spin" style={{width:12,height:12,border:'2px solid currentColor',borderTopColor:'transparent',borderRadius:'50%',display:'inline-block'}} /> : label}
                </button>
              ))}
            </div>
            {msg && (
              <div style={{
                marginTop:10, padding:'8px 12px', borderRadius:6, fontSize:12,
                background: msg.ok ? 'rgba(16,185,129,.1)' : 'rgba(239,68,68,.1)',
                color:       msg.ok ? '#10b981'            : '#ef4444',
              }}>{msg.text}</div>
            )}
          </div>
        </div>
      );
    };

    /* ── System health ───────────────────────────────────────── */
    const Health = ({ health }) => {
      const svcs = [
        { key: 'trading-bot', icon: '🤖', label: 'Trading Bot' },
        { key: 'scanner',     icon: '🔍', label: 'AI Scanner'  },
        { key: 'dashboard',   icon: '📊', label: 'Dashboard'   },
      ];
      return (
        <div className="card">
          <div className="card-hdr"><span className="card-title">💻 System Health</span></div>
          {[...svcs, { key: '_ollama', icon: '🧠', label: 'Ollama LLM' }].map(s => {
            const st = s.key === '_ollama'
              ? (health?.ollama === 'online' ? 'running' : health?.ollama || 'unknown')
              : (health?.services?.[s.key] || 'unknown');
            const ok = st === 'running' || st === 'online';
            return (
              <div key={s.key} style={{
                display:'flex', alignItems:'center', justifyContent:'space-between',
                padding:'10px 14px', borderBottom:'1px solid rgba(22,36,64,.5)',
              }}>
                <span style={{fontSize:13}}>{s.icon} {s.label}</span>
                <div style={{display:'flex',alignItems:'center',gap:7}}>
                  <Dot on={ok} />
                  <span style={{fontSize:12,fontWeight:600,color:ok?'#10b981':'#ef4444'}}>{st.toUpperCase()}</span>
                </div>
              </div>
            );
          })}
        </div>
      );
    };

    /* ── Strategy editor ─────────────────────────────────────── */
    const Strategy = ({ params }) => {
      const [editing, setEditing] = useState(false);
      const [form,    setForm]    = useState({});
      const [saved,   setSaved]   = useState(false);

                <div style={{fontSize:10,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',marginBottom:7}}>{d.label}</div>
                {editing
                  ? <input type="number" step="any" value={form[d.key] ?? ''}
                      onChange={e => setForm(f => ({...f, [d.key]: parseFloat(e.target.value)}))} />

            ))}
            {txtDefs.map(d => (
              <div key={d.key} style={{background:'rgba(6,13,24,.7)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                <div style={{fontSize:10,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',marginBottom:7}}>{d.label}</div>

    /* ── System tab ──────────────────────────────────────────── */

    /* ── Equity curve chart (line, like PnLChart but $ over time) ─── */
    const EquityChart = ({ history }) => {
      const ref = useRef(null), chart = useRef(null);
      const dep = JSON.stringify(history);
      useEffect(() => {
        if (!ref.current || !window.Chart) return;
        chart.current?.destroy();
        const labels = history.map(h => h.date);
        const vals   = history.map(h => h.equity);
        chart.current = new window.Chart(ref.current.getContext('2d'), {
          type: 'line',
          data: {
            labels,
            datasets: [{
              data: vals,
              borderColor: '#3b82f6',
              backgroundColor: 'rgba(59,130,246,.1)',
              fill: true, tension: 0.3, pointRadius: 2, borderWidth: 2,
            }],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false },
              tooltip: { callbacks: { label: ctx => ' ' + f$(ctx.raw) } } },
            scales: {
              x: { grid: { color: 'rgba(22,36,64,.6)' },
                   ticks: { color: '#64748b', font: { size: 10 }, maxTicksLimit: 12 } },
              y: { grid: { color: 'rgba(22,36,64,.6)' },
                   ticks: { color: '#64748b', font: { size: 10 },
                            callback: v => '$' + v.toLocaleString() } },
            },
          },
        });
        return () => chart.current?.destroy();
      }, [dep]);
      return (
        <div style={{ height: 280, position: 'relative' }}>
          <canvas ref={ref} />
          {!history?.length && (
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',

                     sub="Wins$ / Losses$" />

            <MetCard label="Total Trades"  value={a?.total_trades}    color="#8b5cf6" />
            <MetCard label="Equity Peak"   value={f$(eq?.peak)}       color="#10b981"
                     sub={`DD: ${fpct(eq?.drawdown_pct)}`} />
          </div>

          <div className="card" style={{marginBottom:16}}>
            <div className="card-hdr">
              <span className="card-title">📈 Equity Curve (daily snapshots)</span>
              {eq?.current && <span style={{fontFamily:'JetBrains Mono',fontWeight:700,fontSize:14,color:'#3b82f6'}}>{f$(eq.current)}</span>}
            </div>
            <div style={{padding:'12px 16px 16px'}}>
              <EquityChart history={eq?.history || []} />
            </div>
          </div>

          <div className="card" style={{marginBottom:16}}>
            <div className="card-hdr">
              <span className="card-title">🎯 Signal Attribution — Which signals win?</span>

            <div style={{overflowX:'auto'}}>

                          <td className="mono" style={{color:clr(s.avg_pct),fontWeight:700}}>{fpct(s.avg_pct)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
              }
            </div>
          </div>

          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <a href="/api/export.csv" className="btn btn-blue"
               style={{textDecoration:'none',padding:'8px 16px'}}>📥 Export All Trades (CSV)</a>
          </div>
        </div>
      );
    };

    /* ── History tab (daily / weekly / monthly P&L) ─────────── */
    const HistoryTab = () => {
      const [range,   setRange]   = useState('week');
      const [history, setHistory] = useState(null);
      const [loading, setLoading] = useState(false);
      const [err,     setErr]     = useState(null);

      const load = useCallback(async (r) => {
        setLoading(true); setErr(null);
        try {
          const res  = await fetch(`/api/history?range=${r}`);
          const json = await res.json();
          setHistory(json);
        } catch (e) { setErr('Failed to load history'); }
        finally { setLoading(false); }
      }, []);

      useEffect(() => { load(range); }, [range, load]);

      const ranges = [
        { id:'day',   label:'Today'      },
        { id:'week',  label:'7 Days'     },
        { id:'month', label:'30 Days'    },
        { id:'all',   label:'All Time'   },

      return (

          {/* Summary */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:12,marginBottom:16}}>
            <MetCard label="Realized P&L"   value={f$(realized)}    color={clr(realized)} />
            <MetCard label="Unrealized P&L" value={f$(unrealized)}  color={clr(unrealized)} />
            <MetCard label="Total P&L"      value={f$(realized + unrealized)} color={clr(realized + unrealized)} />
            <MetCard label="Closed Trades"  value={sum.closed_trades ?? 0}    color="#3b82f6" />
            <MetCard label="Win Rate"       value={`${sum.win_rate ?? 0}%`}   color="#3b82f6">
              <WinBar wins={sum.wins ?? 0} losses={sum.losses ?? 0} />

            <MetCard label="Buy Orders"     value={sum.total_trades ?? 0}     color="#8b5cf6" />

          {/* Daily breakdown */}
          <div className="card" style={{marginBottom:16}}>
            <div className="card-hdr">
              <span className="card-title">📅 Daily Breakdown</span>
              {history?.from && (
                <span style={{fontSize:11,color:'var(--muted)',fontFamily:'JetBrains Mono'}}>

            <div style={{overflowX:'auto',maxHeight:380,overflowY:'auto'}}>
              {loading
                ? <div className="empty"><div className="spin" style={{display:'inline-block',width:20,height:20,border:'2px solid var(--border)',borderTopColor:'#3b82f6',borderRadius:'50%'}} /></div>
                : !history?.daily?.length
                  ? <div className="empty">No closed trades in this range</div>
                  : <table>
                      <thead><tr>
                        <th>Date</th><th>Trades</th><th>Wins</th><th>Losses</th>
                        <th>Win Rate</th><th>Best %</th><th>Worst %</th><th>Realized P&L</th>
                      </tr></thead>
                      <tbody>
                        {history.daily.slice().reverse().map((d, i) => (
                          <tr key={i}>
                            <td className="mono">{d.date}</td>
                            <td className="mono">{d.trades}</td>

                            <td className="mono" style={{color:'#ef4444'}}>{fpct(d.worst)}</td>
                            <td className="mono" style={{color:clr(d.pnl_abs),fontWeight:700}}>{f$(d.pnl_abs)}</td>

            </div>

          {history?.monthly?.length > 1 && (
            <div className="card" style={{marginBottom:16}}>
              <div className="card-hdr"><span className="card-title">🗓️ Monthly Summary</span></div>
              <div style={{overflowX:'auto'}}>
                <table>
                  <thead><tr>
                    <th>Month</th><th>Trades</th><th>Wins</th><th>Win Rate</th><th>Realized P&L</th>
                  </tr></thead>
                  <tbody>
                    {history.monthly.slice().reverse().map((m, i) => (
                      <tr key={i}>
                        <td className="mono">{m.month}</td>
                        <td className="mono">{m.trades}</td>
                        <td className="mono" style={{color:'#10b981'}}>{m.wins}</td>
                        <td className="mono" style={{color:'#3b82f6',fontWeight:700}}>{m.win_rate}%</td>
                        <td className="mono" style={{color:clr(m.pnl_abs),fontWeight:700}}>{f$(m.pnl_abs)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* Recent trades */}
          <div className="card">
            <div className="card-hdr">
              <span className="card-title">📋 All Trades In Range</span>
              <Badge color="#64748b">{history?.trades?.length ?? 0}</Badge>

              <Trades rows={(history?.trades || []).slice().reverse()} full />

    /* ══════════════════════════════════════════════════════════ */
    /*  APP                                                       */
    /* ══════════════════════════════════════════════════════════ */
    const App = () => {
      const [data,      setData]      = useState(null);
      const [health,    setHealth]    = useState(null);
      const [tab,       setTab]       = useState('overview');
      const [connected, setConnected] = useState(false);
      const [clock,     setClock]     = useState('');

      /* Clock */
      useEffect(() => {
        const tick = () => setClock(
          new Date().toLocaleTimeString('en-US', {
            timeZone:'America/New_York', hour12:false,
            hour:'2-digit', minute:'2-digit', second:'2-digit',
          }) + ' ET'
        );
        tick();
        const id = setInterval(tick, 1000);
        return () => clearInterval(id);
      }, []);

      /* SSE real-time feed */
      useEffect(() => {
        let es;
        const connect = () => {
          es = new EventSource('/api/stream');
          es.addEventListener('snapshot', e => {
            try { setData(JSON.parse(e.data)); setConnected(true); } catch {}
          });
          es.onerror = () => {
            setConnected(false);
            es.close();
            setTimeout(connect, 5000);
          };
        };
        connect();
        return () => es?.close();
      }, []);

      /* Health polling */
      useEffect(() => {
        const poll = () => fetch('/api/health').then(r => r.json()).then(setHealth).catch(() => {});
        poll();
        const id = setInterval(poll, 15000);
        return () => clearInterval(id);
      }, []);

      const sendAction = (action) =>
        fetch('/api/action', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({action}),
        });

      if (!data) return (
        <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12,color:'var(--muted)'}}>
          <div style={{width:32,height:32,border:'3px solid var(--border)',borderTopColor:'#3b82f6',borderRadius:'50%'}} className="spin" />
          <div>Connecting to trading server…</div>
        </div>
      );

      const { metrics: m, stats, picks, trades, positions, activity_log, curve, params } = data;
      const paused = m?.paused;

      const TABS = [
        { id:'overview',  label:'📊 Overview'  },
        { id:'trades',    label:'📋 Trades'    },
        { id:'history',   label:'📅 History'   },
        { id:'analytics', label:'📈 Analytics' },
        { id:'reports',   label:'📄 Reports'   },
        { id:'strategy',  label:'⚙️ Strategy'  },
        { id:'system',    label:'💻 System'    },
      ];

      return (
        <div>

          {/* ── Header ─────────────────────────────────────────── */}
          <header style={{
            background:'var(--bg-card)', borderBottom:'1px solid var(--border)',
            position:'sticky', top:0, zIndex:100,
          }}>
            <div style={{
              display:'flex', alignItems:'center', justifyContent:'space-between',
              padding:'10px 20px', flexWrap:'wrap', gap:12,
              maxWidth:1640, margin:'0 auto',
            }}>
              {/* Logo */}
              <div style={{display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
                <span style={{fontSize:26}}>📈</span>
                <div>
                  <div style={{fontWeight:700,fontSize:16,letterSpacing:'-.02em'}}>AlgoTrader</div>
                  <div style={{fontSize:10,color:'var(--muted)',letterSpacing:'.08em',textTransform:'uppercase'}}>Alpaca Paper</div>
                </div>
              </div>

              {/* Status + metrics row */}
              <div style={{display:'flex',alignItems:'center',gap:20,flexWrap:'wrap'}}>

                {/* Live dot */}
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <Dot on={connected} pulse />
                  <span style={{fontSize:12,fontWeight:600,color:connected?'#10b981':'#ef4444'}}>{connected?'LIVE':'OFFLINE'}</span>
                </div>

                {/* Bot status */}
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <Dot on={!paused} pulse={!paused} />
                  <span style={{fontSize:12,fontWeight:600,color:paused?'#f59e0b':'var(--muted)'}}>BOT: {paused?'PAUSED':'RUNNING'}</span>
                </div>

                <Regime v={m?.regime} />

                {/* Equity */}
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:10,color:'var(--muted)',marginBottom:2,letterSpacing:'.06em',textTransform:'uppercase'}}>Equity</div>
                  <div style={{fontSize:16,fontWeight:700,fontFamily:'JetBrains Mono'}}>{f$(m?.equity)}</div>
                </div>

                {/* Day P&L */}
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:10,color:'var(--muted)',marginBottom:2,letterSpacing:'.06em',textTransform:'uppercase'}}>Day P&L</div>
                  <div style={{fontSize:16,fontWeight:700,fontFamily:'JetBrains Mono',color:clr(m?.daily_pnl)}}>
                    {f$(m?.daily_pnl)}
                    <span style={{fontSize:12,opacity:.75,marginLeft:4}}>({fpct(m?.daily_pnl_pct)})</span>
                  </div>
                </div>

                {/* Clock */}
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{fontSize:10,color:'var(--muted)',marginBottom:2,letterSpacing:'.06em',textTransform:'uppercase'}}>Time</div>
                  <div style={{fontSize:14,fontWeight:600,fontFamily:'JetBrains Mono'}}>{clock}</div>
                </div>
              </div>
            </div>

            {/* Nav tabs */}
            <div style={{display:'flex',padding:'0 16px',borderTop:'1px solid var(--border)',maxWidth:1640,margin:'0 auto'}}>
              {TABS.map(t => (
                <button key={t.id} onClick={() => setTab(t.id)} style={{
                  padding:'9px 16px', fontSize:13, fontWeight:500,
                  background:'none', border:'none',
                  color: tab === t.id ? '#3b82f6' : 'var(--muted)',
                  borderBottom: `2px solid ${tab === t.id ? '#3b82f6' : 'transparent'}`,
                  cursor:'pointer', transition:'color .15s',
                }}>{t.label}</button>
              ))}
            </div>
          </header>

          {/* ── Page content ───────────────────────────────────── */}
          <main style={{padding:'16px 20px 48px',maxWidth:1640,margin:'0 auto'}}>

            {/* OVERVIEW */}
            {tab === 'overview' && (
              <div className="fadein">

                {/* Paused banner */}
                {paused && (
                  <div style={{
                    background:'rgba(245,158,11,.08)', border:'1px solid rgba(245,158,11,.3)',
                    borderRadius:8, padding:'11px 16px', marginBottom:16,
                    color:'#f59e0b', display:'flex', alignItems:'center', gap:8, fontSize:13,
                  }}>
                    <span style={{fontSize:18}}>⚠️</span>
                    <span style={{fontWeight:700}}>Trading Paused</span>
                    {m?.pause_reason && <span style={{color:'#94a3b8'}}>— {m.pause_reason}</span>}
                  </div>
                )}

                {/* Metrics grid */}
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:12,marginBottom:16}}>
                  <MetCard label="Account Equity" value={f$(m?.equity)} color={clr((m?.equity??100000)-100000,'#10b981','#ef4444','#e2e8f0')} />
                  <MetCard label="Buying Power"   value={f$(m?.buying_power)} />
                  <MetCard label="Day P&L"        value={fpct(m?.daily_pnl_pct)} sub={f$(m?.daily_pnl)} color={clr(m?.daily_pnl)} />
                  <MetCard label="Win Rate"       value={`${stats?.win_rate??0}%`} color="#3b82f6">
                    <WinBar wins={stats?.wins??0} losses={stats?.losses??0} />
                  </MetCard>
                  <MetCard label="Trades Today"   value={stats?.total_trades??0}  sub={`${stats?.wins??0}W · ${stats?.losses??0}L`} color="#8b5cf6" />
                  <MetCard label="Open Positions" value={`${positions?.length??0} / ${params?.max_positions??3}`} color="#3b82f6" />
                  <MetCard
                    label="VIX"
                    value={m?.vix?.toFixed(1)??'—'}
                    sub={m?.vix==null?'N/A':m.vix<20?'Low Fear':m.vix<28?'Elevated':'High Fear'}
                    color={m?.vix==null?'#64748b':m.vix<20?'#10b981':m.vix<28?'#f59e0b':'#ef4444'}
                  />
                  <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 16px'}}>
                    <div style={{fontSize:10,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--muted)',marginBottom:8}}>Regime</div>
                    <Regime v={m?.regime} />
                    {stats?.avg_win ? <div style={{fontSize:11,color:'var(--muted)',marginTop:6}}>Avg W: +{stats.avg_win}%</div> : null}
                  </div>
                </div>

                {/* Positions + Chart */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1.5fr',gap:16,marginBottom:16}}>
                  <Positions rows={positions??[]} />
                  <div className="card">
                    <div className="card-hdr">
                      <span className="card-title">📈 Intraday P&L</span>
                      <span style={{fontFamily:'JetBrains Mono',fontWeight:700,fontSize:14,color:clr(m?.daily_pnl)}}>{f$(m?.daily_pnl)}</span>
                    </div>
                    <div style={{padding:'12px 16px 16px'}}><PnLChart curve={curve} /></div>
                  </div>
                </div>

                {/* Picks + Trades */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
                  <Picks rows={picks??[]} />
                  <Trades rows={trades??[]} />
                </div>

                {/* Log + Controls + Health */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                  <div style={{display:'flex',flexDirection:'column',gap:16}}>
                    <Log rows={activity_log??[]} />
                    <DailyStats stats={stats} />
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:16}}>
                    <Controls onAction={sendAction} paused={paused} pauseReason={m?.pause_reason} />
                    <Health health={health} />
                  </div>
                </div>
              </div>
            )}

            {/* TRADES */}
            {tab === 'trades' && (
              <div className="fadein"><Trades rows={trades??[]} full /></div>
            )}

            {/* HISTORY */}
            {tab === 'history' && <HistoryTab />}

            {/* ANALYTICS */}
            {tab === 'analytics' && <AnalyticsTab />}

            {/* REPORTS */}
            {tab === 'reports' && <ReportsTab />}

            {/* STRATEGY */}
            {tab === 'strategy' && (
              <div className="fadein"><Strategy params={params} /></div>
            )}

            {/* SYSTEM */}
            {tab === 'system' && (
              <div className="fadein"><SystemTab health={health} data={data} /></div>
            )}

            <div style={{textAlign:'center',marginTop:32,padding:'20px 0',
                         borderTop:'1px solid var(--border)',color:'var(--muted)',fontSize:12}}>
              ⚠️ Trading involves risk of loss. Read the&nbsp;
              <a href="/disclaimer" target="_blank" rel="noopener"
                 style={{color:'#3b82f6'}}>Terms & Disclaimer</a>
              &nbsp;before use. Not financial advice.
            </div>

          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
