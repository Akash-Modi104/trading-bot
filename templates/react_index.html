        <div className="fadein" style={{display:'grid',gap:16}}>
          <div className="card">
            <div className="card-hdr" style={{justifyContent:'space-between'}}>
              <span className="card-title">Strategy — {label}</span>
              <span className={`pill ${running ? 'up' : 'down'}`}>
                <Dot on={running} />
                {status.toUpperCase()}
              </span>
            </div>
            <div style={{padding:16,display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:12}}>
              <Metric label="Mode" value={alloc?.mode_label || botState?.mode_label || activeMode} sub={alloc?.mode_tagline || botState?.mode_tagline} />
              <Metric label="Total Budget" value={fInr(totalBudget)} sub="Capital ceiling for the Indian bot" />
              <Metric label="Per Trade Cap" value={fInr(perTrade)} sub={`${positionPct || '—'}% of budget split across ${maxPos || '—'} slots`} />
              <Metric label="Entry Score" value={minConf ? `${minConf}+` : '—'} sub="Minimum signal score before a buy is allowed" />
              <Metric label="Stop / Target" value={`${stopPct || '—'}% / ${tpPct || '—'}%`} sub="Initial stop-loss and take-profit" />
              <Metric label="Auto-Trade" value={alloc?.auto_trade ? 'ON' : 'OFF'} sub={botState?.pause_reason || (botState?.market_open === false ? 'Outside market hours' : 'Ready when market and signal checks pass')} />
            </div>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(min(320px,100%),1fr))',gap:16}}>
            <div className="card">
              <div className="card-hdr"><span className="card-title">Signal Engine</span></div>
              <Rule title="Universe" body="NIFTY 50 large-cap symbols, using Zerodha NSE candle data where available." />
              <Rule title="Entry Window" body="New entries are allowed after the opening noise settles and stop before the late-day square-off window." />
              <Rule title="Score Filters" body="EMA trend, RSI range, VWAP, MACD, Bollinger position, and volume surge must combine to meet the active mode score." />
              <Rule title="Risk Gate" body="The bot checks available Zerodha margin, symbol cooldowns, sector concentration, open position count, and daily loss before sending a buy." />
              <Rule title="Order Handling" body="Zerodha buys are confirmed from the live order book before the bot logs or protects the position." />
              <Rule title="Exits" body="Positions are monitored for stop-loss, take-profit, trailing/high-water protection, news kill-switch, and end-of-day square-off." />
            </div>

            <div className="card">
              <div className="card-hdr" style={{justifyContent:'space-between'}}>
                <span className="card-title">Controls</span>
                {msg && <span style={{fontSize:12,fontWeight:700,color:msg.ok?'var(--up)':'var(--down)'}}>{msg.text}</span>}
              </div>
              <div style={{padding:16}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
                  {modeRows.map(m => {
                    const active = activeMode === m.id;
                    return (
                      <button key={m.id} className={`btn ${active ? 'primary' : 'ghost'}`}
                        disabled={!!busy}
                        style={{display:'block',textAlign:'left',padding:'10px 12px',height:'auto'}}
                        onClick={() => updateAlloc({trading_mode:m.id}, `mode_${m.id}`)}>
                        <div style={{fontSize:13,fontWeight:800}}>{m.label || m.id}</div>
                        <div style={{fontSize:10,color:'var(--ink-3)',marginTop:3,lineHeight:1.35}}>
                          {m.min_confidence ? `${m.min_confidence}+ score · ${m.max_positions} slots · ${m.stop_pct}%/${m.tp_pct}%` : (m.tagline || 'Manual values')}
                        </div>
                      </button>
                    );
                  })}
                </div>

                <button className={`btn ${alloc?.auto_trade ? 'success' : 'ghost'}`}
                  style={{width:'100%',marginBottom:14}}
                  disabled={!!busy}
                  onClick={async () => {
                    setBusy('toggle');
                    try {
                      const r = await fetch(`/api/allocations/${broker}/toggle`, {method:'POST'});
                      const d = await r.json();
                      if (d.ok) {
                        setAlloc(prev => ({...prev, auto_trade:d.auto_trade}));
                        notify(true, d.auto_trade ? 'Auto-trade ON' : 'Auto-trade OFF');
                      } else notify(false, d.error || 'Toggle failed');
                    } catch { notify(false, 'Request failed'); }
                    finally { setBusy(null); }
                  }}>
                  Auto-Trade {alloc?.auto_trade ? 'ON' : 'OFF'}
                </button>

                {!editing ? (
                  <button className="btn ghost" style={{width:'100%'}} onClick={() => setEditing(true)}>
                    Edit Custom Risk
                  </button>
                ) : (
                  <div style={{display:'grid',gap:10}}>
                    {[
                      ['budget','Budget (₹)', 'number', '1'],
                      ['max_positions','Max Positions', 'number', '1'],
                      ['stop_pct','Stop Loss %', 'number', '0.1'],
                      ['tp_pct','Take Profit %', 'number', '0.1'],
                    ].map(([key, label, type, step]) => (
                      <label key={key} style={{display:'grid',gap:4}}>
                        <span style={{fontSize:11,color:'var(--muted)',fontWeight:700,textTransform:'uppercase'}}>{label}</span>
                        <input style={inputStyle} type={type} step={step} min="0" value={form[key] ?? ''}
                          onChange={e => setForm(f => ({...f, [key]: e.target.value}))} />
                      </label>
                    ))}
                    <div style={{display:'flex',gap:8}}>
                      <button className="btn success" style={{flex:1}} disabled={busy==='save'} onClick={saveCustom}>Save Custom</button>
                      <button className="btn ghost" style={{flex:1}} onClick={() => setEditing(false)}>Cancel</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    /* ── System tab ──────────────────────────────────────────── */
    const SystemTab = ({ health, data }) => {
      const m = data?.metrics || {};
      const rows = [
        { label:'Bot Started',    value: m.started  || '—' },
        { label:'Last Scan',      value: m.last_scan || '—' },
        { label:'Regime',         value: <Regime v={m.regime} /> },
        { label:'VIX',            value: <span style={{fontFamily:'JetBrains Mono',fontWeight:700,color:m.vix==null?'#64748b':m.vix<20?'#10b981':m.vix<28?'#f59e0b':'#ef4444'}}>{m.vix?.toFixed(1)??'—'}</span> },
        { label:'Trading Paused', value: <span style={{color:m.paused?'#f59e0b':'#10b981',fontWeight:600}}>{m.paused?'Yes':'No'}</span> },
        { label:'Open Positions', value: <span style={{fontFamily:'JetBrains Mono',fontWeight:700}}>{m.open_positions??0} / {data?.params?.max_positions??3}</span> },
      ];
      return (
        <div className="fadein" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <Health health={health} />
          <div className="card">
            <div className="card-hdr"><span className="card-title">📈 Runtime Info</span></div>
            {rows.map((r, i) => (
              <div key={i} style={{
                display:'flex', justifyContent:'space-between', alignItems:'center',
                padding:'11px 16px', borderBottom:'1px solid rgba(22,36,64,.5)',
              }}>
                <span style={{color:'var(--muted)',fontSize:13}}>{r.label}</span>
                <span style={{fontWeight:500,fontSize:13}}>{r.value}</span>
              </div>
            ))}
          </div>
        </div>
      );
    };

    /* ── Toast notification system ──────────────────────────── */
    const ToastCtx = React.createContext({ push: () => {} });
    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = useState([]);
      const push = useCallback((msg, type = 'info') => {
        const id = Date.now() + Math.random();
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4500);
      }, []);
      return (
        <ToastCtx.Provider value={{ push }}>
          {children}
          <div style={{position:'fixed',bottom:20,right:20,zIndex:9999,
                       display:'flex',flexDirection:'column',gap:8,maxWidth:340}}>
            {toasts.map(t => {
              const colors = {
                success: ['#10b981', 'rgba(16,185,129,.95)'],
                error:   ['#ef4444', 'rgba(239,68,68,.95)'],
                warning: ['#f59e0b', 'rgba(245,158,11,.95)'],
                info:    ['#3b82f6', 'rgba(59,130,246,.95)'],
              }[t.type] || ['#3b82f6', 'rgba(59,130,246,.95)'];
              return (
                <div key={t.id} className="fadein" style={{
                  background: colors[1], color: '#fff', padding: '11px 16px',
                  borderRadius: 8, fontSize: 13, fontWeight: 500,
                  boxShadow: '0 8px 24px rgba(0,0,0,.3)',
                  borderLeft: `4px solid ${colors[0]}`,
                }}>{t.msg}</div>
              );
            })}
          </div>
        </ToastCtx.Provider>
      );
    };
    const useToast = () => React.useContext(ToastCtx);

    /* ── Profile tab: name, theme, Alpaca / Angel One / Zerodha connect ── */
    const ProfileTab = ({ me, onMe }) => {
      const toast = useToast();
      const [name,  setName]  = useState(me?.name  || '');
      const [theme, setTheme] = useState(me?.theme || 'dark');

      // Alpaca connect form
      const [apiKey,    setApiKey]    = useState('');
      const [secKey,    setSecKey]    = useState('');
      const [isPaper,   setIsPaper]   = useState(true);
      const [busy,      setBusy]      = useState(false);

      // Angel One connect form
      const [aoApiKey,   setAoApiKey]   = useState('');
      const [aoClientId, setAoClientId] = useState('');
      const [aoPassword, setAoPassword] = useState('');
      const [aoTotp,     setAoTotp]     = useState('');
      const [aoBusy,     setAoBusy]     = useState(false);

      // Zerodha connect form
      const [zrdApiKey,    setZrdApiKey]    = useState('');
      const [zrdApiSecret, setZrdApiSecret] = useState('');
      const [zrdBusy,      setZrdBusy]      = useState(false);
      const [zrdReqToken,  setZrdReqToken]  = useState('');
      const [zrdTokenBusy, setZrdTokenBusy] = useState(false);

      // Password change
      const [curPw, setCurPw] = useState('');
      const [newPw, setNewPw] = useState('');

      // Sessions + audit
      const [sessions, setSessions] = useState([]);
      const [audit,    setAudit]    = useState([]);

      // Telegram notifications
      const [tgConfigured, setTgConfigured] = useState(false);
      const [tgToken,      setTgToken]      = useState('');
      const [tgChatId,     setTgChatId]     = useState('');
      const [tgEnabled,    setTgEnabled]    = useState(true);
      const [tgEvents,     setTgEvents]     = useState({buy:1,sell:1,eod:1,vix:1,startup:1});
      const [tgKeyPreview, setTgKeyPreview] = useState('');
      const [tgBusy,       setTgBusy]       = useState(false);

      const loadTelegram = () => {
        fetch('/api/telegram/status').then(r => r.json()).then(d => {
          setTgConfigured(!!d.configured);
          if (d.configured) {
            setTgChatId(d.chat_id || '');
            setTgEnabled(!!d.enabled);
            setTgEvents(Object.assign({buy:1,sell:1,eod:1,vix:1,startup:1}, d.events || {}));
            setTgKeyPreview(d.bot_token_redacted || '');
          }
        }).catch(() => {});
      };

      const saveTelegram = async () => {
        const cid = tgChatId.trim();
        if (!cid) { toast.push('Chat ID is required', 'error'); return; }
        // Telegram chat_id is a numeric ID; group/channel chats are negative
        // ("-100..."). Reject obvious typos before hitting the API.
        if (!/^-?\d{6,}$/.test(cid)) {
          toast.push('Chat ID must be a numeric value (e.g. 123456789 or -100123456789)', 'error');
          return;
        }
        if (!tgConfigured && !tgToken.trim()) { toast.push('Bot token is required for first setup', 'error'); return; }
        setTgBusy(true);
        try {
          const body = {chat_id: tgChatId, enabled: tgEnabled, events: tgEvents};
          if (tgToken.trim()) body.bot_token = tgToken;
          const r = await fetch('/api/telegram/save', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify(body),
          });
          const d = await r.json();
          if (r.ok) {
            toast.push(tgConfigured ? 'Settings updated' : 'Saved. Sending test message…', 'success');
            setTgToken('');
            if (!tgConfigured) await fetch('/api/telegram/test', {method:'POST'});
            loadTelegram();
          } else {
            toast.push(d.error || 'Save failed', 'error');
          }
        } finally { setTgBusy(false); }
      };

      const testTelegram = async () => {
        setTgBusy(true);
        try {
          const r = await fetch('/api/telegram/test', {method:'POST'});
          const d = await r.json();
          toast.push(d.ok ? 'Test message sent — check Telegram' : (d.error || 'Test failed'), d.ok ? 'success' : 'error');
        } finally { setTgBusy(false); }
      };

      const deleteTelegram = async () => {
        if (!confirm('Remove Telegram credentials and stop notifications?')) return;
        await fetch('/api/telegram/delete', {method:'POST'});
        setTgToken(''); setTgChatId(''); setTgConfigured(false); setTgKeyPreview('');
        toast.push('Telegram removed', 'info');
      };

      useEffect(() => {
        fetch('/api/sessions').then(r => r.json()).then(setSessions).catch(() => {});
        fetch('/api/audit').then(r => r.json()).then(setAudit).catch(() => {});
        loadTelegram();
      }, []);

      const saveProfile = async () => {
        const r = await fetch('/api/profile', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ name, theme }),
        });
        if (r.ok) {
          toast.push('Profile saved', 'success');
          applyThemeAttr(theme);
          onMe();
        } else {
          toast.push('Save failed', 'error');
        }
      };

      const connectAlpaca = async () => {
        if (!apiKey || !secKey) {
          toast.push('Both keys are required', 'error');
          return;
        }
        setBusy(true);
        try {
          const r = await fetch('/api/alpaca/connect', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ api_key: apiKey, secret_key: secKey, is_paper: isPaper }),
          });
          const d = await r.json();
          if (r.ok) {
            toast.push(`Connected to Alpaca ${isPaper ? 'paper' : 'LIVE'} (${d.account?.account_number?.slice(0,8) || '—'})`, 'success');
            setApiKey(''); setSecKey('');
            onMe();
          } else {
            toast.push(d.message || 'Validation failed: ' + (d.details?.message || JSON.stringify(d.details).slice(0,80)), 'error');
          }
        } finally { setBusy(false); }
      };

      const disconnectAlpaca = async () => {
        if (!confirm('Disconnect your Alpaca account from this dashboard?')) return;
        await fetch('/api/alpaca/disconnect', { method: 'POST' });
        toast.push('Alpaca disconnected', 'info');
        onMe();
      };

      // ── Angel One ──────────────────────────────────────────
      const connectAngelOne = async () => {
        if (!aoApiKey || !aoClientId || !aoPassword || !aoTotp) {
          toast.push('All four Angel One fields are required', 'error'); return;
        }
        setAoBusy(true);
        try {
          const r = await fetch('/api/angelone/connect', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ api_key:aoApiKey, client_id:aoClientId, password:aoPassword, totp_secret:aoTotp }),
          });
          const d = await r.json();
          if (r.ok) {
            toast.push(`Angel One connected: ${d.client_id}`, 'success');
            setAoApiKey(''); setAoClientId(''); setAoPassword(''); setAoTotp('');
            onMe();
          } else {
            toast.push(d.message || d.details || 'Validation failed', 'error');
          }
        } finally { setAoBusy(false); }
      };

      const disconnectAngelOne = async () => {
        if (!confirm('Disconnect your Angel One account?')) return;
        await fetch('/api/angelone/disconnect', { method:'POST' });
        toast.push('Angel One disconnected', 'info');
        onMe();
      };

      // ── Zerodha ─────────────────────────────────────────────
      const saveZerodha = async () => {
        if (!zrdApiKey || !zrdApiSecret) {
          toast.push('API Key and API Secret are required', 'error'); return;
        }
        setZrdBusy(true);
        try {
          const r = await fetch('/api/zerodha/connect', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ api_key:zrdApiKey, api_secret:zrdApiSecret }),
          });
          const d = await r.json();
          if (r.ok) {
            toast.push('Zerodha credentials saved — visit the login URL to activate', 'success');
            setZrdApiKey(''); setZrdApiSecret('');
            onMe();
          } else {
            toast.push(d.message || 'Save failed', 'error');
          }
        } finally { setZrdBusy(false); }
      };

      const activateZerodha = async () => {
        if (!zrdReqToken) { toast.push('Paste the request_token', 'error'); return; }
        setZrdTokenBusy(true);
        try {
          const r = await fetch('/api/zerodha/session', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ request_token: zrdReqToken }),
          });
          const d = await r.json();
          if (r.ok) {
            toast.push('Zerodha session activated!', 'success');
            setZrdReqToken('');
            onMe();
          } else {
            toast.push(d.error || 'Session activation failed', 'error');
          }
        } finally { setZrdTokenBusy(false); }
      };

      const disconnectZerodha = async () => {
        if (!confirm('Disconnect your Zerodha account?')) return;
        await fetch('/api/zerodha/disconnect', { method:'POST' });
        toast.push('Zerodha disconnected', 'info');
        onMe();
      };

      // ── Generic re-validate handler for the per-card buttons ─
      const [revalidating, setRevalidating] = useState({});  // {alpaca:bool, angelone:bool, zerodha:bool}
      const revalidate = async (broker) => {
        setRevalidating(s => ({...s, [broker]: true}));
        try {
          const r = await fetch(`/api/${broker}/validate`, { method: 'POST' });
          const d = await r.json();
          if (d.ok) {
            toast.push(`${broker[0].toUpperCase()+broker.slice(1)} ✓ connection healthy`, 'success');
          } else if (d.error === 'session_expired' || d.fix === 'kite_login') {
            toast.push(`${broker} session expired — click "Open Kite Login"`, 'error');
          } else if (d.error === 'no_credentials') {
            toast.push(`${broker} not connected`, 'info');
          } else {
            toast.push(`${broker} ✗ ${d.error || 'connection broken'} — reconnect`, 'error');
          }
          onMe();  // refresh status badges
          // Refresh the global broker-health banner immediately
          if (typeof window._refreshBrokerHealth === 'function') window._refreshBrokerHealth();
        } catch (e) {
          toast.push('Re-validate request failed', 'error');
        } finally {
          setRevalidating(s => ({...s, [broker]: false}));
        }
      };

      const changePassword = async () => {
        if (newPw.length < 8) { toast.push('New password must be 8+ chars', 'error'); return; }
        const r = await fetch('/api/change_password', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ current_password: curPw, new_password: newPw }),
        });
        const d = await r.json();
        if (r.ok) {
          toast.push('Password changed — please log in again', 'success');
          setTimeout(() => window.location.href = '/login', 1500);
        } else {
          const msg = d.error === 'wrong_password' ? 'Current password is incorrect'
                    : d.message || d.error || 'Failed to change password';
          toast.push(msg, 'error');
        }
      };

      const revokeSession = async (tail) => {
        if (!confirm('Revoke this session?')) return;
        await fetch('/api/sessions/revoke', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ token_tail: tail }),
        });
        toast.push('Session revoked', 'info');
        fetch('/api/sessions').then(r => r.json()).then(setSessions);
      };

      const logout = async () => {
        await fetch('/api/logout', { method: 'POST' });
        window.location.href = '/login';
      };

      const alp = me?.alpaca || {};

      return (
        <div className="fadein" style={{display:'grid',gridTemplateColumns:'1fr',gap:16,maxWidth:880,margin:'0 auto'}}>

          {/* Account */}
          <div className="card">
            <div className="card-hdr"><span className="card-title">👤 Account</span></div>
            <div data-mobile-stack style={{padding:18,display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              <div>
                <label style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Email</label>
                <div style={{fontFamily:'JetBrains Mono',fontSize:14,marginTop:6}}>{me?.email}</div>
              </div>
              <div>
                <label style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Plan</label>
                <div style={{fontSize:14,marginTop:6}}>
                  <Badge color={me?.plan==='pro'?'#10b981':'#64748b'}>{me?.plan?.toUpperCase()}</Badge>
                </div>
              </div>
              <div>
                <label style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Display name</label>
                <input type="text" value={name} onChange={e => setName(e.target.value)}
                  style={{width:'100%',marginTop:6,background:'var(--bg-input)',border:'1px solid var(--border)',
                          borderRadius:6,padding:'7px 10px',color:'var(--text)',fontSize:13}} />
              </div>
              <div>
                <label style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Theme</label>
                <div style={{display:'flex',gap:6,marginTop:6}}>
                  {['dark','light','auto'].map(t => (
                    <button key={t} onClick={() => setTheme(t)}
                      className={`btn ${theme===t?'primary':'ghost'}`}
                      style={{flex:1,padding:'7px 10px',fontSize:12,textTransform:'capitalize'}}>{t}</button>
                  ))}
                </div>
              </div>
              <div style={{gridColumn:'span 2',display:'flex',gap:8,justifyContent:'flex-end'}}>
                <button className="btn success" onClick={saveProfile}>Save changes</button>
              </div>
            </div>
          </div>

          {/* Alpaca connection */}
          <div className="card" data-broker-card="alpaca">
            <div className="card-hdr">
              <span className="card-title">🔌 Alpaca Account</span>
              {alp.connected && (
                <Badge color={alp.is_paper ? '#3b82f6' : '#ef4444'}>
                  {alp.is_paper ? 'PAPER' : 'LIVE'}
                </Badge>
              )}
            </div>
            <div style={{padding:18}}>
              {alp.connected ? (
                <div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                    <div>
                      <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Account #</div>
                      <div style={{fontFamily:'JetBrains Mono',fontSize:13,marginTop:5}}>{alp.account_number || '—'}</div>
                    </div>
                    <div>
                      <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>API key</div>
                      <div style={{fontFamily:'JetBrains Mono',fontSize:13,marginTop:5}}>{alp.key_preview}</div>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                    <button className="btn btn-ghost" disabled={revalidating.alpaca}
                            onClick={() => revalidate('alpaca')}>
                      {revalidating.alpaca ? 'Checking…' : '🔍 Re-validate'}
                    </button>
                    <button className="btn btn-red" onClick={disconnectAlpaca}>Disconnect</button>
                  </div>
                </div>
              ) : (
                <div>
                  <div style={{padding:'10px 14px',background:'rgba(59,130,246,.08)',
                               border:'1px solid rgba(59,130,246,.25)',borderRadius:7,fontSize:13,marginBottom:14}}>
                    <b>Get your keys:</b> visit <a href="https://app.alpaca.markets/paper/dashboard/overview"
                       target="_blank" rel="noopener" style={{color:'#3b82f6'}}>alpaca.markets → Paper Account → View API Keys</a>.
                    Your secret key is shown only once at creation.
                  </div>
                  <label style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>API Key ID</label>
                  <input type="text" value={apiKey} onChange={e => setApiKey(e.target.value.slice(0,256))} maxLength={256}
                    placeholder="PKxxxxxxxxxxxxxxxxxx"
                    style={{width:'100%',marginTop:5,background:'var(--bg-input)',border:'1px solid var(--border)',
                            borderRadius:6,padding:'9px 12px',color:'var(--text)',fontSize:13,fontFamily:'JetBrains Mono'}} />
                  <label style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',marginTop:12,display:'block'}}>Secret Key</label>
                  <input type="password" value={secKey} onChange={e => setSecKey(e.target.value.slice(0,256))} maxLength={256}
                    placeholder="••••••••••••••••••••••••••••••••"
                    style={{width:'100%',marginTop:5,background:'var(--bg-input)',border:'1px solid var(--border)',
                            borderRadius:6,padding:'9px 12px',color:'var(--text)',fontSize:13,fontFamily:'JetBrains Mono'}} />
                  <div style={{marginTop:14,display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
                    <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}>
                      <input type="radio" checked={isPaper} onChange={() => setIsPaper(true)} />
                      Paper trading <Badge color="#3b82f6">Recommended</Badge>
                    </label>
                    <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}>
                      <input type="radio" checked={!isPaper} onChange={() => setIsPaper(false)} />
                      Live trading <Badge color="#ef4444">Real money</Badge>
                    </label>
                  </div>
                  {!isPaper && (
                    <div style={{marginTop:12,padding:'10px 14px',background:'rgba(239,68,68,.1)',
                                 border:'1px solid rgba(239,68,68,.3)',borderRadius:7,fontSize:13,color:'#ef4444'}}>
                      ⚠️ Live trading uses real money. Test thoroughly in paper mode for at least 30 days first.
                    </div>
                  )}
                  <div style={{marginTop:16,display:'flex',justifyContent:'flex-end'}}>
                    <button className="btn btn-green" disabled={busy} onClick={connectAlpaca}>
                      {busy ? 'Validating…' : 'Validate & Connect'}
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* Angel One connection */}
          {(() => {
            const ao = me?.angelone || {};
            const inp = {width:'100%',marginTop:5,background:'var(--bg-input)',border:'1px solid var(--border)',
                         borderRadius:6,padding:'9px 12px',color:'var(--text)',fontSize:13,fontFamily:'JetBrains Mono'};
            const lbl = {fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',marginTop:12,display:'block'};
            return (
              <div className="card" data-broker-card="angelone">
                <div className="card-hdr">
                  <span className="card-title">🏦 Angel One (SmartAPI)</span>
                  {ao.connected && <Badge color="#f97316">CONNECTED</Badge>}
                </div>
                <div style={{padding:18}}>
                  {ao.connected ? (
                    <div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                        <div>
                          <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,textTransform:'uppercase'}}>Client ID</div>
                          <div style={{fontFamily:'JetBrains Mono',fontSize:13,marginTop:5}}>{ao.client_id}</div>
                        </div>
                        <div>
                          <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,textTransform:'uppercase'}}>Connected at</div>
                          <div style={{fontSize:12,marginTop:5,color:'var(--muted)'}}>{ao.validated_at?.slice(0,16).replace('T',' ')}</div>
                        </div>
                      </div>
                      <div style={{display:'flex',gap:8,justifyContent:'space-between',alignItems:'center'}}>
                        <span style={{fontSize:12,color:'var(--muted)'}}>Trading on NSE · BSE · NFO · MCX</span>
                        <div style={{display:'flex',gap:8}}>
                          <button className="btn btn-ghost" disabled={revalidating.angelone}
                                  onClick={() => revalidate('angelone')}>
                            {revalidating.angelone ? 'Checking…' : '🔍 Re-validate'}
                          </button>
                          <button className="btn btn-red" onClick={disconnectAngelOne}>Disconnect</button>
                        </div>
                      </div>
                    </div>
                  ) : (
                    <div>
                      <div style={{padding:'10px 14px',background:'rgba(249,115,22,.08)',border:'1px solid rgba(249,115,22,.25)',borderRadius:7,fontSize:13,marginBottom:14}}>
                        <b>Get API key:</b> Login to <a href="https://smartapi.angelbroking.com" target="_blank" rel="noopener" style={{color:'#f97316'}}>smartapi.angelbroking.com</a> → My Profile → API Key.
                        Set up TOTP in the Angel One app and copy the secret key shown during setup.
                      </div>
                      <label style={lbl}>API Key</label>
                      <input type="text" style={inp} value={aoApiKey} onChange={e=>setAoApiKey(e.target.value)} placeholder="xxxxxxxx" />
                      <label style={lbl}>Client ID (Trading Account)</label>
                      <input type="text" style={inp} value={aoClientId} onChange={e=>setAoClientId(e.target.value)} placeholder="A12345" />
                      <label style={lbl}>MPIN / Password</label>
                      <input type="password" style={inp} value={aoPassword} onChange={e=>setAoPassword(e.target.value)} placeholder="4-digit MPIN" />
                      <label style={lbl}>TOTP Secret (base-32)</label>
                      <input type="password" style={inp} value={aoTotp} onChange={e=>setAoTotp(e.target.value)} placeholder="JBSWY3DPEHPK3PXP…" />
                      <div style={{marginTop:16,display:'flex',justifyContent:'flex-end'}}>
                        <button className="btn btn-green" disabled={aoBusy} onClick={connectAngelOne}>
                          {aoBusy ? 'Connecting…' : 'Validate & Connect'}
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          })()}

          {/* Zerodha connection */}
          {(() => {
            const zrd = me?.zerodha || {};
            const inp = {width:'100%',marginTop:5,background:'var(--bg-input)',border:'1px solid var(--border)',
                         borderRadius:6,padding:'9px 12px',color:'var(--text)',fontSize:13,fontFamily:'JetBrains Mono'};
            const lbl = {fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',marginTop:12,display:'block'};
            return (
              <div className="card" data-broker-card="zerodha">
                <div className="card-hdr">
                  <span className="card-title">📈 Zerodha (Kite API)</span>
                  {zrd.connected && (
                    <Badge color={zrd.has_access_token ? '#10b981' : '#f59e0b'}>
                      {zrd.has_access_token ? 'SESSION ACTIVE' : 'NEEDS LOGIN'}
                    </Badge>
                  )}
                </div>
                <div style={{padding:18}}>
                  {zrd.connected ? (
                    <div>
                      {!zrd.has_access_token && (
                        <div style={{padding:'12px 14px',background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.3)',borderRadius:7,marginBottom:14,fontSize:13}}>
                          <b>Daily login required.</b> Zerodha access tokens expire every day. Click below — you'll be redirected back automatically after login.
                        </div>
                      )}
                      {zrd.has_access_token && (
                        <div style={{padding:'10px 14px',background:'rgba(16,185,129,.08)',border:'1px solid rgba(16,185,129,.3)',borderRadius:7,marginBottom:14,fontSize:13,color:'#10b981'}}>
                          ✅ Session active — expires ~{zrd.session_expiry?.slice(0,16).replace('T',' ')} UTC
                        </div>
                      )}
                      <div style={{marginBottom:14}}>
                        <a href={zrd.login_url}
                          className="btn btn-blue" style={{display:'inline-block',textDecoration:'none',fontSize:13}}>
                          🔗 Open Kite Login (daily)
                        </a>
                      </div>
                      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                        <button className="btn btn-ghost" disabled={revalidating.zerodha}
                                onClick={() => revalidate('zerodha')}>
                          {revalidating.zerodha ? 'Checking…' : '🔍 Re-validate'}
                        </button>
                        <button className="btn btn-red" onClick={disconnectZerodha}>Disconnect</button>
                      </div>
                    </div>
                  ) : (
                    <div>
                      <div style={{padding:'10px 14px',background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.25)',borderRadius:7,fontSize:13,marginBottom:14}}>
                        <b>Get API credentials:</b> Login to <a href="https://developers.kite.trade" target="_blank" rel="noopener" style={{color:'#3b82f6'}}>developers.kite.trade</a> → Create an app. After saving keys below, you'll get a login URL to complete the OAuth flow daily.
                      </div>
                      <label style={lbl}>API Key</label>
                      <input type="text" style={inp} value={zrdApiKey} onChange={e=>setZrdApiKey(e.target.value.slice(0,128))} maxLength={128} placeholder="xxxxxxxxxxxxxxxx" />
                      <label style={lbl}>API Secret</label>
                      <input type="password" style={inp} value={zrdApiSecret} onChange={e=>setZrdApiSecret(e.target.value)} placeholder="••••••••••••••••••••••••" />
                      <div style={{marginTop:16,display:'flex',justifyContent:'flex-end'}}>
                        <button className="btn btn-green" disabled={zrdBusy} onClick={saveZerodha}>
                          {zrdBusy ? 'Saving…' : 'Save & Get Login URL'}
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          })()}

          {/* Telegram notifications */}
          <div className="card">
            <div className="card-hdr">
              <span className="card-title">📱 Telegram Notifications</span>
              {tgConfigured && (
                <Badge color={tgEnabled ? '#10b981' : '#64748b'}>
                  {tgEnabled ? 'ACTIVE' : 'DISABLED'}
                </Badge>
              )}
            </div>
            <div style={{padding:18}}>
              {!tgConfigured && (
                <div style={{padding:'10px 14px',background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.25)',borderRadius:7,fontSize:13,marginBottom:14}}>
                  <b>Setup (one time):</b><br/>
                  1. In Telegram, message <code>@BotFather</code> → <code>/newbot</code> → copy the token.<br/>
                  2. Send any message to your new bot, then visit <code>https://api.telegram.org/bot&lt;TOKEN&gt;/getUpdates</code> and copy the <code>chat.id</code>.<br/>
                  3. Paste both below and click <b>Save & Test</b>.
                </div>
              )}
              {tgConfigured && (
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                  <div>
                    <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Bot token</div>
                    <div style={{fontFamily:'JetBrains Mono',fontSize:13,marginTop:5}}>{tgKeyPreview || '—'}</div>
                  </div>
                  <div>
                    <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Chat ID</div>
                    <div style={{fontFamily:'JetBrains Mono',fontSize:13,marginTop:5}}>{tgChatId || '—'}</div>
                  </div>
                </div>
              )}
              <label style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>{tgConfigured ? 'New bot token (optional, replaces existing)' : 'Bot token'}</label>
              <input type="password" value={tgToken} onChange={e => setTgToken(e.target.value)}
                placeholder="123456789:AAFxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
                style={{width:'100%',marginTop:5,background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:6,padding:'9px 12px',color:'var(--text)',fontSize:13,fontFamily:'JetBrains Mono'}} />
              <label style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',marginTop:12,display:'block'}}>Chat ID</label>
              <input type="text" value={tgChatId} onChange={e => setTgChatId(e.target.value)}
                placeholder="123456789"
                style={{width:'100%',marginTop:5,background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:6,padding:'9px 12px',color:'var(--text)',fontSize:13,fontFamily:'JetBrains Mono'}} />
              <div style={{marginTop:14,display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
                <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}>
                  <input type="checkbox" checked={tgEnabled} onChange={e => setTgEnabled(e.target.checked)} />
                  Notifications enabled
                </label>
              </div>
              <div style={{marginTop:14,fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Events</div>
              <div style={{marginTop:6,display:'flex',gap:14,flexWrap:'wrap'}}>
                {['buy','sell','eod','vix','startup'].map(ev => (
                  <label key={ev} style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}>
                    <input type="checkbox" checked={!!tgEvents[ev]}
                      onChange={e => setTgEvents({...tgEvents, [ev]: e.target.checked ? 1 : 0})} />
                    {ev}
                  </label>
                ))}
              </div>
              <div style={{marginTop:18,display:'flex',gap:8,justifyContent:'flex-end',flexWrap:'wrap'}}>
                {tgConfigured && <button className="btn btn-red" disabled={tgBusy} onClick={deleteTelegram}>Remove</button>}
                {tgConfigured && <button className="btn btn-ghost" disabled={tgBusy} onClick={testTelegram}>Send test</button>}
                <button className="btn btn-green" disabled={tgBusy} onClick={saveTelegram}>
                  {tgBusy ? 'Working…' : (tgConfigured ? 'Update' : 'Save & Test')}
                </button>
              </div>
            </div>
          </div>

          {/* Bot Mode (admin only) */}
          {me?.role === 'admin' && (
          <div className="card" style={{borderColor:'#ef4444'}}>
            <div className="card-hdr">
              <span className="card-title">⚙ Bot Mode  ·  ADMIN ONLY</span>
            </div>
            <BotModeAdmin />
          </div>
          )}

          {/* Security */}
          <div className="card">
            <div className="card-hdr"><span className="card-title">🔒 Security</span></div>
            <div style={{padding:18}}>
              <h3 style={{fontSize:13,fontWeight:600,marginBottom:10}}>Change password</h3>
              <input type="password" placeholder="Current password" value={curPw} onChange={e => setCurPw(e.target.value)}
                     style={{width:'100%',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 12px',color:'var(--text)',fontSize:13,marginBottom:8}} />
              <input type="password" placeholder="New password (min 8 chars)" value={newPw} onChange={e => setNewPw(e.target.value)}
                     style={{width:'100%',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 12px',color:'var(--text)',fontSize:13}} />
              <div style={{marginTop:12,display:'flex',justifyContent:'flex-end',gap:8}}>
                <button className="btn btn-blue" onClick={changePassword}>Update password</button>
              </div>

              <h3 style={{fontSize:13,fontWeight:600,marginTop:24,marginBottom:10}}>Active sessions</h3>
              <div style={{maxHeight:200,overflowY:'auto'}}>
                {sessions.length === 0 ? (
                  <div className="empty">No sessions</div>
                ) : (
                  <table>
                    <thead><tr><th>IP</th><th>Browser</th><th>Created</th><th></th></tr></thead>
                    <tbody>
                      {sessions.map((s, i) => (
                        <tr key={i}>
                          <td className="mono" style={{fontSize:11}}>{s.ip || '—'}{s.current && <Badge color="#10b981">CURRENT</Badge>}</td>
                          <td style={{fontSize:11,color:'var(--muted)',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.user_agent}</td>
                          <td className="mono" style={{fontSize:11,color:'var(--muted)'}}>{s.created_at?.slice(0,16).replace('T',' ')}</td>
                          <td>{!s.current && (
                            <button className="btn btn-red" style={{padding:'3px 10px',fontSize:11}}
                                    onClick={() => revokeSession(s.token_tail)}>Revoke</button>
                          )}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>
            </div>
          </div>

          {/* Audit log */}
          <div className="card">
            <div className="card-hdr"><span className="card-title">📜 Activity Log (last 100)</span></div>
            <div style={{maxHeight:240,overflowY:'auto'}}>
              {audit.length === 0 ? <div className="empty">No activity</div> :
                <table>
                  <thead><tr><th>When</th><th>Event</th><th>IP</th></tr></thead>
                  <tbody>
                    {audit.map((a, i) => (
                      <tr key={i}>
                        <td className="mono" style={{fontSize:11,color:'var(--muted)'}}>{a.created_at?.slice(0,19).replace('T',' ')}</td>
                        <td><Badge color={a.event?.includes('failed')||a.event?.includes('change')?'#f59e0b':'#3b82f6'}>{a.event}</Badge></td>
                        <td className="mono" style={{fontSize:11,color:'var(--muted)'}}>{a.ip||'—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              }
            </div>
          </div>

          {/* Logout */}
          <div style={{display:'flex',justifyContent:'space-between',padding:'8px 4px'}}>
            <span style={{fontSize:12,color:'var(--muted)'}}>Logged in as <b>{me?.email}</b></span>
            <button className="btn btn-red" onClick={logout}>Sign out</button>
          </div>

        </div>
      );
    };


    /* ── Bot mode banner (admin only) ─────────────────────── */
    const BotModeBanner = ({ me }) => {
      const [info, setInfo] = useState(null);
      useEffect(() => {
        if (me?.role !== 'admin') return;
        const load = () => fetch('/api/admin/bot_mode').then(r => r.ok ? r.json() : null).then(setInfo).catch(() => {});
        load();
        const id = setInterval(load, 30000);
        return () => clearInterval(id);
      }, [me?.role]);
      if (!info) return null;
      const live = info.mode === 'live';
      return (
        <div style={{
          padding:'8px 14px', textAlign:'center',
          background: live ? 'var(--down-soft)' : 'var(--accent-soft)',
          color: live ? 'var(--down)' : 'var(--accent)',
          fontWeight: 700, fontSize: 13,
          letterSpacing:'.05em', textTransform:'uppercase',
          borderBottom: `2px solid ${live ? 'var(--down)' : 'var(--accent)'}`,
        }}>
          {live ? '⚠ LIVE — REAL MONEY' : 'PAPER MODE'}
          <span style={{fontWeight:400,marginLeft:10,opacity:.8,textTransform:'none'}}>
            {info.base_url} {info.key_preview && `· key ${info.key_preview}`}
          </span>
        </div>
      );
    };


    /* ── Bot mode admin sub-component ─────────────────────── */
    const BotModeAdmin = () => {
      const toast = useToast();
      const [info, setInfo] = useState(null);
      const [target, setTarget] = useState('paper');
      const [k, setK] = useState('');
      const [s, setS] = useState('');
      const [confirm, setConfirm] = useState('');
      const [busy, setBusy] = useState(false);
      const load = () => fetch('/api/admin/bot_mode').then(r => r.json()).then(d => { setInfo(d); setTarget(d.mode); }).catch(() => {});
      useEffect(load, []);
      const apply = async () => {
        if (target === 'live' && confirm !== 'I UNDERSTAND THE RISKS') {
          toast.push('Type the confirmation phrase exactly to switch to LIVE', 'error');
          return;
        }
        if (!k || !s) { toast.push('Both keys required', 'error'); return; }
        setBusy(true);
        try {
          const r = await fetch('/api/admin/bot_mode', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({mode: target, api_key: k, secret_key: s, confirm}),
          });
          const d = await r.json();
          if (r.ok) {
            toast.push(`Bot switched to ${d.mode.toUpperCase()} (${d.account?.number?.slice(0,8) || ''})`, 'success');
            setK(''); setS(''); setConfirm('');
            load();
          } else {
            toast.push(d.error + (d.details ? `: ${typeof d.details === 'string' ? d.details : JSON.stringify(d.details).slice(0,140)}` : ''), 'error');
          }
        } finally { setBusy(false); }
      };
      const panic = async () => {
        if (!confirm0(`Cancel ALL open orders and liquidate ALL positions on ${info?.mode?.toUpperCase()} account?\nThis cannot be undone.`)) return;
        setBusy(true);
        try {
          const r = await fetch('/api/admin/panic_flat', {method:'POST'});
          const d = await r.json();
          toast.push(d.ok ? 'Panic flat submitted to broker' : (d.error || 'Failed'), d.ok ? 'success' : 'error');
        } finally { setBusy(false); }
      };
      const confirm0 = (msg) => window.confirm(msg);
      const live = info?.mode === 'live';
      return (
        <div style={{padding:18}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
            <div>
              <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,textTransform:'uppercase'}}>Current mode</div>
              <div style={{marginTop:6,fontSize:14}}>
                <Badge color={live?'#ef4444':'#3b82f6'}>{info?.mode?.toUpperCase() || '...'}</Badge>
              </div>
            </div>
            <div>
              <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,textTransform:'uppercase'}}>Base URL</div>
              <div style={{marginTop:6,fontFamily:'JetBrains Mono',fontSize:12}}>{info?.base_url || '—'}</div>
            </div>
          </div>
          {info?.warning && (
            <div style={{padding:'10px 14px',background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',borderRadius:7,fontSize:13,color:'#ef4444',marginBottom:14}}>
              {info.warning}
            </div>
          )}
          <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>Switch mode</div>
          <div style={{display:'flex',gap:14,marginBottom:12}}>
            <label style={{display:'flex',gap:6,alignItems:'center',fontSize:13,cursor:'pointer'}}>
              <input type="radio" checked={target==='paper'} onChange={() => setTarget('paper')} /> Paper
            </label>
            <label style={{display:'flex',gap:6,alignItems:'center',fontSize:13,cursor:'pointer'}}>
              <input type="radio" checked={target==='live'} onChange={() => setTarget('live')} /> Live (real money)
            </label>
          </div>
          <input type="text" placeholder="API key" value={k} onChange={e => setK(e.target.value)}
            style={{width:'100%',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:6,padding:'9px 12px',color:'var(--text)',fontSize:13,fontFamily:'JetBrains Mono',marginBottom:8}} />
          <input type="password" placeholder="Secret key" value={s} onChange={e => setS(e.target.value)}
            style={{width:'100%',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:6,padding:'9px 12px',color:'var(--text)',fontSize:13,fontFamily:'JetBrains Mono'}} />
          {target === 'live' && (
            <>
              <div style={{marginTop:14,padding:'10px 14px',background:'rgba(239,68,68,.12)',border:'1px solid rgba(239,68,68,.4)',borderRadius:7,fontSize:13,color:'#fca5a5'}}>
                <b>WARNING.</b> Switching to LIVE will trade real money on every signal.
                Recommended: 5+ clean paper sessions, dashboard P&amp;L matches Alpaca, EOD close verified.
              </div>
              <input type="text" placeholder="Type: I UNDERSTAND THE RISKS"
                value={confirm} onChange={e => setConfirm(e.target.value)}
                style={{width:'100%',marginTop:10,background:'var(--bg-input)',border:'1px solid #ef4444',borderRadius:6,padding:'9px 12px',color:'var(--text)',fontSize:13}} />
            </>
          )}
          <div style={{marginTop:18,display:'flex',gap:8,justifyContent:'space-between',flexWrap:'wrap'}}>
            <button className="btn danger" disabled={busy || !info} onClick={panic}>Panic flat (cancel + close all)</button>
            <button className={`btn ${target==='live'?'danger':'success'}`} disabled={busy} onClick={apply}>
              {busy ? 'Working…' : `Switch to ${target.toUpperCase()} & restart bot`}
            </button>
          </div>
        </div>
      );
    };

    /* Apply theme attribute to <html> */
    function applyThemeAttr(theme) {
      const t = (theme === 'auto')
        ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
        : theme;
      document.documentElement.setAttribute('data-theme', t);
      try { localStorage.setItem('theme', theme); } catch {}
    }

    /* ── Equity curve chart (line, like PnLChart but $ over time) ─── */
    const EquityChart = ({ history }) => {
      const ref = useRef(null), chart = useRef(null);
      const dep = JSON.stringify(history);
      useEffect(() => {
        if (!ref.current || !window.Chart) return;
        chart.current?.destroy();
        const safe   = Array.isArray(history) ? history : [];
        const labels = safe.map(h => h.date);
        const vals   = safe.map(h => h.equity);
        chart.current = new window.Chart(ref.current.getContext('2d'), {
          type: 'line',
          data: {
            labels,
            datasets: [{
              data: vals,
              borderColor: 'oklch(0.72 0.16 235)',
              backgroundColor: 'oklch(0.72 0.16 235 / 0.12)',
              fill: true, tension: 0.3, pointRadius: 2, borderWidth: 2,
            }],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false },
              tooltip: {
                backgroundColor: 'oklch(0.20 0.014 250)',
                borderColor: 'oklch(0.24 0.014 250)', borderWidth: 1,
                titleColor: 'oklch(0.58 0.014 250)', bodyColor: 'oklch(0.72 0.16 235)',
                callbacks: { label: ctx => ' ' + f$(ctx.raw) }
              }
            },
            scales: {
              x: { grid: { color: 'oklch(0.24 0.014 250 / 0.6)' },
                   ticks: { color: 'oklch(0.58 0.014 250)', font: { size: 10 }, maxTicksLimit: 12 } },
              y: { grid: { color: 'oklch(0.24 0.014 250 / 0.6)' },
                   ticks: { color: 'oklch(0.58 0.014 250)', font: { size: 10 },
                            callback: v => '$' + v.toLocaleString() } },
            },
          },
        });
        return () => chart.current?.destroy();
      }, [dep]);
      return (
        <div style={{ height: 280, position: 'relative' }}>
          <canvas ref={ref} />
          {!history?.length && (
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',
                         justifyContent:'center',color:'var(--ink-3)'}}>
              No equity history yet — bot writes one snapshot per day.
            </div>
          )}
        </div>
      );
    };

    /* ── Analytics tab (Sharpe / MDD / signal attribution) ─── */
    const AnalyticsTab = () => {
      const [a,    setA]    = useState(null);
      const [eq,   setEq]   = useState(null);
      const [load, setLoad] = useState(true);

      useEffect(() => {
        Promise.all([
          fetch('/api/analytics').then(r => r.json()),
          fetch('/api/equity').then(r => r.json()),
        ]).then(([an, eqd]) => { setA(an); setEq(eqd); })
          .finally(() => setLoad(false));
      }, []);

      if (load) return <div className="empty">Loading analytics…</div>;
      if (a?.error) return (
        <div className="card" style={{padding:24,textAlign:'center'}}>
          <div style={{fontSize:36,marginBottom:8}}>📊</div>
          <div style={{color:'var(--muted)'}}>{a.error}</div>
        </div>
      );

      const sharpeColor =  a?.sharpe_ratio  >= 1   ? 'var(--up)'
                         : a?.sharpe_ratio  >= 0.5 ? 'var(--warn)' : 'var(--down)';
      const sortinoColor = a?.sortino_ratio >= 1.5 ? 'var(--up)'
                         : a?.sortino_ratio >= 0.7 ? 'var(--warn)' : 'var(--down)';

      return (
        <div className="fadein">
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:12,marginBottom:16}}>
            <MetCard label="Sharpe Ratio"  value={a?.sharpe_ratio}    color={sharpeColor}
                     sub={a?.sharpe_ratio>=1?'Good':a?.sharpe_ratio>=0.5?'OK':'Weak'} />
            <MetCard label="Sortino Ratio" value={a?.sortino_ratio}   color={sortinoColor} />
            <MetCard label="Max Drawdown"  value={fpct(a?.max_drawdown)} color="var(--down)"
                     sub="Worst cumulative dip" />
            <MetCard label="Profit Factor" value={a?.profit_factor}   color={a?.profit_factor>=1.5?'var(--up)':'var(--warn)'}
                     sub="Wins$ / Losses$" />
            <MetCard label="Expectancy"    value={`${a?.expectancy ?? 0}%`} color="var(--accent)"
                     sub="Per-trade edge" />
            <MetCard label="Avg Slippage"  value={`${a?.avg_slippage_pct ?? 0}%`} color="var(--warn)"
                     sub="Buy-side fills" />
            <MetCard label="Total Trades"  value={a?.total_trades}    color="var(--purple)" />
            <MetCard label="Equity Peak"   value={f$(eq?.peak)}       color="var(--up)"
                     sub={`DD: ${fpct(eq?.drawdown_pct)}`} />
          </div>

          <div className="card" style={{marginBottom:16}}>
            <div className="card-hdr">
              <span className="card-title">📈 Equity Curve (daily snapshots)</span>
              {eq?.current && <span style={{fontFamily:'JetBrains Mono',fontWeight:700,fontSize:14,color:'#3b82f6'}}>{f$(eq.current)}</span>}
            </div>
            <div style={{padding:'12px 16px 16px'}}>
              <EquityChart history={eq?.history || []} />
            </div>
          </div>

          <div className="card" style={{marginBottom:16}}>
            <div className="card-hdr">
              <span className="card-title">🎯 Signal Attribution — Which signals win?</span>
            </div>
            <div style={{overflowX:'auto'}}>
              {!a?.signal_attribution?.length
                ? <div className="empty">Need at least one closed trade with logged reasons</div>
                : <table>
                    <thead><tr>
                      <th>Signal</th><th>Trades</th><th>Win Rate</th><th>Avg %</th>
                    </tr></thead>
                    <tbody>
                      {a.signal_attribution.map((s, i) => (
                        <tr key={i}>
                          <td style={{fontWeight:700}}>{s.signal}</td>
                          <td className="mono">{s.trades}</td>
                          <td className="mono" style={{color:s.win_rate>=50?'#10b981':'#ef4444',fontWeight:700}}>{s.win_rate}%</td>
                          <td className="mono" style={{color:clr(s.avg_pct),fontWeight:700}}>{fpct(s.avg_pct)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
              }
            </div>
          </div>

          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <a href="/api/export.csv" className="btn btn-blue"
               style={{textDecoration:'none',padding:'8px 16px'}}>📥 Export All Trades (CSV)</a>
          </div>
        </div>
      );
    };

    /* ── History tab (daily / weekly / monthly P&L) ─────────── */
    const HistoryTab = () => {
      const [range,   setRange]   = useState('week');
      const [history, setHistory] = useState(null);
      const [loading, setLoading] = useState(false);
      const [err,     setErr]     = useState(null);

      const load = useCallback(async (r) => {
        setLoading(true); setErr(null);
        try {
          const res  = await fetch(`/api/history?range=${r}`);
          const json = await res.json();
          setHistory(json);
        } catch (e) { setErr('Failed to load history'); }
        finally { setLoading(false); }
      }, []);

      useEffect(() => { load(range); }, [range, load]);

      const ranges = [
        { id:'day',   label:'Today'      },
        { id:'week',  label:'7 Days'     },
        { id:'month', label:'30 Days'    },
        { id:'all',   label:'All Time'   },
      ];

      const sum = history?.summary || {};
      const realized   = sum.realized_pnl   ?? 0;
      const unrealized = sum.unrealized_pnl ?? 0;

      return (
        <div className="fadein">
          {/* Range selector */}
          <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
            {ranges.map(r => (
              <button key={r.id} onClick={() => setRange(r.id)}
                className={`btn ${range === r.id ? 'primary' : 'ghost'}`}
                style={{padding:'8px 18px'}}>{r.label}</button>
            ))}
            <button className="btn ghost" style={{padding:'8px 14px',marginLeft:'auto'}}
              onClick={() => load(range)}>↻ Refresh</button>
          </div>

          {err && <div style={{padding:14,background:'rgba(239,68,68,.1)',color:'#ef4444',borderRadius:8,marginBottom:16}}>{err}</div>}

          {/* Summary */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:12,marginBottom:16}}>
            <MetCard label="Realized P&L"   value={f$(realized)}    color={clr(realized)} />
            <MetCard label="Unrealized P&L" value={f$(unrealized)}  color={clr(unrealized)} />
            <MetCard label="Total P&L"      value={f$(realized + unrealized)} color={clr(realized + unrealized)} />
            <MetCard label="Closed Trades"  value={sum.closed_trades ?? 0}    color="#3b82f6" />
            <MetCard label="Win Rate"       value={`${sum.win_rate ?? 0}%`}   color="#3b82f6">
              <WinBar wins={sum.wins ?? 0} losses={sum.losses ?? 0} />
            </MetCard>
            <MetCard label="Buy Orders"     value={sum.total_trades ?? 0}     color="#8b5cf6" />
          </div>

          {/* Daily breakdown */}
          <div className="card" style={{marginBottom:16}}>
            <div className="card-hdr">
              <span className="card-title">📅 Daily Breakdown</span>
              {history?.from && (
                <span style={{fontSize:11,color:'var(--muted)',fontFamily:'JetBrains Mono'}}>
                  {history.from} → {history.to}
                </span>
              )}
            </div>
            <div style={{overflowX:'auto',maxHeight:380,overflowY:'auto'}}>
              {loading
                ? <div className="empty"><div className="spin" style={{display:'inline-block',width:20,height:20,border:'2px solid var(--border)',borderTopColor:'#3b82f6',borderRadius:'50%'}} /></div>
                : !history?.daily?.length
                  ? <div className="empty">No closed trades in this range</div>
                  : <table>
                      <thead><tr>
                        <th>Date</th><th>Trades</th><th>Wins</th><th>Losses</th>
                        <th>Win Rate</th><th>Best %</th><th>Worst %</th><th>Realized P&L</th>
                      </tr></thead>
                      <tbody>
                        {(history.daily || []).slice().reverse().map((d, i) => (
                          <tr key={i}>
                            <td className="mono">{d.date}</td>
                            <td className="mono">{d.trades}</td>
                            <td className="mono" style={{color:'#10b981'}}>{d.wins}</td>
                            <td className="mono" style={{color:'#ef4444'}}>{d.losses}</td>
                            <td className="mono" style={{color:'#3b82f6',fontWeight:700}}>{d.win_rate}%</td>
                            <td className="mono" style={{color:'#10b981'}}>{fpct(d.best)}</td>
                            <td className="mono" style={{color:'#ef4444'}}>{fpct(d.worst)}</td>
                            <td className="mono" style={{color:clr(d.pnl_abs),fontWeight:700}}>{f$(d.pnl_abs)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
              }
            </div>
          </div>

          {/* Monthly breakdown */}
          {history?.monthly?.length > 1 && (
            <div className="card" style={{marginBottom:16}}>
              <div className="card-hdr"><span className="card-title">🗓️ Monthly Summary</span></div>
              <div style={{overflowX:'auto'}}>
                <table>
                  <thead><tr>
                    <th>Month</th><th>Trades</th><th>Wins</th><th>Win Rate</th><th>Realized P&L</th>
                  </tr></thead>
                  <tbody>
                    {(history.monthly || []).slice().reverse().map((m, i) => (
                      <tr key={i}>
                        <td className="mono">{m.month}</td>
                        <td className="mono">{m.trades}</td>
                        <td className="mono" style={{color:'#10b981'}}>{m.wins}</td>
                        <td className="mono" style={{color:'#3b82f6',fontWeight:700}}>{m.win_rate}%</td>
                        <td className="mono" style={{color:clr(m.pnl_abs),fontWeight:700}}>{f$(m.pnl_abs)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* Recent trades */}
          <div className="card">
            <div className="card-hdr">
              <span className="card-title">📋 All Trades In Range</span>
              <Badge color="#64748b">{history?.trades?.length ?? 0}</Badge>
            </div>
            <div style={{overflowX:'auto',maxHeight:500,overflowY:'auto'}}>
              <Trades rows={(history?.trades || []).slice().reverse()} full />
            </div>
          </div>
        </div>
      );
    };

    /* ── Broker-specific reports tab (non-Alpaca) ───────────── */
    const BrokerReportsTab = ({ broker }) => {
      const [trades, setTrades] = useState([]);
      const [loading, setLoading] = useState(true);
      const label = BROKER_LABELS[broker] || broker;
      const ccy = (broker === 'alpaca') ? 'USD' : 'INR';
      const fmt = v => {
        if (v == null || v === '') return '—';
        const n = Number(v); if (isNaN(n)) return '—';
        const sym = ccy === 'INR' ? '₹' : '$';
        return (n < 0 ? '-' + sym : sym) + Math.abs(n).toLocaleString('en-IN', {maximumFractionDigits:2});
      };

      useEffect(() => {
        setLoading(true);
        fetch(`/api/trades/history?broker=${broker}&limit=200`)
          .then(r => r.json())
          .then(d => { setTrades(Array.isArray(d) ? d : (d.trades || [])); })
          .catch(() => {})
          .finally(() => setLoading(false));
      }, [broker]);

      const completed = trades.filter(t => t.pnl != null);
      const totalPnl  = completed.reduce((s, t) => s + (Number(t.pnl) || 0), 0);
      const wins      = completed.filter(t => (Number(t.pnl) || 0) > 0).length;
      const winRate   = completed.length ? Math.round(wins / completed.length * 100) : 0;

      return (
        <div className="fadein">
          <div className="kpis" style={{marginBottom:16}}>
            <div className="kpi"><div className="lbl">Total Trades</div><div className="val">{completed.length}</div></div>
            <div className="kpi"><div className="lbl">Win Rate</div><div className="val" style={{color:'var(--accent)'}}>{winRate}%</div></div>
            <div className="kpi"><div className="lbl">Total P&amp;L</div><div className="val" style={{color:totalPnl>=0?'var(--up)':'var(--down)'}}>{fmt(totalPnl)}</div></div>
            <div className="kpi"><div className="lbl">Broker</div><div className="val" style={{fontSize:16}}>{label}</div></div>
          </div>
          <div className="card">
            <div className="card-hdr">
              <span className="card-title">📄 {label} Trade History</span>
              <Badge color="var(--accent)">{trades.length}</Badge>
            </div>
            {loading ? (
              <div className="empty">Loading…</div>
            ) : trades.length === 0 ? (
              <div className="empty">No trade history found for {label}.</div>
            ) : (
              <div style={{overflow:'auto'}}>
                <table>
                  <thead><tr><th>Time</th><th>Symbol</th><th>Side</th><th>Qty</th><th>Price</th><th>P&amp;L</th></tr></thead>
                  <tbody>
                    {trades.map((t, i) => (
                      <tr key={i}>
                        <td className="mono" style={{color:'var(--ink-3)',fontSize:12}}>{t.time || t.timestamp || t.t || '—'}</td>
                        <td className="mono" style={{fontWeight:600}}>{t.symbol || t.ticker || '—'}</td>
                        <td><span className={`badge ${t.side==='BUY'||t.side==='buy'?'up':'down'}`}>{(t.side||'').toUpperCase()}</span></td>
                        <td className="mono">{t.qty ?? t.quantity ?? '—'}</td>
                        <td className="mono">{fmt(t.price ?? t.avg_price ?? t.px)}</td>
                        <td className="mono" style={{color:t.pnl==null?'var(--ink-4)':Number(t.pnl)>=0?'var(--up)':'var(--down)'}}>
                          {t.pnl == null ? 'open' : fmt(t.pnl)}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    };

    /* ── Reports tab (past EOD HTML reports) ────────────────── */
    const ReportsTab = () => {
      const [list,    setList]    = useState([]);
      const [picked,  setPicked]  = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        fetch('/api/reports')
          .then(r => r.json())
          .then(d => { setList(d || []); if (d?.[0]) setPicked(d[0].url); })
          .catch(() => {})
          .finally(() => setLoading(false));
      }, []);

      return (
        <div className="fadein" data-mobile-stack style={{display:'grid',gridTemplateColumns:'260px 1fr',gap:16}}>
          <div className="card">
            <div className="card-hdr">
              <span className="card-title">📄 Past Reports</span>
              <Badge color="#3b82f6">{list.length}</Badge>
            </div>
            <div style={{maxHeight:700,overflowY:'auto'}}>
              {loading
                ? <div className="empty">Loading…</div>
                : list.length === 0
                  ? <div className="empty">No daily reports yet. They are generated at market close.</div>
                  : list.map((r, i) => (
                    <div key={i} onClick={() => setPicked(r.url)} style={{
                      padding:'11px 16px', cursor:'pointer',
                      borderBottom:'1px solid rgba(22,36,64,.5)',
                      background: picked === r.url ? 'var(--blue-bg)' : 'transparent',
                      borderLeft: `3px solid ${picked === r.url ? '#3b82f6' : 'transparent'}`,
                    }}>
                      <div style={{fontWeight:600,fontSize:13,fontFamily:'JetBrains Mono'}}>{r.date}</div>
                      <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>EOD report</div>
                    </div>
                  ))
              }
            </div>
          </div>
          <div className="card" style={{minHeight:700}}>
            <div className="card-hdr">
              <span className="card-title">📊 Report Viewer</span>
              {picked && (
                <a href={picked} target="_blank" rel="noopener" className="btn btn-blue"
                   style={{padding:'4px 12px',fontSize:11,textDecoration:'none'}}>↗ Open in new tab</a>
              )}
            </div>
            {picked
              ? <iframe src={picked} style={{width:'100%',height:'calc(100vh - 220px)',border:'none',background:'#0d1117'}} />
              : <div className="empty">Select a report from the list</div>
            }
          </div>
        </div>
      );
    };

    /* ── Daily stats card ────────────────────────────────────── */
    const DailyStats = ({ stats = {} }) => (
      <div className="card">
        <div className="card-hdr"><span className="card-title">📊 Daily Stats</span></div>
        <div style={{padding:'4px 0'}}>
          {[
            { label:'Total Trades',   value: stats.total_trades ?? 0,    color:'#3b82f6'  },
            { label:'Win Rate',       value: `${stats.win_rate ?? 0}%`,  color:'#3b82f6'  },
            { label:'Avg Win',        value: `+${stats.avg_win?.toFixed(2)??0}%`, color:'#10b981' },
            { label:'Avg Loss',       value: `${stats.avg_loss?.toFixed(2)??0}%`, color:'#ef4444' },
          ].map((r, i) => (
            <div key={i} style={{
              display:'flex', justifyContent:'space-between', alignItems:'center',
              padding:'10px 16px', borderBottom:'1px solid rgba(22,36,64,.5)',
            }}>
              <span style={{color:'var(--muted)',fontSize:13}}>{r.label}</span>
              <span style={{fontFamily:'JetBrains Mono',fontWeight:700,fontSize:15,color:r.color}}>{r.value}</span>
            </div>
          ))}
          <div style={{padding:'10px 16px'}}>
            <WinBar wins={stats.wins??0} losses={stats.losses??0} />
          </div>
        </div>
      </div>
    );

    /* ══════════════════════════════════════════════════════════ */
    /* ── Shared Indian broker helpers ───────────────────────── */
    const INR = v => {
      if (v == null || v === '') return '—';
      const n = parseFloat(v);
      if (isNaN(n)) return '—';
      return '₹' + n.toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});
    };

    const OrderForm = ({ onSubmit, loading, exchanges, products, orderTypes }) => {
      const [sym,   setSym]   = useState('');
      const [token, setToken] = useState('');
      const [side,  setSide]  = useState('BUY');
      const [qty,   setQty]   = useState('');
      const [price, setPrice] = useState('0');
      const [otype, setOtype] = useState('MARKET');
      const [prod,  setProd]  = useState((products||[])[0]||'INTRADAY');
      const [exch,  setExch]  = useState((exchanges||[])[0]||'NSE');
      const [sl,    setSl]    = useState('0');
      const [target,setTarget]= useState('0');

      const inp = {width:'100%',background:'var(--bg-input)',border:'1px solid var(--border)',
                   borderRadius:6,padding:'7px 10px',color:'var(--text)',fontSize:13};
      const lbl = {fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',display:'block',marginBottom:4};

      const submit = () => onSubmit({tradingsymbol:sym.toUpperCase(),symboltoken:token,
        transaction_type:side,quantity:parseInt(qty)||0,price:parseFloat(price)||0,
        order_type:otype,product:prod||otype,exchange:exch,
        stoploss:parseFloat(sl)||0,squareoff:parseFloat(target)||0});

      return (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div>
            <label style={lbl}>Symbol</label>
            <input style={inp} placeholder="RELIANCE-EQ" value={sym} onChange={e=>setSym(e.target.value)} />
          </div>
          <div>
            <label style={lbl}>Symbol Token</label>
            <input style={inp} placeholder="2885" value={token} onChange={e=>setToken(e.target.value)} />
          </div>
          <div>
            <label style={lbl}>Side</label>
            <div style={{display:'flex',gap:6}}>
              {['BUY','SELL'].map(s=>(
                <button key={s} onClick={()=>setSide(s)}
                  className={`btn ${side===s?(s==='BUY'?'btn-green':'btn-red'):'btn-ghost'}`}
                  style={{flex:1,fontSize:13}}>{s}</button>
              ))}
            </div>
          </div>
          <div>
            <label style={lbl}>Qty</label>
            <input style={inp} type="number" min="1" value={qty} onChange={e=>setQty(e.target.value)} />
          </div>
          <div>
            <label style={lbl}>Price (0=Market)</label>
            <input style={inp} type="number" step="0.05" value={price} onChange={e=>setPrice(e.target.value)} />
          </div>
          <div>
            <label style={lbl}>Order Type</label>
            <select style={inp} value={otype} onChange={e=>setOtype(e.target.value)}>
              {(orderTypes||['MARKET','LIMIT','STOPLOSS_LIMIT','STOPLOSS_MARKET']).map(t=>(
                <option key={t}>{t}</option>
              ))}
            </select>
          </div>
          {(products||[]).length>0 && (
            <div>
              <label style={lbl}>Product</label>
              <select style={inp} value={prod} onChange={e=>setProd(e.target.value)}>
                {products.map(p=><option key={p}>{p}</option>)}
              </select>
            </div>
          )}
          <div>
