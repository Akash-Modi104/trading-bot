      /* Expose setTab globally so broker tabs can redirect to profile */
      useEffect(() => { window._setTab = setTab; return () => { window._setTab = null; }; }, [setTab]);

      /* Apply theme on first paint */
      useEffect(() => {
        const saved = localStorage.getItem('theme') || 'dark';
        applyThemeAttr(saved);
      }, []);

      /* Browser push notifications: ask permission once */
      useEffect(() => {
        if ('Notification' in window && Notification.permission === 'default') {
          // Defer until user interacts with the page
          const ask = () => { Notification.requestPermission(); window.removeEventListener('click', ask); };
          window.addEventListener('click', ask);
          return () => window.removeEventListener('click', ask);
        }
      }, []);

      /* Notify on new buy/sell trades */
      useEffect(() => {
        if (!data?.trades) return;
        for (const t of data.trades) {
          const id = `${t.time}_${t.sym}_${t.action}`;
          if (lastTradeIds.current.has(id)) continue;
          lastTradeIds.current.add(id);
          if (lastTradeIds.current.size > 100) {
            // Trim
            lastTradeIds.current = new Set([...lastTradeIds.current].slice(-50));
          }
          // Don't notify on initial load — only if app has been open >5s
          if (window._appReadyAt && (Date.now() - window._appReadyAt > 5000)) {
            const action = t.action?.toUpperCase() || '?';
            const body = `${action} ${t.qty || ''} ${t.sym} @ $${t.price}` +
                         (t.pct != null ? ` (${t.pct >= 0 ? '+' : ''}${t.pct.toFixed(2)}%)` : '');
            if ('Notification' in window && Notification.permission === 'granted') {
              new Notification(`AlgoTrader — ${action}`, { body, icon: '/favicon.ico' });
            }
          }
        }
        if (!window._appReadyAt) window._appReadyAt = Date.now();
      }, [data?.trades?.length]);

      /* Clock — IST */
      const [istClock, setIstClock] = useState('');
      useEffect(() => {
        const tick = () => {
          const ist = new Date().toLocaleTimeString('en-IN', {
            timeZone:'Asia/Kolkata', hour12:false,
            hour:'2-digit', minute:'2-digit', second:'2-digit',
          });
          setClock(
            new Date().toLocaleTimeString('en-US', {
              timeZone:'America/New_York', hour12:false,
              hour:'2-digit', minute:'2-digit', second:'2-digit',
            }) + ' ET'
          );
          setIstClock(ist + ' IST');
        };
        tick();
        const id = setInterval(tick, 1000);
        return () => clearInterval(id);
      }, []);

      /* SSE real-time feed */
      useEffect(() => {
        let es;
        const connect = () => {
          es = new EventSource('/api/stream');
          es.addEventListener('snapshot', e => {
            try { setData(JSON.parse(e.data)); setConnected(true); } catch {}
          });
          es.onerror = () => {
            setConnected(false);
            es.close();
            setTimeout(connect, 5000);
          };
        };
        connect();
        return () => es?.close();
      }, []);

      /* Health polling */
      useEffect(() => {
        const poll = () => fetch('/api/health').then(r => r.json()).then(setHealth).catch(() => {});
        poll();
        const id = setInterval(poll, 15000);
        return () => clearInterval(id);
      }, []);

      const sendAction = (action) =>
        fetch('/api/action', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({action}),
        });

      if (!data) return (
        <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12,color:'var(--ink-3)'}}>
          <div style={{width:32,height:32,border:'3px solid var(--line)',borderTopColor:'var(--accent)',borderRadius:'50%'}} className="spin" />
          <div>Connecting to trading server…</div>
        </div>
      );

      const { metrics: m, stats, picks, trades, positions, activity_log, curve, params } = data;
      const paused = m?.paused;

      /* Broker-aware topbar stats */
      const _bInfo = aggData?.brokers?.[broker] || {};
      const _bPos  = _bInfo.positions || [];
      const topbarEquity = broker === 'alpaca'
        ? m?.equity
        : (_bInfo.equity ?? _bInfo.available_cash);
      const topbarPnl = broker === 'alpaca'
        ? m?.daily_pnl
        : _bPos.reduce((s,p) => s + (Number(p.pnl)||0), 0);
      const topbarPnlPct = broker === 'alpaca' ? m?.daily_pnl_pct : null;
      const topbarCcy = broker === 'alpaca' ? 'USD' : 'INR';
      const fTopbar = v => {
        if (v == null) return '—';
        const n = Number(v); if (isNaN(n)) return '—';
        if (topbarCcy === 'INR') {
          const s = n < 0 ? '-₹' : '₹';
          return s + Math.abs(n).toLocaleString('en-IN', {maximumFractionDigits:0});
        }
        return f$(n);
      };
      const fTopbarPnl = v => {
        if (v == null) return '—';
        const n = Number(v); if (isNaN(n)) return '—';
        if (topbarCcy === 'INR') {
          const s = n >= 0 ? '+₹' : '-₹';
          return s + Math.abs(n).toLocaleString('en-IN', {maximumFractionDigits:0});
        }
        return (n >= 0 ? '+' : '') + f$(n);
      };

      const TABS = [
        { id:'overview',  label:'📊 Overview'   },
        { id:'trades',    label:'📋 Trades'     },
        { id:'combined',  label:'🌐 Combined'   },
        { id:'history',   label:'📅 History'    },
        { id:'analytics', label:'📈 Analytics'  },
        { id:'angelone',  label:'🏦 Angel One'  },
        { id:'zerodha',   label:'📈 Zerodha'    },
        { id:'reports',   label:'📄 Reports'    },
        { id:'strategy',  label:'⚙️ Strategy'   },
        { id:'system',    label:'💻 System'     },
        { id:'profile',   label:'👤 Profile'    },
      ];


      const cycleTheme = () => {
        const order = ['dark', 'light', 'auto'];
        const cur = me?.theme || localStorage.getItem('theme') || 'dark';
        const next = order[(order.indexOf(cur) + 1) % order.length];
        applyThemeAttr(next);
        if (me) {
          fetch('/api/profile', {
            method: 'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ theme: next }),
          }).then(loadMe);
        }
      };
      const themeIcon = { dark:'🌙', light:'☀️', auto:'🖥️' }[me?.theme || localStorage.getItem('theme') || 'dark'] || '🌙';

      /* Sidebar nav mapping */
      const SIDEBAR_TABS = [
        { id:'overview',  label:'Overview',    icon:'⊞' },
        { id:'trades',    label:'Trades',      icon:'⬡' },
        { id:'combined',  label:'Combined',    icon:'⊕' },
        { id:'history',   label:'History',     icon:'⊘' },
        { id:'analytics', label:'Analytics',   icon:'⬗' },
        { id:'reports',   label:'Reports',     icon:'▣' },
      ];
      const SIDEBAR_BROKER_TABS = [
        { id:'alpaca',    label:'Alpaca',      icon:'◆' },
        { id:'angelone',  label:'Angel One',   icon:'◈' },
        { id:'zerodha',   label:'Zerodha',     icon:'◉' },
      ];
      const SIDEBAR_BOT_TABS = [
        { id:'strategy',  label:'Strategy',    icon:'⚙' },
        { id:'system',    label:'System',      icon:'⬟' },
        { id:'profile',   label:'Profile',     icon:'◯' },
      ];

      const isMarketOpen = () => {
        const now = new Date();
        const et = new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
        const h = et.getHours(), m2 = et.getMinutes(), day = et.getDay();
        if (day === 0 || day === 6) return false;
        return (h > 9 || (h === 9 && m2 >= 30)) && h < 16;
      };
      const mktOpen = isMarketOpen();

      const visibleBroken = (brokerHealth?.broken || [])
        .filter(b => !healthDismissed[b]);
      const goFixBroker = (b) => {
        setTab('profile');
        setTimeout(() => {
          const el = document.querySelector(`[data-broker-card="${b}"]`);
          if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
        }, 60);
      };

      return (
        <div>
          <BotModeBanner me={me} />
          {visibleBroken.length > 0 && (
            <div style={{
              padding:'10px 18px', background:'rgba(245,158,11,.14)',
              borderBottom:'1px solid rgba(245,158,11,.35)',
              fontSize:13, color:'#f59e0b', display:'flex',
              alignItems:'center', gap:14, justifyContent:'center',
              flexWrap:'wrap',
            }}>
              <span style={{fontWeight:700}}>⚠️ Connection issue:</span>
              {visibleBroken.map(b => {
                const d = brokerHealth.brokers[b] || {};
                const label = b === 'angelone' ? 'Angel One' :
                              b[0].toUpperCase() + b.slice(1);
                const isKite = d.fix === 'kite_login';
                return (
                  <span key={b} style={{display:'inline-flex',alignItems:'center',gap:6}}>
                    <b>{label}</b>
                    <span style={{color:'rgba(245,158,11,.85)',fontSize:12}}>
                      — {d.error === 'session_expired' ? 'session expired (daily login needed)'
                          : d.error === 'no_credentials' ? 'not connected'
                          : d.error === 'credentials_corrupted' ? 'stored keys are unreadable — reconnect'
                          : (d.error || 'connection broken')}
                    </span>
                    {isKite && d.login_url ? (
                      <a href={d.login_url} className="btn btn-blue" style={{padding:'2px 10px',fontSize:11,textDecoration:'none'}}>
                        Re-login →
                      </a>
                    ) : (
                      <button className="btn btn-ghost" style={{padding:'2px 10px',fontSize:11}}
                              onClick={() => goFixBroker(b)}>
                        Fix in Profile →
                      </button>
                    )}
                    <button onClick={() => setHealthDismissed(s => ({...s, [b]: true}))}
                            title="Dismiss until next refresh"
                            style={{background:'transparent',border:'none',cursor:'pointer',color:'inherit',opacity:.6,fontSize:13}}>
                      ✕
                    </button>
                  </span>
                );
              })}
            </div>
          )}
          <div className="shell">

          {/* ── Sidebar ─────────────────────────────────────────── */}
          <aside className="sidebar">
            <div className="brand">
              <div className="brand-mark">A</div>
              <div>
                <div className="brand-name">AlgoTrader</div>
                <div className="brand-sub">Dashboard</div>
              </div>
            </div>

            {SIDEBAR_TABS.map(t => (
              <button key={t.id} className={`nav-item${tab===t.id?' active':''}`} onClick={() => setTab(t.id)}>
                <span className="nav-rail" />
                <span style={{fontSize:15,flexShrink:0}}>{t.icon}</span>
                <span>{t.label}</span>
              </button>
            ))}

            <div className="nav-section">Brokers</div>
            {SIDEBAR_BROKER_TABS.map(t => (
              <button key={t.id} className={`nav-item${tab===t.id?' active':''}`} onClick={() => setTab(t.id)}>
                <span className="nav-rail" />
                <span style={{fontSize:15,flexShrink:0}}>{t.icon}</span>
                <span>{t.label}</span>
              </button>
            ))}

            <div className="nav-section">Config</div>
            {SIDEBAR_BOT_TABS.map(t => (
              <button key={t.id} className={`nav-item${tab===t.id?' active':''}`} onClick={() => setTab(t.id)}>
                <span className="nav-rail" />
                <span style={{fontSize:15,flexShrink:0}}>{t.icon}</span>
                <span>{t.label}</span>
              </button>
            ))}

            <div className="sidebar-status">
              <div className="sidebar-status-row">
                <Dot on={connected} />
                <span>{connected ? 'Live feed' : 'Offline'}</span>
              </div>
              <div className="sidebar-status-row">
                <span className={`pill ${paused ? 'warn' : 'up'}`} style={{fontSize:10}}>
                  {paused ? 'Paused' : 'Running'}
                </span>
              </div>
              <div className="sidebar-status-row" style={{fontSize:10,color:'var(--ink-4)'}}>
                <span>v2.0</span>
              </div>
            </div>
          </aside>

          {/* ── Shell body: topbar + content ─────────────────────── */}
          <div className="shell-body">

          {/* ── Top bar ─────────────────────────────────────────── */}
          <header className="topbar">
            <div className="topbar-left">
              {/* Cosmetic search */}
              <div className="topbar-search hide-on-mobile">
                <span style={{fontSize:13}}>⌕</span>
                <span>Search symbols…</span>
              </div>
              {/* Market status */}
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span className={`dot ${mktOpen ? 'up' : 'down'} pulse`} />
                <span style={{fontSize:12,fontWeight:600,color:mktOpen?'var(--up)':'var(--ink-3)'}}>{mktOpen ? 'OPEN' : 'CLOSED'}</span>
              </div>
              <div className="topbar-divider hide-on-mobile" />
              {/* IST clock */}
              <div className="topbar-stat hide-on-mobile">
                <span className="lbl">IST</span>
                <span className="val" style={{fontSize:13}}>{istClock}</span>
              </div>
            </div>

            <div className="topbar-right">
              {/* Equity — broker-aware */}
              <div className="topbar-stat always">
                <span className="lbl">Equity</span>
                <span className="val">{fTopbar(topbarEquity)}</span>
              </div>
              <div className="topbar-divider hide-on-mobile" />
              {/* Day P&L — broker-aware */}
              <div className="topbar-stat always">
                <span className="lbl">Day P&L</span>
                <span className="val" style={{color:clr(topbarPnl)}}>
                  {fTopbarPnl(topbarPnl)}
                  {topbarPnlPct != null && (
                    <span style={{fontSize:11,opacity:.75,marginLeft:4,fontWeight:400}}>({fpct(topbarPnlPct)})</span>
                  )}
                </span>
              </div>
              <div className="topbar-divider hide-on-mobile" />
              {/* Pause — only for Alpaca bot */}
              {broker === 'alpaca' && (
                <button className={`btn btn-sm ${paused ? 'warn' : 'ghost'}`} style={{fontSize:12}}
                  onClick={() => sendAction(paused ? 'start' : 'stop')}>
                  {paused ? '▶ Resume' : '⏸ Pause'}
                </button>
              )}
              {/* Theme toggle */}
              <button onClick={cycleTheme} title="Toggle theme"
                style={{background:'var(--bg-2)',border:'1px solid var(--line)',borderRadius:'var(--r)',
                        padding:'6px 10px',cursor:'pointer',fontSize:15,color:'var(--ink)',lineHeight:1}}>
                {themeIcon}
              </button>
              {/* Account Switcher */}
              <BrokerSwitcher
                broker={broker} setBroker={setBroker}
                me={me} aggData={aggData}
                onLogout={handleLogout}
              />
            </div>
          </header>

          {/* ── Page content ───────────────────────────────────── */}
          <main className="content">

          {/* Mobile bottom nav */}
          <nav className="mobile-bar">
            <div className="mobile-bar-inner">
              {[
                {id:'overview', label:'Overview', icon:'⊞'},
                {id:'trades',   label:'Trades',   icon:'⬡'},
                {id:'history',  label:'History',  icon:'⊘'},
                {id:'reports',  label:'Reports',  icon:'▣'},
                {id:'profile',  label:'Profile',  icon:'◯'},
              ].map(t => (
                <button key={t.id} className={`mobile-bar-btn${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>
                  <span className="mb-icon">{t.icon}</span>
                  {t.label}
                </button>
              ))}
            </div>
          </nav>


            {/* Alpaca-not-connected banner (any tab) */}
            {me && !me.alpaca?.connected && tab !== 'profile' && (
              <div style={{
                background:'var(--accent-soft)', border:'1px solid transparent',
                borderRadius:'var(--r)', padding:'12px 16px', marginBottom:16,
                color:'var(--accent)', display:'flex', alignItems:'center', justifyContent:'space-between',
                gap:12, flexWrap:'wrap',
              }}>
                <span><b>No Alpaca account connected</b> — connect your API keys to start trading with this dashboard.</span>
                <button className="btn primary" onClick={() => setTab('profile')}>Connect now →</button>
              </div>
            )}

            {/* OVERVIEW */}
            {tab === 'all' && <AllAccountsTab />}
            {tab === 'overview' && broker !== 'alpaca' && (
              <ErrorBoundary key={`overview-${broker}`}><BrokerAggregateOverview broker={broker} aggData={aggData} health={health} /></ErrorBoundary>
            )}
            {tab === 'overview' && broker === 'alpaca' && (
              <div className="fadein">

                {/* Paused banner */}
                {paused && (
                  <div style={{
                    background:'var(--warn-soft)', border:'1px solid transparent',
                    borderRadius:'var(--r)', padding:'11px 16px', marginBottom:16,
                    color:'var(--warn)', display:'flex', alignItems:'center', gap:8, fontSize:13,
                  }}>
                    <span>⚠</span>
                    <span style={{fontWeight:700}}>Trading Paused</span>
                    {m?.pause_reason && <span style={{color:'var(--ink-3)'}}>— {m.pause_reason}</span>}
                  </div>
                )}

                {/* KPI cards — 4 col grid */}
                <div className="kpis">
                  {/* Equity KPI */}
                  <div className="kpi">
                    <div className="lbl">Account Equity</div>
                    <div className="val" style={{color:clr((m?.equity??100000)-100000)}}>{f$(m?.equity)}</div>
                    <div className="sub">
                      <span style={{color:'var(--ink-3)'}}>Buying power: {f$(m?.buying_power)}</span>
                    </div>
                  </div>

                  {/* Day P&L KPI */}
                  <div className="kpi">
                    <div className="lbl">Day P&amp;L</div>
                    <div className="val" style={{color:clr(m?.daily_pnl)}}>{fpct(m?.daily_pnl_pct)}</div>
                    <div className="sub">{f$(m?.daily_pnl)}</div>
                    <div className="progress" style={{marginTop:8}}>
                      <span style={{width:`${Math.min(Math.abs(Number(m?.daily_pnl_pct)||0)/2*100,100)}%`,background:(Number(m?.daily_pnl)||0)>=0?'var(--up)':'var(--down)'}} />
                    </div>
                  </div>

                  {/* Open Positions KPI */}
                  <div className="kpi">
                    <div className="lbl">Open Positions</div>
                    <div className="val">{positions?.length??0}<span style={{fontSize:16,color:'var(--ink-3)'}}> / {params?.max_positions??3}</span></div>
                    <div className="sub">
                      <span>{stats?.total_trades??0} trades today</span>
                    </div>
                    <div className="progress" style={{marginTop:8}}>
                      <span style={{width:`${((positions?.length??0)/(params?.max_positions??3))*100}%`}} />
                    </div>
                  </div>

                  {/* Win Rate KPI */}
                  <div className="kpi">
                    <div className="lbl">Win Rate</div>
                    <div className="val" style={{color:'var(--accent)'}}>{stats?.win_rate??0}<span style={{fontSize:16}}>%</span></div>
                    <div className="sub">
                      <span style={{color:'var(--up)'}}>{stats?.wins??0}W</span>
                      <span style={{color:'var(--ink-4)'}}>·</span>
                      <span style={{color:'var(--down)'}}>{stats?.losses??0}L</span>
                    </div>
                    <div className="progress up" style={{marginTop:8}}>
                      <span style={{width:`${stats?.win_rate??0}%`}} />
                    </div>
                  </div>
                </div>

                {/* Positions + Chart */}
                <div className="row-2">
                  <Positions rows={positions??[]} equity={m?.equity ?? 0} />
                  <div className="card">
                    <div className="chart-h">
                      <div>
                        <div className="eyebrow">Intraday P&amp;L</div>
                        <div className="big" style={{color:clr(m?.daily_pnl),fontSize:22,marginTop:2}}>{f$(m?.daily_pnl)}</div>
                      </div>
                      <Regime v={m?.regime} />
                    </div>
                    <div style={{padding:'4px 16px 16px'}}><PnLChart curve={curve} /></div>
                  </div>
                </div>

                {/* Picks + Trades */}
                <div className="row-2-eq">
                  <Picks rows={picks??[]} />
                  <Trades rows={trades??[]} />
                </div>

                {/* Log + Controls + Health */}
                <div className="row-2-eq">
                  <div style={{display:'flex',flexDirection:'column',gap:16}}>
                    <Log rows={activity_log??[]} />
                    <DailyStats stats={stats} />
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:16}}>
                    <Controls onAction={sendAction} paused={paused} pauseReason={m?.pause_reason} />
                    <Health health={health} />
                  </div>
                </div>
              </div>
            )}

            {/* TRADES */}
            {tab === 'trades' && broker === 'alpaca' && (
              <div className="fadein"><Trades rows={trades??[]} full exportUrl="/api/export.csv" /></div>
            )}
            {tab === 'trades' && broker !== 'alpaca' && (
              <ErrorBoundary key={`trades-${broker}`}><CombinedTradesTab defaultBroker={broker} lockBroker /></ErrorBoundary>
            )}

            {/* COMBINED TRADES */}
            {tab === 'combined' && <ErrorBoundary key="combined"><CombinedTradesTab /></ErrorBoundary>}

            {/* HISTORY */}
            {tab === 'history' && broker === 'alpaca' && <HistoryTab />}
            {tab === 'history' && broker !== 'alpaca' && (
              <ErrorBoundary key={`history-${broker}`}><BrokerHistoryTab broker={broker} /></ErrorBoundary>
            )}

            {/* ANALYTICS */}
            {tab === 'analytics' && broker === 'alpaca' && <AnalyticsTab />}
            {tab === 'analytics' && broker !== 'alpaca' && (
              <ErrorBoundary key={`analytics-${broker}`}><BrokerAnalyticsTab broker={broker} /></ErrorBoundary>
            )}

            {/* ANGEL ONE */}
            {/* ALPACA */}
            {tab === 'alpaca' && <ErrorBoundary key="alp"><AlpacaTab me={me} /></ErrorBoundary>}

            {/* ANGEL ONE */}
            {tab === 'angelone' && <ErrorBoundary key="ao"><AngelOneTab me={me} /></ErrorBoundary>}

            {/* ZERODHA */}
            {tab === 'zerodha' && <ErrorBoundary key="zrd"><ZerodhaTab me={me} /></ErrorBoundary>}

            {/* REPORTS */}
            {tab === 'reports' && broker === 'alpaca' && <ReportsTab />}
            {tab === 'reports' && broker !== 'alpaca' && (
              <ErrorBoundary key={`reports-${broker}`}><BrokerReportsTab broker={broker} /></ErrorBoundary>
            )}

            {/* STRATEGY */}
            {tab === 'strategy' && broker === 'alpaca' && (
              <div className="fadein"><Strategy params={params} /></div>
            )}
            {tab === 'strategy' && broker !== 'alpaca' && (
              <IndianStrategy broker={broker} health={health} />
            )}

            {/* SYSTEM */}
            {tab === 'system' && (
              <div className="fadein"><SystemTab health={health} data={data} /></div>
            )}

            {/* PROFILE */}
            {tab === 'profile' && <ProfileTab me={me} onMe={loadMe} />}

            <div style={{textAlign:'center',marginTop:32,padding:'20px 0',
                         borderTop:'1px solid var(--line-soft)',color:'var(--ink-4)',fontSize:12}}>
              Trading involves risk of loss. Read the&nbsp;
              <a href="/disclaimer" target="_blank" rel="noopener"
                 style={{color:'var(--accent)'}}>Terms &amp; Disclaimer</a>
              &nbsp;before use. Not financial advice.
            </div>

          </main>
          </div>{/* end shell-body */}
          </div>{/* end shell */}
        </div>
      );
    };

    const Root = () => (
      <ToastProvider>
        <App />
      </ToastProvider>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
