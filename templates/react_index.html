<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Command Center - React</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0d1117',
                        cardBg: '#161b22',
                        borderColor: '#30363d',
                        accentBlue: '#58a6ff',
                        textMuted: '#8b949e',
                        winGreen: '#39d353',
                        lossRed: '#f85149',
                        warningYellow: '#e3b341',
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #0d1117; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #58a6ff; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const StatCard = ({ label, value, valueClass }) => (
            <div className="bg-gradient-to-br from-[#21262d] to-cardBg border border-borderColor rounded-xl p-5 text-center transition-all duration-300 hover:border-accentBlue hover:shadow-[0_8px_16px_rgba(88,166,255,0.1)] hover:-translate-y-1">
                <div className="text-textMuted text-xs uppercase tracking-wider mb-2 font-semibold">{label}</div>
                <div className={`text-2xl font-bold ${valueClass || 'text-accentBlue'}`}>{value}</div>
            </div>
        );

        const Dashboard = () => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);

            const fetchData = async () => {
                try {
                    const res = await fetch('/api/data');
                    const json = await res.json();
                    setData(json);
                    setLoading(false);
                } catch (err) {
                    console.error("Failed to fetch data:", err);
                }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 20000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                lucide.createIcons();
            });

            const handleAction = async (action) => {
                if (action === 'close_all' && !confirm('Are you sure you want to close ALL positions?')) return;
                
                try {
                    await fetch('/api/action', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action })
                    });
                    fetchData(); // Refresh immediately after action
                } catch (err) {
                    console.error("Action failed:", err);
                }
            };

            if (loading || !data) return (
                <div className="flex h-screen items-center justify-center text-accentBlue text-xl">
                    <i data-lucide="loader-2" className="animate-spin mr-3"></i> Loading Command Center...
                </div>
            );

            const { metrics, stats, picks, trades, positions, activity_log, timestamp } = data;

            return (
                <div className="max-w-[1400px] mx-auto p-5">
                    {/* Header */}
                    <header className="flex flex-col md:flex-row justify-between items-center mb-8 border-b-2 border-borderColor pb-5 gap-4">
                        <div>
                            <h1 className="text-accentBlue text-3xl font-bold mb-2 drop-shadow-[0_2px_10px_rgba(88,166,255,0.3)] flex items-center">
                                <i data-lucide="bar-chart-2" className="mr-3"></i> Trading Command Center
                            </h1>
                            <div className="text-textMuted text-sm">Real-time bot performance | Last update: {timestamp}</div>
                        </div>
                        <div className="flex flex-wrap gap-3">
                            <button onClick={() => handleAction('start')} className="px-5 py-2.5 bg-[#238636] hover:bg-[#2ea043] text-white rounded-lg font-bold transition-all flex items-center shadow-lg hover:-translate-y-0.5">
                                <i data-lucide="play" className="mr-2 w-4 h-4"></i> Start Bot
                            </button>
                            <button onClick={() => handleAction('stop')} className="px-5 py-2.5 bg-[#b91c1c] hover:bg-[#dc2626] text-white rounded-lg font-bold transition-all flex items-center shadow-lg hover:-translate-y-0.5">
                                <i data-lucide="pause" className="mr-2 w-4 h-4"></i> Stop Bot
                            </button>
                            <button onClick={() => handleAction('scan')} className="px-5 py-2.5 bg-[#1d4ed8] hover:bg-[#2563eb] text-white rounded-lg font-bold transition-all flex items-center shadow-lg hover:-translate-y-0.5">
                                <i data-lucide="search" className="mr-2 w-4 h-4"></i> Scan Now
                            </button>
                            <button onClick={() => handleAction('close_all')} className="px-5 py-2.5 bg-[#92400e] hover:bg-[#b45309] text-white rounded-lg font-bold transition-all flex items-center shadow-lg hover:-translate-y-0.5">
                                <i data-lucide="alert-triangle" className="mr-2 w-4 h-4"></i> Close All
                            </button>
                        </div>
                    </header>

                    {/* Live Metrics */}
                    <section className="bg-cardBg border border-borderColor rounded-xl p-5 mb-6 shadow-[0_4px_12px_rgba(0,0,0,0.4)]">
                        <h2 className="text-accentBlue text-xl border-l-4 border-accentBlue pl-3 mb-5 uppercase tracking-wide flex items-center">
                            <i data-lucide="activity" className="mr-2"></i> Live Account Metrics
                        </h2>
                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
                            <StatCard label="Account Equity" value={`$${metrics.equity.toLocaleString()}`} valueClass={metrics.equity >= 100000 ? 'text-winGreen' : 'text-lossRed'} />
                            <StatCard label="Buying Power" value={`$${metrics.buying_power.toLocaleString()}`} />
                            <StatCard label="Today's P&L" value={`${metrics.daily_pnl.toFixed(2)}%`} valueClass={metrics.daily_pnl >= 0 ? 'text-winGreen' : 'text-lossRed'} />
                            <StatCard label="Trades Executed" value={metrics.trades_count} />
                            <StatCard label="VIX Level" value={metrics.vix.toFixed(1)} valueClass={metrics.vix < 20 ? 'text-winGreen' : (metrics.vix < 28 ? 'text-warningYellow' : 'text-lossRed')} />
                            <StatCard label="Market Regime" value={metrics.regime.toUpperCase()} />
                            <div className="bg-gradient-to-br from-[#21262d] to-cardBg border border-borderColor rounded-xl p-5 text-center transition-all">
                                <div className="text-textMuted text-xs uppercase tracking-wider mb-2 font-semibold">Bot Status</div>
                                <span className={`inline-block px-3 py-1 rounded-md text-sm font-bold ${metrics.paused ? 'bg-[#3a2a1a] text-warningYellow' : 'bg-[#1a3a1a] text-winGreen'}`}>
                                    {metrics.paused ? 'PAUSED' : 'ACTIVE'}
                                </span>
                            </div>
                        </div>
                    </section>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                        {/* Open Positions */}
                        <section className="bg-cardBg border border-borderColor rounded-xl p-5 shadow-[0_4px_12px_rgba(0,0,0,0.4)]">
                            <h2 className="text-accentBlue text-xl border-l-4 border-accentBlue pl-3 mb-5 uppercase tracking-wide flex items-center">
                                <i data-lucide="map-pin" className="mr-2"></i> Open Positions ({positions.length})
                            </h2>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm">
                                    <thead>
                                        <tr className="border-b-2 border-borderColor text-accentBlue uppercase tracking-wider">
                                            <th className="p-3 bg-darkBg">Symbol</th>
                                            <th className="p-3 bg-darkBg">Qty</th>
                                            <th className="p-3 bg-darkBg">Entry</th>
                                            <th className="p-3 bg-darkBg">Current</th>
                                            <th className="p-3 bg-darkBg">P&L</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {positions.length === 0 ? (
                                            <tr><td colSpan="5" className="p-4 text-center text-textMuted border-b border-[#21262d]">No open positions</td></tr>
                                        ) : positions.map((p, i) => (
                                            <tr key={i} className={`hover:bg-[#21262d] border-b border-[#21262d] border-l-4 ${p.pct > 0 ? 'border-l-winGreen' : 'border-l-lossRed'}`}>
                                                <td className="p-3 font-bold">{p.sym}</td>
                                                <td className="p-3">{p.qty}</td>
                                                <td className="p-3">${parseFloat(p.entry).toFixed(2)}</td>
                                                <td className="p-3">${parseFloat(p.curr).toFixed(2)}</td>
                                                <td className={`p-3 font-bold ${p.pct > 0 ? 'text-winGreen' : 'text-lossRed'}`}>{p.pct > 0 ? '+' : ''}{p.pct.toFixed(2)}%</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </section>

                        {/* AI-Selected Stocks */}
                        <section className="bg-cardBg border border-borderColor rounded-xl p-5 shadow-[0_4px_12px_rgba(0,0,0,0.4)]">
                            <h2 className="text-accentBlue text-xl border-l-4 border-accentBlue pl-3 mb-5 uppercase tracking-wide flex items-center">
                                <i data-lucide="target" className="mr-2"></i> Today's AI Watchlist
                            </h2>
                            {picks.length > 0 ? (
                                <div className="bg-[#1a3a1a] border-l-4 border-winGreen text-winGreen p-3 rounded-lg mb-4 flex items-center">
                                    <i data-lucide="check-circle" className="mr-2 w-5 h-5"></i> {picks.length} stocks selected by AI scanner
                                </div>
                            ) : (
                                <div className="bg-[#3a2a1a] border-l-4 border-warningYellow text-warningYellow p-3 rounded-lg mb-4 flex items-center">
                                    <i data-lucide="clock" className="mr-2 w-5 h-5"></i> Waiting for first scan of the day
                                </div>
                            )}
                            <div className="overflow-y-auto max-h-[300px] custom-scroll pr-2">
                                {picks.length === 0 ? (
                                    <div className="text-center text-textMuted py-4">Waiting for scanner results...</div>
                                ) : picks.map((p, i) => (
                                    <div key={i} className="p-3 border-b border-borderColor flex justify-between items-center hover:bg-[#21262d] rounded transition-colors">
                                        <div className="flex flex-col">
                                            <span className="font-bold text-lg">{p.symbol}</span>
                                            <span className="text-xs text-textMuted uppercase">{p.sector}</span>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-accentBlue font-bold text-lg">{p.confidence}% AI Score</div>
                                            <div className="text-xs text-textMuted max-w-[200px] truncate" title={p.reason}>{p.reason}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </div>

                    {/* Trade Execution Log */}
                    <section className="bg-cardBg border border-borderColor rounded-xl p-5 mb-6 shadow-[0_4px_12px_rgba(0,0,0,0.4)]">
                        <h2 className="text-accentBlue text-xl border-l-4 border-accentBlue pl-3 mb-5 uppercase tracking-wide flex items-center">
                            <i data-lucide="list" className="mr-2"></i> Trade Execution Log (Today)
                        </h2>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm">
                                <thead>
                                    <tr className="border-b-2 border-borderColor text-accentBlue uppercase tracking-wider">
                                        <th className="p-3 bg-darkBg">Time</th>
                                        <th className="p-3 bg-darkBg">Symbol</th>
                                        <th className="p-3 bg-darkBg">Action</th>
                                        <th className="p-3 bg-darkBg">Qty</th>
                                        <th className="p-3 bg-darkBg">Price</th>
                                        <th className="p-3 bg-darkBg">P&L</th>
                                        <th className="p-3 bg-darkBg">Reason</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {trades.length === 0 ? (
                                        <tr><td colSpan="7" className="p-4 text-center text-textMuted border-b border-[#21262d]">No trades yet today</td></tr>
                                    ) : trades.map((t, i) => {
                                        const isBuy = t.action.toUpperCase() === 'BUY';
                                        return (
                                            <tr key={i} className={`hover:bg-[#21262d] border-b border-[#21262d] border-l-4 ${isBuy ? 'border-l-winGreen' : 'border-l-lossRed'}`}>
                                                <td className="p-3 text-textMuted">{t.time.substring(11, 19)}</td>
                                                <td className="p-3 font-bold">{t.sym}</td>
                                                <td className="p-3">
                                                    <span className={`px-2 py-1 rounded text-xs font-bold ${isBuy ? 'bg-[#1a3a1a] text-winGreen' : 'bg-[#3a1a1a] text-lossRed'}`}>
                                                        {t.action.toUpperCase()}
                                                    </span>
                                                </td>
                                                <td className="p-3">{t.qty}</td>
                                                <td className="p-3">${parseFloat(t.price).toFixed(2)}</td>
                                                <td className={`p-3 font-bold ${t.pct > 0 ? 'text-winGreen' : (t.pct < 0 ? 'text-lossRed' : '')}`}>
                                                    {t.pct ? `${t.pct > 0 ? '+' : ''}${t.pct.toFixed(2)}%` : '-'}
                                                </td>
                                                <td className="p-3 text-textMuted max-w-xs truncate" title={t.reason}>{t.reason}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </section>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* Daily Performance */}
                        <section className="bg-cardBg border border-borderColor rounded-xl p-5 shadow-[0_4px_12px_rgba(0,0,0,0.4)]">
                            <h2 className="text-accentBlue text-xl border-l-4 border-accentBlue pl-3 mb-5 uppercase tracking-wide flex items-center">
                                <i data-lucide="pie-chart" className="mr-2"></i> Daily Performance
                            </h2>
                            <div className="space-y-3">
                                <div className="flex justify-between items-center p-3 border-b border-[#21262d]">
                                    <span className="text-textMuted">Total Trades</span>
                                    <span className="text-xl font-bold text-accentBlue">{stats.total_trades}</span>
                                </div>
                                <div className="flex justify-between items-center p-3 border-b border-[#21262d]">
                                    <span className="text-textMuted">Winning Trades</span>
                                    <span className="text-xl font-bold text-winGreen">{stats.wins}</span>
                                </div>
                                <div className="flex justify-between items-center p-3 border-b border-[#21262d]">
                                    <span className="text-textMuted">Losing Trades</span>
                                    <span className="text-xl font-bold text-lossRed">{stats.losses}</span>
                                </div>
                                <div className="flex justify-between items-center p-3 border-b border-[#21262d]">
                                    <span className="text-textMuted">Win Rate</span>
                                    <span className="text-xl font-bold text-accentBlue">{stats.win_rate}%</span>
                                </div>
                                <div className="flex justify-between items-center p-3 border-b border-[#21262d]">
                                    <span className="text-textMuted">Avg Win</span>
                                    <span className="text-xl font-bold text-winGreen">+{stats.avg_win.toFixed(2)}%</span>
                                </div>
                                <div className="flex justify-between items-center p-3">
                                    <span className="text-textMuted">Avg Loss</span>
                                    <span className="text-xl font-bold text-lossRed">{stats.avg_loss.toFixed(2)}%</span>
                                </div>
                            </div>
                        </section>

                        {/* Activity Log */}
                        <section className="bg-cardBg border border-borderColor rounded-xl p-5 shadow-[0_4px_12px_rgba(0,0,0,0.4)] flex flex-col">
                            <h2 className="text-accentBlue text-xl border-l-4 border-accentBlue pl-3 mb-5 uppercase tracking-wide flex items-center">
                                <i data-lucide="terminal" className="mr-2"></i> Activity Log
                            </h2>
                            <div className="bg-darkBg rounded-lg p-4 font-mono text-sm overflow-y-auto max-h-[300px] custom-scroll flex-1 border border-[#21262d]">
                                {activity_log.length === 0 ? (
                                    <div className="text-textMuted italic">No activity yet</div>
                                ) : activity_log.map((log, i) => (
                                    <div key={i} className="mb-2">
                                        <span className="text-accentBlue">[{log.t || "00:00:00"}]</span> <span className="text-[#c9d1d9]">{log.m}</span>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
