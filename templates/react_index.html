<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlgoTrader Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel (in-browser JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Inter + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens ──────────────────────────────────────── */
    :root {
      --bg-0: oklch(0.16 0.012 250);
      --bg-1: oklch(0.20 0.014 250);
      --bg-2: oklch(0.235 0.016 250);
      --bg-3: oklch(0.27 0.018 250);
      --line: oklch(0.30 0.018 250);
      --line-soft: oklch(0.24 0.014 250);
      --ink: oklch(0.96 0.005 250);
      --ink-2: oklch(0.78 0.012 250);
      --ink-3: oklch(0.58 0.014 250);
      --ink-4: oklch(0.42 0.016 250);
      --up: oklch(0.74 0.16 152);
      --up-soft: oklch(0.30 0.06 152);
      --down: oklch(0.68 0.20 25);
      --down-soft: oklch(0.30 0.08 25);
      --warn: oklch(0.82 0.14 80);
      --warn-soft: oklch(0.32 0.06 80);
      --accent: oklch(0.72 0.16 235);
      --accent-soft: oklch(0.30 0.07 235);
      --r-sm: 6px; --r: 10px; --r-lg: 14px;
      --font-ui: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;

      /* Legacy aliases — kept for compat with inline styles that use old var names */
      --bg:          oklch(0.16 0.012 250);
      --bg-card:     oklch(0.20 0.014 250);
      --bg-hover:    oklch(0.235 0.016 250);
      --bg-input:    oklch(0.235 0.016 250);
      --border:      oklch(0.30 0.018 250);
      --border-lt:   oklch(0.30 0.018 250);
      --text:        oklch(0.96 0.005 250);
      --muted:       oklch(0.58 0.014 250);
      --dim:         oklch(0.42 0.016 250);
      --blue:        var(--accent);
      --blue-bg:     var(--accent-soft);
      --green:       var(--up);
      --green-bg:    var(--up-soft);
      --red:         var(--down);
      --red-bg:      var(--down-soft);
      --yellow:      var(--warn);
      --yellow-bg:   var(--warn-soft);
      --purple:      oklch(0.68 0.18 290);
      --purple-bg:   oklch(0.28 0.07 290);
    }

    html[data-theme="light"] {
      --bg-0: oklch(0.97 0.004 250);
      --bg-1: oklch(1.0  0.0   250);
      --bg-2: oklch(0.95 0.006 250);
      --bg-3: oklch(0.92 0.008 250);
      --line: oklch(0.88 0.008 250);
      --line-soft: oklch(0.91 0.006 250);
      --ink: oklch(0.15 0.010 250);
      --ink-2: oklch(0.30 0.012 250);
      --ink-3: oklch(0.50 0.012 250);
      --ink-4: oklch(0.65 0.010 250);
      --bg:          oklch(0.97 0.004 250);
      --bg-card:     oklch(1.0  0.0   250);
      --bg-hover:    oklch(0.95 0.006 250);
      --bg-input:    oklch(0.95 0.006 250);
      --border:      oklch(0.88 0.008 250);
      --border-lt:   oklch(0.82 0.010 250);
      --text:        oklch(0.15 0.010 250);
      --muted:       oklch(0.50 0.012 250);
      --dim:         oklch(0.65 0.010 250);
    }
    html[data-theme="light"] thead th { background: oklch(0.95 0.006 250 / 0.95); }
    html[data-theme="light"] .sidebar { background: oklch(0.98 0.003 250) !important; }
    html[data-theme="light"] .topbar { background: oklch(0.98 0.003 250 / 0.85) !important; }

    /* ── Shell layout ───────────────────────────────────────── */
    .shell {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: 100vh;
    }
    .shell-body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ────────────────────────────────────────────── */
    .sidebar {
      border-right: 1px solid var(--line-soft);
      background: oklch(0.18 0.012 250);
      padding: 18px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 10px 22px;
    }
    .brand-mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--up));
      display: grid;
      place-items: center;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 14px;
      color: oklch(0.16 0.012 250);
      flex-shrink: 0;
    }
    .brand-name {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .brand-sub {
      font-size: 10px;
      color: var(--ink-4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--r);
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-2);
      transition: background .12s, color .12s;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      cursor: pointer;
    }
    .nav-item:hover { background: var(--bg-2); color: var(--ink); }
    .nav-item.active { background: var(--bg-2); color: var(--ink); }
    .nav-rail {
      width: 3px;
      height: 16px;
      border-radius: 2px;
      background: transparent;
      margin-left: -12px;
      margin-right: 7px;
      flex-shrink: 0;
    }
    .nav-item.active .nav-rail { background: var(--accent); }
    .nav-section {
      margin-top: 14px;
      padding: 10px 12px 6px;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-4);
      font-weight: 600;
    }
    .sidebar-status {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--line-soft);
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-left: 10px;
    }
    .sidebar-status-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--ink-3);
    }

    /* ── Top bar ────────────────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 24px;
      background: oklch(0.18 0.012 250 / 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line-soft);
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .topbar-stat { display: flex; flex-direction: column; }
    .topbar-stat .lbl { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); }

    /* ── Account Switcher ─────────────────────────────────── */
    .acct-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-2); border: 1px solid var(--line);
      border-radius: var(--r); padding: 5px 10px 5px 5px;
      cursor: pointer; transition: all .15s; min-width: 150px; color: var(--ink);
    }
    .acct-btn:hover { background: var(--bg-3); border-color: var(--accent); }
    .acct-avatar {
      width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 11px; color: #fff; letter-spacing: .02em;
    }
    .acct-wrap { position: relative; }
    .acct-drop {
      position: absolute; top: calc(100% + 8px); right: 0; width: 290px;
      background: var(--bg-1); border: 1px solid var(--line);
      border-radius: var(--r-lg); box-shadow: 0 12px 40px oklch(0 0 0 / 0.5);
      z-index: 200; overflow: hidden;
    }
    .acct-drop-head {
      padding: 11px 16px; font-size: 10px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--ink-4); border-bottom: 1px solid var(--line-soft);
    }
    .acct-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; cursor: pointer; transition: background .1s;
    }
    .acct-item:hover { background: var(--bg-2); }
    .acct-item.active { background: var(--bg-3); }
    .acct-info { flex: 1; min-width: 0; }
    .acct-name { font-size: 13px; font-weight: 600; display:flex; align-items:center; gap:6px; }
    .acct-sub { font-size: 11px; color: var(--ink-3); margin-top: 2px; font-family: var(--font-mono); }
    .acct-check { color: var(--up); font-size: 14px; font-weight: 700; }
    .acct-divider { height: 1px; background: var(--line-soft); margin: 4px 0; }
    .acct-action {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer; font-size: 13px;
      transition: background .1s; color: var(--ink-3);
    }
    .acct-action:hover { background: var(--bg-2); color: var(--ink); }
    .acct-action.danger { color: var(--down); }
    .acct-action.danger:hover { background: var(--down-soft); }
    .mode-badge {
      display: inline-flex; align-items: center; padding: 1px 6px;
      border-radius: 3px; font-size: 9px; font-weight: 800;
      letter-spacing: .06em; text-transform: uppercase;
    }
    .mode-badge.paper { background: var(--accent-soft); color: var(--accent); }
    .mode-badge.live  { background: var(--down-soft);   color: var(--down);   }
    .mode-badge.sim   { background: var(--warn-soft);   color: var(--warn);   }
    .topbar-stat .val { font-family: var(--font-mono); font-weight: 600; font-size: 15px; color: var(--ink); }
    .topbar-divider { width: 1px; height: 28px; background: var(--line-soft); }

    /* ── Search box ─────────────────────────────────────────── */
    .topbar-search {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 6px 12px;
      min-width: 180px;
      color: var(--ink-3);
      font-size: 13px;
    }

    /* ── Main content ───────────────────────────────────────── */
    .content {
      padding: 20px 24px 80px;
      max-width: 1480px;
      width: 100%;
      margin: 0 auto;
      flex: 1;
    }

    /* ── KPI cards ──────────────────────────────────────────── */
    .kpis {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 16px;
    }
    .kpi {
      background: var(--bg-1);
      border: 1px solid var(--line-soft);
      border-radius: var(--r-lg);
      padding: 14px 16px 12px;
      position: relative;
      overflow: hidden;
      transition: border-color .15s, transform .15s;
      cursor: default;
    }
    .kpi:hover { border-color: var(--line); transform: translateY(-2px); }
    .kpi .lbl { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; }
    .kpi .val { font-family: var(--font-mono); font-weight: 600; font-size: 26px; letter-spacing: -0.01em; margin-top: 6px; }
    .kpi .sub { font-size: 12px; color: var(--ink-3); margin-top: 4px; display: flex; align-items: center; gap: 6px; }
    .kpi .spark-wrap { position: absolute; right: 10px; top: 12px; width: 80px; height: 30px; opacity: 0.9; }

    /* ── Layout rows ────────────────────────────────────────── */
    .row-2 { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; margin-bottom: 16px; }
    .row-2-eq { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

    /* ── Chart header ───────────────────────────────────────── */
    .chart-h { display: flex; align-items: baseline; justify-content: space-between; padding: 14px 18px 6px; }
    .chart-h .big { font-family: var(--font-mono); font-weight: 600; font-size: 28px; letter-spacing: -0.01em; }

    /* ── Range toggle ───────────────────────────────────────── */
    .range-toggle { display: inline-flex; gap: 2px; background: var(--bg-2); padding: 3px; border-radius: var(--r); border: 1px solid var(--line-soft); }
    .range-toggle button { padding: 4px 10px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; color: var(--ink-3); border-radius: var(--r-sm); background: none; border: none; cursor: pointer; }
    .range-toggle button.active { background: var(--bg-0); color: var(--ink); }

    /* ── Activity log ───────────────────────────────────────── */
    .log { display: flex; flex-direction: column; font-family: var(--font-mono); font-size: 12px; max-height: 280px; overflow-y: auto; }
    .log-row { display: grid; grid-template-columns: 64px 70px 1fr; gap: 10px; padding: 8px 16px; border-bottom: 1px solid var(--line-soft); }
    .log-tag { font-weight: 700; font-size: 11px; letter-spacing: 0.05em; }
    .log-tag.buy { color: var(--up); }
    .log-tag.sell { color: var(--down); }
    .log-tag.scan { color: var(--accent); }
    .log-tag.warn { color: var(--warn); }
    .log-tag.info { color: var(--ink-3); }

    /* ── Position rows ──────────────────────────────────────── */
    .pos-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--line-soft); align-items: center; }
    .tick-glyph {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--bg-2); border: 1px solid var(--line-soft);
      display: grid; place-items: center;
      font-family: var(--font-mono); font-weight: 700; font-size: 11px; color: var(--ink-2);
      flex-shrink: 0;
    }

    /* ── Utility classes ────────────────────────────────────── */
    .eyebrow { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; }
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
      background: var(--bg-2); color: var(--ink-2); border: 1px solid var(--line-soft);
    }
    .pill.up { background: var(--up-soft); color: var(--up); border-color: transparent; }
    .pill.down { background: var(--down-soft); color: var(--down); border-color: transparent; }
    .pill.warn { background: var(--warn-soft); color: var(--warn); border-color: transparent; }
    .pill.accent { background: var(--accent-soft); color: var(--accent); border-color: transparent; }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .dot.up { background: var(--up); box-shadow: 0 0 8px var(--up); }
    .dot.down { background: var(--down); box-shadow: 0 0 8px var(--down); }

    /* ── Progress bars ──────────────────────────────────────── */
    .progress { position: relative; height: 6px; border-radius: 999px; background: var(--bg-2); overflow: hidden; }
    .progress > span { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); border-radius: 999px; transition: width .4s ease; }
    .progress.up > span { background: var(--up); }
    .progress.down > span { background: var(--down); }
    .conf-bar { width: 60px; height: 5px; background: var(--bg-2); border-radius: 999px; overflow: hidden; }
    .conf-bar > span { display: block; height: 100%; background: var(--accent); border-radius: 999px; }

    /* ── Form elements ──────────────────────────────────────── */
    .input, .select {
      height: 36px; padding: 0 12px;
      background: var(--bg-2); border: 1px solid var(--line);
      border-radius: var(--r); color: var(--ink);
      font-family: var(--font-mono); font-size: 13px;
      outline: none; transition: border-color .15s;
    }
    .input:focus, .select:focus { border-color: var(--accent); }
    .toggle {
      width: 38px; height: 22px; background: var(--bg-3); border-radius: 999px;
      position: relative; cursor: pointer; border: 1px solid var(--line); transition: background .15s;
    }
    .toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--ink-2); transition: transform .18s, background .15s;
    }
    .toggle.on { background: var(--accent-soft); border-color: transparent; }
    .toggle.on::after { transform: translateX(16px); background: var(--accent); }

    /* ── Mobile bottom bar ──────────────────────────────────── */
    .mobile-bar {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
      background: oklch(0.18 0.012 250 / 0.96);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid var(--line-soft);
      padding: 8px 4px env(safe-area-inset-bottom, 8px);
    }
    .mobile-bar-inner { display: flex; justify-content: space-around; }
    .mobile-bar-btn {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 6px 12px; border-radius: var(--r); background: none; border: none;
      cursor: pointer; color: var(--ink-3); font-size: 10px; font-weight: 500;
      transition: color .12s;
    }
    .mobile-bar-btn.active { color: var(--accent); }
    .mobile-bar-btn svg, .mobile-bar-btn .mb-icon { font-size: 18px; }

    /* ── Card ───────────────────────────────────────────────── */
    .card {
      background: var(--bg-1);
      border: 1px solid var(--line-soft);
      border-radius: var(--r-lg);
      overflow: hidden;
    }
    .card-hdr {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-3);
    }
    .empty {
      padding: 36px;
      text-align: center;
      color: var(--ink-3);
      font-size: 13px;
    }

    /* ── Badge ──────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Buttons ────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: var(--r);
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--line);
      background: var(--bg-2);
      color: var(--ink);
      font-family: var(--font-ui);
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .05s;
      letter-spacing: 0.02em;
    }
    .btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); filter: brightness(.95); }
    .btn.primary, .btn-blue { background: var(--accent); color: oklch(0.16 0.012 250); border-color: transparent; }
    .btn.success, .btn-green { background: var(--up-soft); color: var(--up); border-color: transparent; }
    .btn.danger, .btn-red { background: var(--down-soft); color: var(--down); border-color: transparent; }
    .btn.ghost, .btn-ghost { background: transparent; color: var(--ink-3); border-color: var(--line-soft); }
    .btn-yellow { background: var(--warn-soft); color: var(--warn); border-color: transparent; }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: var(--r-sm); }

    /* ── Tables ─────────────────────────────────────────────── */
    .mono { font-family: var(--font-mono); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      padding: 9px 14px;
      text-align: left;
      color: var(--ink-4);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      background: oklch(0.16 0.012 250 / 0.9);
      border-bottom: 1px solid var(--line-soft);
      position: sticky;
      top: 0;
      z-index: 1;
      white-space: nowrap;
    }
    tbody td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line-soft);
      vertical-align: middle;
      color: var(--ink-2);
    }
    tbody tr:hover td { background: var(--bg-2); }
    tbody tr:last-child td { border-bottom: none; }

    /* ── Inputs ─────────────────────────────────────────────── */
    input[type="number"],
    input[type="text"],
    input[type="password"],
    select,
    textarea {
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      color: var(--ink);
      padding: 6px 10px;
      font-size: 13px;
      font-family: var(--font-mono);
      outline: none;
      transition: border-color .15s;
    }
    input[type="number"] { width: 100%; font-size: 14px; font-weight: 700; padding: 6px 10px; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }

    /* ── Scrollbars ─────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--line-soft); }

    /* ── Base ───────────────────────────────────────────────── */
    html { font-size: 14px; }
    body {
      background: var(--bg-0);
      background-image: radial-gradient(circle at 0 0, oklch(0.22 0.02 250) 0 1px, transparent 1px);
      background-size: 32px 32px;
      color: var(--ink);
      font-family: var(--font-ui);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Animations ─────────────────────────────────────────── */
    @keyframes pulse-dot { 0%,100%{opacity:1}50%{opacity:0.35} }
    @keyframes pulse  { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }
    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .pulse  { animation: pulse-dot 1.6s ease-in-out infinite; }
    .spin   { animation: spin   1s  linear      infinite; }
    .fadein { animation: fadein .25s ease; }

    /* ── Responsive ─────────────────────────────────────────── */
    /* Tablet — collapse sidebar to icon strip */
    @media (max-width: 1024px) {
      .shell { grid-template-columns: 64px 1fr; }
      .sidebar { padding: 18px 8px; }
      .brand-name, .brand-sub, .nav-item span:not(.nav-rail), .nav-section, .sidebar-status-row span { display: none !important; }
      .nav-item { justify-content: center; padding: 10px 8px; }
      .brand { padding: 4px 4px 22px; justify-content: center; }
      .kpis { grid-template-columns: repeat(2, 1fr); }
    }

    /* Mobile — sidebar hidden, bottom nav shown */
    @media (max-width: 880px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .mobile-bar { display: block; }
      .content { padding: 14px 12px 100px; }
      .kpis { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .row-2, .row-2-eq { grid-template-columns: 1fr !important; gap: 12px; }
      /* Topbar — make account switcher PRIMARY on mobile */
      .topbar { padding: 10px 12px; gap: 8px; flex-wrap: wrap; row-gap: 8px; }
      .topbar-left { flex: 1 1 auto; min-width: 0; order: 1; gap: 8px; }
      .topbar-right { flex: 0 0 auto; justify-content: flex-end; order: 2; gap: 8px; }
      /* Hide redundant equity / P&L from topbar on mobile — already shown in KPI cards */
      .topbar-right .topbar-stat { display: none !important; }
      /* Account switcher — clearly visible, full-width on small phones */
      .acct-btn { min-width: 140px; max-width: none; flex: 0 1 auto; }
      .acct-drop {
        position: absolute;
        top: calc(100% + 8px); right: -12px; left: auto;
        bottom: auto;
        width: calc(100vw - 24px);
        max-height: 60vh;
        overflow-y: auto;
      }
      /* Card padding tighter */
      .card-hdr { padding: 10px 12px; }
      /* Tables get horizontal scroll wrapper hint */
      .card > table, .card > div > table { display: block; overflow-x: auto; }
      /* Position rows: tighter padding */
      .pos-row { padding: 10px 12px; }
      .tick-glyph { width: 32px; height: 32px; font-size: 11px; }
      /* Card body padding tighter */
      .card-b, .card > div { padding-left: 12px; padding-right: 12px; }
      /* KPI tighter */
      .kpi { padding: 12px 14px; }
      .kpi .val { font-size: 22px; }
      .kpi .spark-wrap { display: none; }
      /* Buttons wrap inside controls */
      .card-hdr > div { flex-wrap: wrap; gap: 6px; }
      /* Strategy/allocation forms — collapse 3-col grids to single column */
      [data-mobile-stack] { grid-template-columns: 1fr !important; }
    }

    /* Phone — single column */
    @media (max-width: 640px) {
      .kpis { grid-template-columns: 1fr 1fr; }
      .topbar-stat { display: none; }
      .topbar-stat.always { display: flex; }
      .topbar-search { display: none; }
      .content { padding: 12px 10px 100px; }
      table { font-size: 11px; min-width: 100%; }
      thead th, tbody td { padding: 7px 8px !important; }
      canvas { max-height: 200px !important; }
      /* Ensure all inline 2/3-column grids inside cards collapse */
      .card div[style*="gridTemplateColumns"], .card div[style*="grid-template-columns"] {
        /* note: inline styles can't be overridden purely by selector — use data-mobile-stack */
      }
      /* Form inputs full-width */
      input, select, textarea { font-size: 14px; }
      /* Modals/cards with maxWidth — full width on phone */
      .card[style*="maxWidth"] { max-width: 100% !important; margin: 16px 0 !important; }
      /* Indian Bot Controls — Start/Stop/Restart stack */
      [data-bot-actions] { grid-template-columns: 1fr !important; }
      /* Bot allocation 2x2 stays as 2x2 (good) but force gap */
      [data-allocation-grid] { gap: 8px !important; }
      /* Watchlist symbol pills — smaller */
      [data-watchlist-grid] { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)) !important; }
      /* Segmented date pills wrap */
      .segment-pills { flex-wrap: wrap; }
      /* Activity log — smaller text */
      .log-row { font-size: 11px !important; }
    }

    @media (max-width: 480px) {
      .kpis { grid-template-columns: 1fr; }
      .acct-btn { padding: 4px 8px 4px 4px; }
      .acct-btn .acct-avatar { width: 24px; height: 24px; font-size: 10px; }
      /* Card title smaller */
      .card-title { font-size: 9px; }
      /* Trades table: hide less-critical columns */
      .hide-on-narrow { display: none !important; }
      /* Force all inline 1fr 1fr / repeat(2 grids inside cards to stack */
      .card div[style*="1fr 1fr"]:not([style*="1fr 1fr 1fr"]):not([data-keep-grid]),
      .card div[style*="repeat(2,"]:not([data-keep-grid]) {
        grid-template-columns: 1fr !important;
      }
      /* And 3-col grids inside cards become 2-col */
      .card div[style*="1fr 1fr 1fr"]:not([data-bot-actions]):not([data-keep-grid]) {
        grid-template-columns: 1fr 1fr !important;
      }
    }

    @media (max-width: 768px) {
      .toast-container, [data-toast-container] {
        bottom: 110px !important; top: auto !important;
        right: 8px !important; left: 8px !important;
        max-width: calc(100vw - 16px);
      }
    }

    /* Touch optimisations */
    @media (hover: none) and (pointer: coarse) {
      button, a.btn, .btn { min-height: 40px; }
      input[type=checkbox], input[type=radio] { transform: scale(1.2); }
      a, button { -webkit-tap-highlight-color: oklch(0.72 0.16 235 / 0.25); }
      /* Larger tap targets for compact buttons */
      .btn-sm { min-height: 32px; padding: 6px 12px; }
      /* Disable hover transforms — feels janky on touch */
      .btn:hover, .kpi:hover { transform: none; }
    }

    /* Compat: hide-on-mobile */
    @media (max-width: 900px) { .hide-on-mobile { display: none !important; } }

    /* Prevent horizontal page scroll on any device */
    html, body { overflow-x: hidden; max-width: 100vw; }
    .main { min-width: 0; max-width: 100vw; }
    .content > div, .content > div > div { min-width: 0; }

    /* ── Light theme table override ─────────────────────────── */
    html[data-theme="light"] thead th { background: oklch(0.95 0.006 250 / 0.95); }
    html[data-theme="light"] ::-webkit-scrollbar-thumb { background: oklch(0.80 0.010 250); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Error boundary (prevents blank page on render crashes) ── */
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { err: null }; }
      static getDerivedStateFromError(e) { return { err: e }; }
      render() {
        if (this.state.err) return (
          <div style={{padding:32,textAlign:'center',color:'#ef4444'}}>
            <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
            <div style={{fontWeight:700,marginBottom:8}}>Something went wrong</div>
            <div style={{fontSize:13,color:'var(--muted)',marginBottom:16,fontFamily:'JetBrains Mono'}}>{String(this.state.err?.message || this.state.err)}</div>
            <button className="btn btn-blue" onClick={()=>this.setState({err:null})}>Retry</button>
          </div>
        );
        return this.props.children;
      }
    }

    /* ── Format helpers ──────────────────────────────────────── */
    const f$ = n =>
      n == null ? '—' : (n < 0 ? '-' : '') + '$' +
      Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2});

    const fpct = n =>
      n == null ? '—' : (n >= 0 ? '+' : '') + n.toFixed(2) + '%';

    const clr = (n, pos='var(--up)', neg='var(--down)', zero='var(--ink-3)') =>
      n == null ? zero : n > 0 ? pos : n < 0 ? neg : zero;

    const timeAgo = (ts) => {
      if (!ts) return '—';
      const d = new Date(ts);
      if (isNaN(d)) return String(ts).substring(11,19) || ts;
      const sec = Math.floor((Date.now() - d.getTime()) / 1000);
      if (sec < 60)  return `${sec}s ago`;
      if (sec < 3600) return `${Math.floor(sec/60)}m ago`;
      if (sec < 86400) return `${Math.floor(sec/3600)}h ago`;
      return d.toLocaleDateString();
    };

    /* ── Dot ─────────────────────────────────────────────────── */
    const Dot = ({ on, pulse }) => (
      <span style={{
        display: 'inline-block', width: 8, height: 8, borderRadius: '50%', flexShrink: 0,
        background: on ? 'var(--up)' : 'var(--down)',
        boxShadow: `0 0 6px ${on ? 'var(--up)' : 'var(--down)'}`,
        ...(pulse && on ? { animation: 'pulse-dot 1.6s ease-in-out infinite' } : {}),
      }} />
    );

    /* ── Badge ───────────────────────────────────────────────── */
    const Badge = ({ children, color = 'var(--ink-3)', bg }) => (
      <span className="badge" style={{
        color,
        background: bg || (color.startsWith('var') ? 'var(--bg-2)' : color + '1a'),
      }}>{children}</span>
    );

    /* ── Regime badge ────────────────────────────────────────── */
    const Regime = ({ v }) => {
      const map = {
        bullish:  ['var(--up)','Bullish'],
        trending: ['var(--accent)','Trending'],
        bearish:  ['var(--down)','Bearish'],
        choppy:   ['var(--warn)','Choppy'],
        unknown:  ['var(--ink-3)','Unknown'],
      };
      const [c, label] = map[v?.toLowerCase()] || map.unknown;
      return <Badge color={c}>{label}</Badge>;
    };

    /* ── Win-rate bar ────────────────────────────────────────── */
    const WinBar = ({ wins = 0, losses = 0 }) => {
      const total = wins + losses;
      const pct   = total ? Math.round(wins / total * 100) : 0;
      return (
        <div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:11,fontFamily:'var(--font-mono)'}}>
            <span style={{color:'var(--up)'}}>{wins}W</span>
            <span style={{color:'var(--ink-2)',fontWeight:700}}>{pct}%</span>
            <span style={{color:'var(--down)'}}>{losses}L</span>
          </div>
          <div className="progress up" style={{height:5}}>
            <span style={{width:`${pct}%`}} />
          </div>
        </div>
      );
    };

    /* ── Confidence bar ──────────────────────────────────────── */
    const ConfBar = ({ value = 0 }) => {
      const c = value >= 75 ? 'var(--up)' : value >= 55 ? 'var(--accent)' : 'var(--warn)';
      return (
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{flex:1,height:4,background:'var(--bg-2)',borderRadius:2,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${Math.min(value,100)}%`,background:c,borderRadius:2,transition:'width .5s'}} />
          </div>
          <span style={{fontSize:12,fontWeight:700,fontFamily:'var(--font-mono)',color:c,width:28,textAlign:'right'}}>{value}</span>
        </div>
      );
    };

    /* ── Metric card ─────────────────────────────────────────── */
    const MetCard = ({ label, value, sub, color, children }) => (
      <div className="kpi"
        onMouseEnter={e=>{ e.currentTarget.style.borderColor='var(--line)'; e.currentTarget.style.transform='translateY(-2px)'; }}
        onMouseLeave={e=>{ e.currentTarget.style.borderColor=''; e.currentTarget.style.transform=''; }}
      >
        <div className="lbl">{label}</div>
        <div className="val" style={{fontSize:22,color:color||'var(--ink)'}}>{value}</div>
        {sub   && <div className="sub">{sub}</div>}
        {children && <div style={{marginTop:8}}>{children}</div>}
      </div>
    );

    /* ── P&L chart ───────────────────────────────────────────── */
    const PnLChart = ({ curve }) => {
      const ref   = useRef(null);
      const chart = useRef(null);
      const dep   = JSON.stringify(curve);

      useEffect(() => {
        if (!ref.current || !window.Chart) return;
        chart.current?.destroy();

        const labels = curve?.length ? curve.map(p => p.time) : ['09:30','—'];
        const vals   = curve?.length ? curve.map(p => p.pnl)  : [0, 0];
        const last   = vals[vals.length - 1] ?? 0;
        const c      = last >= 0 ? 'oklch(0.74 0.16 152)' : 'oklch(0.68 0.20 25)';
        const cBg    = last >= 0 ? 'oklch(0.74 0.16 152 / 0.12)' : 'oklch(0.68 0.20 25 / 0.12)';

        chart.current = new window.Chart(ref.current.getContext('2d'), {
          type: 'line',
          data: {
            labels,
            datasets: [{
              data: vals,
              borderColor: c,
              backgroundColor: cBg,
              fill: true,
              tension: 0.4,
              pointRadius: vals.length > 20 ? 0 : 4,
              pointHoverRadius: 5,
              pointBackgroundColor: c,
              borderWidth: 2,
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: 'oklch(0.20 0.014 250)',
                borderColor: 'oklch(0.24 0.014 250)',
                borderWidth: 1,
                titleColor: 'oklch(0.58 0.014 250)',
                bodyColor: c,
                callbacks: { label: ctx => ' ' + f$(ctx.raw) }
              }
            },
            scales: {
              x: {
                grid: { color: 'oklch(0.24 0.014 250 / 0.6)' },
                ticks: { color: 'oklch(0.58 0.014 250)', font: { size: 10, family: 'JetBrains Mono' }, maxTicksLimit: 8 }
              },
              y: {
                grid: { color: 'oklch(0.24 0.014 250 / 0.6)' },
                ticks: {
                  color: 'oklch(0.58 0.014 250)',
                  font: { size: 10, family: 'JetBrains Mono' },
                  callback: v => '$' + v.toFixed(0)
                },
                grace: '10%',
              }
            }
          }
        });
        return () => chart.current?.destroy();
      }, [dep]);

      return (
        <div style={{ height: 230, position: 'relative' }}>
          <canvas ref={ref} />
          {(!curve || curve.length === 0) && (
            <div style={{
              position:'absolute', inset:0, display:'flex', alignItems:'center',
              justifyContent:'center', color:'var(--ink-3)', fontSize:13, pointerEvents:'none'
            }}>No completed trades yet today</div>
          )}
        </div>
      );
    };

    /* ── Positions card ──────────────────────────────────────── */
    const Positions = ({ rows = [], equity = 0 }) => (
      <div className="card" style={{height:'100%'}}>
        <div className="card-hdr">
          <span className="card-title">Open Positions</span>
          <span className="pill accent">{rows.length} / 3</span>
        </div>
        {rows.length === 0
          ? <div className="empty">No open positions</div>
          : rows.map((p, i) => {
            const posValue = (p.curr || p.entry || 0) * (p.qty || 0);
            const equityPct = equity > 0 ? (posValue / equity * 100) : null;
            const isUp = (p.pct || 0) >= 0;
            return (
              <div key={i} className="pos-row">
                <div style={{display:'flex',alignItems:'center',gap:10,minWidth:0}}>
                  <div className="tick-glyph">{(p.sym||'?').slice(0,3)}</div>
                  <div style={{minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,color:'var(--ink)'}}>{p.sym}</div>
                    <div style={{fontSize:11,color:'var(--ink-3)',fontFamily:'var(--font-mono)',marginTop:1}}>
                      {p.qty} × {f$(p.entry)} · stop {f$(p.stop)}
                    </div>
                  </div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{fontFamily:'var(--font-mono)',fontWeight:700,fontSize:14,color:clr(p.pct)}}>{fpct(p.pct)}</div>
                  <div style={{fontSize:11,color:'var(--ink-3)',marginTop:2,fontFamily:'var(--font-mono)'}}>{f$(p.curr)}</div>
                  {equityPct != null && <div className="hide-on-mobile" style={{fontSize:10,color:'var(--ink-4)',marginTop:1}}>{equityPct.toFixed(1)}% eq</div>}
                </div>
              </div>
            );
          })
        }
      </div>
    );

    /* ── AI Picks ────────────────────────────────────────────── */
    const Picks = ({ rows = [] }) => (
      <div className="card" style={{height:'100%'}}>
        <div className="card-hdr">
          <span className="card-title">🎯 AI Scanner Picks</span>
          {rows.length > 0 && <Badge color="#10b981">{rows.length} picks</Badge>}
        </div>
        <div style={{maxHeight:290,overflowY:'auto'}}>
          {rows.length === 0
            ? <div className="empty"><div style={{fontSize:22,marginBottom:8}}>⏳</div>Waiting for scanner results…</div>
            : rows.map((p, i) => (
              <div key={i} style={{
                padding:'11px 16px',
                borderBottom:'1px solid rgba(22,36,64,.6)',
                display:'flex', justifyContent:'space-between', alignItems:'center', gap:12,
              }}>
                <div style={{minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:15}}>{p.symbol}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>
                    {p.sector}
                    {p.rel_volume != null && <span style={{color:'#3b82f6',marginLeft:6}}>{p.rel_volume}× vol</span>}
                    {p.pre_market_gap > 0 && <span style={{color:'#f59e0b',marginLeft:6}}>+{p.pre_market_gap}% gap</span>}
                  </div>
                  <div style={{fontSize:11,color:'#94a3b8',marginTop:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:200}}
                    title={p.reason}>{p.reason}</div>
                </div>
                <div style={{flexShrink:0,minWidth:120,textAlign:'right'}}>
                  <ConfBar value={p.confidence} />
                  {p.news_sentiment && (
                    <div style={{marginTop:5}}>
                      <Badge
                        color={p.news_sentiment==='positive'?'#10b981':p.news_sentiment==='negative'?'#ef4444':'#64748b'}
                      >{p.news_sentiment}</Badge>
                    </div>
                  )}
                </div>
              </div>
            ))
          }
        </div>
      </div>
    );

    /* ── Trade history ───────────────────────────────────────── */
    const Trades = ({ rows = [], full, showBroker = false, exportUrl }) => (
      <div className="card" style={{height:'100%'}}>
        <div className="card-hdr">
          <span className="card-title">📋 {full ? 'Full Trade History' : "Today's Trades"}</span>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <Badge color="#64748b">{rows.length}</Badge>
            {exportUrl && (
              <a href={exportUrl} download style={{textDecoration:'none'}}>
                <button className="btn btn-ghost" style={{padding:'3px 9px',fontSize:11}}>⬇ CSV</button>
              </a>
            )}
          </div>
        </div>
        <div style={{overflowX:'auto',maxHeight: full ? 600 : 290, overflowY:'auto'}}>
          <table>
            <thead><tr>
              <th>Time</th><th>Symbol</th><th>Side</th>
              <th className="hide-on-narrow">Qty</th>
              <th>Price</th><th>P&L</th>
              {showBroker && <th className="hide-on-mobile">Broker</th>}
              <th className="hide-on-narrow">Reason</th>
            </tr></thead>
            <tbody>
              {rows.length === 0
                ? <tr><td colSpan={showBroker?8:7}><div className="empty">No trades today</div></td></tr>
                : rows.map((t, i) => {
                  const buy  = t.action?.toLowerCase() === 'buy';
                  const hasPnl = !buy && t.pct != null;
                  const ccy = t.currency === 'INR' ? '₹' : '$';
                  const fPrice = v => v == null ? '—' : ccy + Math.abs(Number(v)).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
                  return (
                    <tr key={i}>
                      <td className="mono" style={{color:'var(--muted)',fontSize:11}} title={String(t.time||'')}>
                        {timeAgo(t.time)}
                      </td>
                      <td style={{fontWeight:700,borderLeft:`3px solid ${buy?'#10b981':'#ef4444'}`}}>{t.sym}</td>
                      <td>
                        <Badge color={buy?'#10b981':'#ef4444'}>{t.action?.toUpperCase()}</Badge>
                      </td>
                      <td className="mono hide-on-narrow">{t.qty||'—'}</td>
                      <td className="mono">{fPrice(t.price)}</td>
                      <td className="mono" style={{color:hasPnl?clr(t.pct):'var(--muted)',fontWeight:hasPnl?700:400}}>
                        {hasPnl ? fpct(t.pct) : '—'}
                      </td>
                      {showBroker && <td className="hide-on-mobile" style={{fontSize:10,color:'var(--muted)'}}>{t.broker||'—'}</td>}
                      <td className="hide-on-narrow" style={{color:'var(--muted)',fontSize:11,maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}
                        title={t.reason}>{t.reason?.substring(0,35)}{t.reason?.length>35?'…':''}</td>
                    </tr>
                  );
                })
              }
            </tbody>
          </table>
        </div>
      </div>
    );

    /* ── Combined trades tab ─────────────────────────────────── */
    const CombinedTradesTab = ({ defaultBroker, lockBroker } = {}) => {
      const [data, setData] = useState(null);
      const [err,  setErr]  = useState(null);
      const [loading, setLoading] = useState(true);
      const [range, setRange] = useState('day');
      const [broker, setBroker] = useState(defaultBroker || 'all');
      const mountedRef = useRef(true);
      useEffect(() => { mountedRef.current = true; return () => { mountedRef.current = false; }; }, []);
      const load = useCallback(() => {
        if (!mountedRef.current) return;
        setLoading(true);
        fetch(`/api/trades/combined?range=${range}&broker=${broker}`)
          .then(r => r.ok ? r.json() : r.json().then(e => Promise.reject(e)))
          .then(d => { if (mountedRef.current) { setData(d); setErr(null); } })
          .catch(e => { if (mountedRef.current) setErr(String(e?.message ?? e ?? 'Failed')); })
          .finally(() => { if (mountedRef.current) setLoading(false); });
      }, [range, broker]);
      useEffect(() => { load(); }, [load]);
      return (
        <div className="fadein">
          <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
            {['day','week','month','all'].map(r => (
              <button key={r} className={`btn ${range===r?'primary':'ghost'}`}
                style={{padding:'4px 12px',fontSize:12}} onClick={() => setRange(r)}>
                {r.charAt(0).toUpperCase()+r.slice(1)}
              </button>
            ))}
            {!lockBroker && (
              <>
                <span style={{color:'var(--ink-4)',fontSize:11,margin:'0 4px'}}>|</span>
                {['all','alpaca','angelone','zerodha','indian'].map(b => (
                  <button key={b} className={`btn ${broker===b?'primary':'ghost'}`}
                    style={{padding:'4px 10px',fontSize:11}} onClick={() => setBroker(b)}>
                    {b}
                  </button>
                ))}
              </>
            )}
            <a href="/api/export/combined.csv" download style={{marginLeft:'auto',textDecoration:'none'}}>
              <button className="btn ghost" style={{padding:'4px 12px',fontSize:12}}>⬇ Export CSV</button>
            </a>
          </div>
          {loading && !data && <div className="empty" style={{padding:40}}>Loading…</div>}
          {err && <div className="empty" style={{padding:20,color:'var(--down)'}}>{err} <button className="btn primary" onClick={load}>↻</button></div>}
          {data && (
            <>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:8,marginBottom:12}}>
                {[
                  ['Total trades', data.summary?.total_trades],
                  ['Closed trades', data.summary?.closed_trades],
                  ['Realized P&L (USD)', data.summary?.realized_pnl_usd != null ? '$'+Number(data.summary.realized_pnl_usd).toFixed(2) : '—'],
                  ['Realized P&L (INR)', data.summary?.realized_pnl_inr != null ? '₹'+Number(data.summary.realized_pnl_inr).toFixed(2) : '—'],
                ].map(([label,val],i) => (
                  <div key={i} style={{background:'var(--bg-input)',borderRadius:8,padding:'10px 12px'}}>
                    <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',fontWeight:700}}>{label}</div>
                    <div className="mono" style={{fontSize:16,fontWeight:700,marginTop:4}}>{val ?? '—'}</div>
                  </div>
                ))}
              </div>
              <Trades rows={data.trades || []} full showBroker />
            </>
          )}
        </div>
      );
    };

    /* ── Activity log ────────────────────────────────────────── */
    const Log = ({ rows = [] }) => {
      const tagClass = (m) => {
        const u = (m||'').toUpperCase();
        if (u.includes('BUY'))  return 'buy';
        if (u.includes('SELL')) return 'sell';
        if (u.includes('SCAN')) return 'scan';
        if (u.includes('WARN') || u.includes('PAUS') || u.includes('ERROR')) return 'warn';
        return 'info';
      };
      const tagLabel = (m) => {
        const u = (m||'').toUpperCase();
        if (u.includes('BUY'))  return 'BUY';
        if (u.includes('SELL')) return 'SELL';
        if (u.includes('SCAN')) return 'SCAN';
        if (u.includes('WARN') || u.includes('PAUS')) return 'WARN';
        if (u.includes('ERROR')) return 'ERR';
        return 'INFO';
      };
      return (
        <div className="card" style={{height:'100%'}}>
          <div className="card-hdr"><span className="card-title">Activity Log</span></div>
          <div className="log">
            {rows.length === 0
              ? <div className="empty">No activity yet</div>
              : rows.map((item, i) => (
                <div key={i} className="log-row">
                  <span style={{color:'var(--ink-4)',fontSize:10}}>{item.t}</span>
                  <span className={`log-tag ${tagClass(item.m)}`}>{tagLabel(item.m)}</span>
                  <span style={{color:'var(--ink-2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.m}</span>
                </div>
              ))
            }
          </div>
        </div>
      );
    };

    /* ── Controls ────────────────────────────────────────────── */
    const Controls = ({ onAction, paused, pauseReason }) => {
      const [busy, setBusy] = useState(null);
      const [msg,  setMsg]  = useState(null);

      const act = async (action) => {
        if (action === 'close_all' && !confirm('Close ALL open positions now?')) return;
        setBusy(action);
        try {
          const r = await fetch('/api/action', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({action}),
          });
          const d = await r.json();
          setMsg({ ok: d.status === 'success', text: d.status === 'success' ? `✓ ${action} done` : d.message });
        } catch {
          setMsg({ ok: false, text: 'Request failed' });
        } finally {
          setBusy(null);
          setTimeout(() => setMsg(null), 3000);
        }
      };

      return (
        <div className="card">
          <div className="card-hdr">
            <span className="card-title">Bot Controls</span>
            <span className={`pill ${paused ? 'warn' : 'up'}`}>
              <span className="dot" style={{background: paused ? 'var(--warn)' : 'var(--up)', width:6, height:6}} />
              {paused ? 'PAUSED' : 'RUNNING'}
            </span>
          </div>
          <div style={{padding:14}}>
            {paused && (
              <div style={{
                background:'var(--warn-soft)', border:'1px solid transparent',
                borderRadius:7, padding:'9px 12px', marginBottom:12,
                color:'var(--warn)', fontSize:12, display:'flex', alignItems:'center', gap:6,
              }}>⚠ {pauseReason || 'Bot is paused'}</div>
            )}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {[
                ['start',     'success',  '▶ Start'],
                ['stop',      'danger',   '⏸ Stop'],
                ['scan',      'primary',  '⌕ Scan'],
                ['close_all', 'danger',   '✕ Close All'],
              ].map(([a, cls, label]) => (
                <button key={a} className={`btn ${cls}`} onClick={() => act(a)}>
                  {busy === a ? <span className="spin" style={{width:12,height:12,border:'2px solid currentColor',borderTopColor:'transparent',borderRadius:'50%',display:'inline-block'}} /> : label}
                </button>
              ))}
            </div>
            {msg && (
              <div style={{
                marginTop:10, padding:'8px 12px', borderRadius:6, fontSize:12,
                background: msg.ok ? 'var(--up-soft)' : 'var(--down-soft)',
                color:       msg.ok ? 'var(--up)'     : 'var(--down)',
              }}>{msg.text}</div>
            )}
          </div>
        </div>
      );
    };

    /* ── Indian Bot Controls ─────────────────────────────────── */
    const IndianBotControls = ({ health }) => {
      const [busy,    setBusy]    = useState(null);
      const [msg,     setMsg]     = useState(null);
      const [alloc,   setAlloc]   = useState(null);
      const [editing, setEditing] = useState(false);
      const [form,    setForm]    = useState({});
      const [botState, setBotState] = useState(null);

      // Status derived from health
      const status = health?.services?.['indian-bot'] || 'unknown';
      const running = status === 'running';
      // Live bot state (market_open, paused, mode) — polled while card is visible
      const marketOpen = botState?.market_open;
      const tradingPaused = !!botState?.trading_paused;
      const pauseReason   = botState?.pause_reason || '';

      useEffect(() => {
        fetch('/api/allocations/zerodha')
          .then(r => r.json())
          .then(d => { setAlloc(d); setForm({
            budget:       d.budget       || '',
            max_positions:d.max_positions|| '',
            stop_pct:     d.stop_pct     || '',
            tp_pct:       d.tp_pct       || '',
          }); })
          .catch(() => {});
        const refresh = () => fetch('/api/indian/state').then(r => r.json()).then(setBotState).catch(() => {});
        refresh();
        const id = setInterval(refresh, 10000);
        return () => clearInterval(id);
      }, []);

      const act = async (action) => {
        if (action === 'indian_start' && !alloc?.auto_trade) {
          setMsg({ ok: false, text: 'Enable auto-trade first (toggle below)' });
          setTimeout(() => setMsg(null), 3000);
          return;
        }
        setBusy(action);
        try {
          const r = await fetch('/api/action', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action }),
          });
          const d = await r.json();
          setMsg({ ok: d.status === 'success',
                   text: d.status === 'success' ? `✓ ${action.replace('indian_','')} done` : (d.message || 'Error') });
        } catch {
          setMsg({ ok: false, text: 'Request failed' });
        } finally {
          setBusy(null);
          setTimeout(() => setMsg(null), 3000);
        }
      };

      const toggleAutoTrade = async () => {
        setBusy('toggle');
        try {
          const r = await fetch('/api/allocations/zerodha/toggle', { method: 'POST' });
          const d = await r.json();
          if (d.ok) setAlloc(prev => ({ ...prev, auto_trade: d.auto_trade }));
        } catch {}
        setBusy(null);
      };

      const saveAlloc = async () => {
        setBusy('save');
        const body = {};
        if (form.budget       !== '') body.budget        = parseFloat(form.budget);
        if (form.max_positions!== '') body.max_positions = parseInt(form.max_positions);
        if (form.stop_pct     !== '') body.stop_pct      = parseFloat(form.stop_pct);
        if (form.tp_pct       !== '') body.tp_pct        = parseFloat(form.tp_pct);
        const manualRisk = ['max_positions','stop_pct','tp_pct']
          .some(k => form[k] !== '' && Number(form[k]) > 0);
        if (manualRisk) body.trading_mode = 'custom';
        try {
          const r = await fetch('/api/allocations/zerodha', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          const d = await r.json();
          if (d.ok) { setAlloc(d.allocation); setEditing(false);
            setMsg({ ok: true, text: '✓ Allocation saved' }); }
          else setMsg({ ok: false, text: d.error || 'Save failed' });
        } catch {
          setMsg({ ok: false, text: 'Request failed' });
        } finally {
          setBusy(null);
          setTimeout(() => setMsg(null), 3000);
        }
      };

      const inp = { background:'rgba(15,23,42,.6)', border:'1px solid rgba(99,179,237,.2)',
                    borderRadius:5, color:'var(--text)', padding:'5px 8px', fontSize:12, width:'100%' };
      const lbl = { fontSize:11, color:'var(--muted)', marginBottom:3 };

      return (
        <div className="card">
          <div className="card-hdr" style={{justifyContent:'space-between'}}>
            <span className="card-title">Indian Bot (Zerodha)</span>
            <span className={`pill ${running ? 'up' : 'down'}`}>
              <Dot on={running} />
              {status.toUpperCase()}
            </span>
          </div>

          <div style={{padding:14}}>
            {/* Start / Stop / Restart row */}
            <div data-bot-actions style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
              {[
                ['indian_start',   'success', '▶ Start'],
                ['indian_stop',    'danger',  '⏸ Stop'],
                ['indian_restart', 'primary', '↺ Restart'],
              ].map(([a, cls, label]) => (
                <button key={a} className={`btn ${cls}`} onClick={() => act(a)}
                        disabled={!!busy} style={{fontSize:12,padding:'7px 4px'}}>
                  {busy === a
                    ? <span className="spin" style={{width:11,height:11,border:'2px solid currentColor',borderTopColor:'transparent',borderRadius:'50%',display:'inline-block'}} />
                    : label}
                </button>
              ))}
            </div>

            {/* Auto-trade toggle */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                         padding:'9px 12px',background:'rgba(15,23,42,.5)',borderRadius:7,marginBottom:12}}>
              <div>
                <div style={{fontSize:12,fontWeight:600}}>Auto-Trade</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>
                  {alloc?.auto_trade
                    ? (tradingPaused
                        ? `Paused — ${pauseReason || 'risk gate triggered'}`
                        : (marketOpen === false
                            ? 'Outside market hours — trading resumes 09:15 IST'
                            : 'Bot will enter trades autonomously'))
                    : 'Bot will not open new positions'}
                </div>
              </div>
              <button onClick={toggleAutoTrade} disabled={busy==='toggle'}
                      className={`btn ${alloc?.auto_trade ? 'success' : 'ghost'}`}
                      style={{minWidth:56,fontSize:12,padding:'5px 12px'}}>
                {busy==='toggle'
                  ? <span className="spin" style={{width:11,height:11,border:'2px solid currentColor',borderTopColor:'transparent',borderRadius:'50%',display:'inline-block'}} />
                  : alloc?.auto_trade ? 'ON' : 'OFF'}
              </button>
            </div>

            {/* Trading Mode selector — 3 preset cards */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:'var(--muted)',fontWeight:600,letterSpacing:'.05em',textTransform:'uppercase',marginBottom:6}}>
                Trading Mode
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
                {[
                  {id:'ruthless',    icon:'🔥', name:'Ruthless',    sub:'High risk · Hunger for profit', color:'#ef4444'},
                  {id:'balanced',    icon:'⚖️', name:'Balanced',    sub:'Medium risk · Steady gains',    color:'#3b82f6'},
                  {id:'slow_gainer', icon:'🐢', name:'Slow Gainer', sub:'Low risk · Sure-shot setups',   color:'#10b981'},
                ].map(m => {
                  const active = (alloc?.trading_mode || 'balanced') === m.id;
                  return (
                    <button key={m.id} disabled={busy==='mode_'+m.id}
                      onClick={async () => {
                        setBusy('mode_'+m.id);
                        try {
                          const r = await fetch('/api/allocations/zerodha', {
                            method:'POST', headers:{'Content-Type':'application/json'},
                            body: JSON.stringify({ trading_mode: m.id }),
                          });
                          const d = await r.json();
                          if (d.ok) {
                            setAlloc(d.allocation);
                            setMsg({ok:true, text:`✓ Switched to ${m.name}`});
                          } else {
                            setMsg({ok:false, text:d.error || 'Mode change failed'});
                          }
                        } catch { setMsg({ok:false, text:'Request failed'}); }
                        finally { setBusy(null); setTimeout(()=>setMsg(null), 3000); }
                      }}
                      style={{
                        padding:'10px 6px',
                        background: active ? `${m.color}22` : 'rgba(15,23,42,.5)',
                        border: `1.5px solid ${active ? m.color : 'rgba(99,179,237,.15)'}`,
                        borderRadius:7, cursor:'pointer', textAlign:'center',
                        transition:'all .15s', color: active ? m.color : 'var(--text)',
                      }}>
                      <div style={{fontSize:16,marginBottom:3}}>{m.icon}</div>
                      <div style={{fontSize:11,fontWeight:700}}>{m.name}</div>
                      <div style={{fontSize:9,color:'var(--muted)',marginTop:2,lineHeight:1.2}}>{m.sub}</div>
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Allocation summary / edit */}
            {alloc && !editing && (
              <div style={{fontSize:12,color:'var(--muted)',marginBottom:10,
                           display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}}>
                <span>Budget: <b style={{color:'var(--text)'}}>
                  {alloc.budget > 0 ? '₹'+Number(alloc.budget).toLocaleString('en-IN') : 'account default'}
                </b></span>
                <span>Max pos: <b style={{color:'var(--text)'}}>
                  {alloc.max_positions > 0 ? alloc.max_positions : 'bot default'}
                </b></span>
                <span>Stop: <b style={{color:'var(--text)'}}>
                  {alloc.stop_pct > 0 ? alloc.stop_pct+'%' : 'bot default'}
                </b></span>
                <span>TP: <b style={{color:'var(--text)'}}>
                  {alloc.tp_pct > 0 ? alloc.tp_pct+'%' : 'bot default'}
                </b></span>
              </div>
            )}

            {!editing && (
              <button className="btn ghost" style={{width:'100%',fontSize:11,padding:'5px 0'}}
                      onClick={() => setEditing(true)}>
                Edit Allocation
              </button>
            )}

            {editing && (
              <div style={{background:'var(--bg-2)',borderRadius:7,padding:12,marginBottom:8}}>
                <div style={{fontSize:12,fontWeight:600,marginBottom:10,color:'var(--accent)'}}>
                  Fund Allocation — Zerodha
                </div>
                <div data-allocation-grid style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
                  <div>
                    <div style={lbl}>Budget (₹) — 0 = no cap</div>
                    <input style={inp} type="number" min="0" value={form.budget}
                           onChange={e => setForm(f => ({...f, budget: e.target.value}))} />
                  </div>
                  <div>
                    <div style={lbl}>Max Positions — 0 = bot default</div>
                    <input style={inp} type="number" min="0" value={form.max_positions}
                           onChange={e => setForm(f => ({...f, max_positions: e.target.value}))} />
                  </div>
                  <div>
                    <div style={lbl}>Stop Loss % — 0 = bot default</div>
                    <input style={inp} type="number" min="0" step="0.1" value={form.stop_pct}
                           onChange={e => setForm(f => ({...f, stop_pct: e.target.value}))} />
                  </div>
                  <div>
                    <div style={lbl}>Take Profit % — 0 = bot default</div>
                    <input style={inp} type="number" min="0" step="0.1" value={form.tp_pct}
                           onChange={e => setForm(f => ({...f, tp_pct: e.target.value}))} />
                  </div>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn success" style={{flex:1,fontSize:12}}
                          onClick={saveAlloc} disabled={busy==='save'}>
                    {busy==='save' ? '…' : '✓ Save'}
                  </button>
                  <button className="btn ghost" style={{flex:1,fontSize:12}}
                          onClick={() => setEditing(false)}>
                    Cancel
                  </button>
                </div>
              </div>
            )}

            {msg && (
              <div style={{marginTop:8,padding:'7px 10px',borderRadius:6,fontSize:12,
                           background: msg.ok?'var(--up-soft)':'var(--down-soft)',
                           color:       msg.ok?'var(--up)':'var(--down)'}}>
                {msg.text}
              </div>
            )}
          </div>
        </div>
      );
    };

    /* ── System health ───────────────────────────────────────── */
    const Health = ({ health }) => {
      const svcs = [
        { key: 'trading-bot', icon: '⬡', label: 'Trading Bot' },
        { key: 'scanner',     icon: '⌕', label: 'AI Scanner'  },
        { key: 'dashboard',   icon: '⊞', label: 'Dashboard'   },
      ];
      return (
        <div className="card">
          <div className="card-hdr"><span className="card-title">System Health</span></div>
          {[...svcs, { key: '_ollama', icon: '⬟', label: 'Ollama LLM' }].map(s => {
            const st = s.key === '_ollama'
              ? (health?.ollama === 'online' ? 'running' : health?.ollama || 'unknown')
              : (health?.services?.[s.key] || 'unknown');
            const ok = st === 'running' || st === 'online';
            return (
              <div key={s.key} style={{
                display:'flex', alignItems:'center', justifyContent:'space-between',
                padding:'10px 14px', borderBottom:'1px solid var(--line-soft)',
              }}>
                <span style={{fontSize:13,color:'var(--ink-2)'}}>{s.icon} {s.label}</span>
                <span className={`pill ${ok ? 'up' : 'down'}`}>
                  <Dot on={ok} />
                  {st.toUpperCase()}
                </span>
              </div>
            );
          })}
        </div>
      );
    };

    /* ── Strategy editor ─────────────────────────────────────── */
    const Strategy = ({ params }) => {
      const [editing, setEditing] = useState(false);
      const [form,    setForm]    = useState({});
      const [saved,   setSaved]   = useState(false);

      useEffect(() => { if (params) setForm(params); }, [params]);

      const numDefs = [
        { key:'ema_fast',            label:'EMA Fast',             desc:'Fast EMA period'               },
        { key:'ema_slow',            label:'EMA Slow',             desc:'Slow EMA period'               },
        { key:'rsi_buy_min',         label:'RSI Min',              desc:'Min RSI to enter'              },
        { key:'rsi_buy_max',         label:'RSI Max',              desc:'Max RSI to enter'              },
        { key:'stop_loss_pct',       label:'Stop Loss %',          desc:'Per-trade stop loss'           },
        { key:'take_profit_pct',     label:'Take Profit %',        desc:'Per-trade target'              },
        { key:'partial_tp_pct',      label:'Partial TP %',         desc:'Sell 50% at this gain'         },
        { key:'max_positions',       label:'Max Positions',        desc:'Max concurrent trades'         },
        { key:'budget_per_trade',    label:'Budget / Trade $',     desc:'Dollar size per trade'         },
        { key:'min_confidence',      label:'Min AI Confidence',    desc:'AI score threshold (0-100)'    },
        { key:'daily_loss_limit_pct',label:'Daily Loss Limit %',   desc:'Pause trading after this loss' },
        { key:'vix_pause_threshold', label:'VIX Pause',            desc:'Reduce size above this'        },
        { key:'vix_stop_threshold',  label:'VIX Stop',             desc:'Stop trading above this'       },
        { key:'rel_vol_min',         label:'Min Rel Volume',       desc:'Relative volume threshold'     },
        { key:'max_drawdown_pct',    label:'Max Drawdown %',       desc:'Pause if 7d equity dip exceeds this' },
        { key:'consecutive_loss_pause',     label:'Consec Losses Pause',  desc:'# of losses before cooldown'  },
        { key:'consecutive_loss_cooldown_min', label:'Cooldown Min',     desc:'Pause duration in minutes'   },
        { key:'risk_per_trade_pct',  label:'Risk / Trade %',       desc:'ATR-scaled position sizing'   },
        { key:'max_spread_pct',      label:'Max Spread %',         desc:'Reject if bid-ask too wide'   },
      ];
      const txtDefs = [
        { key:'ollama_model', label:'Ollama Model', desc:'e.g. qwen2.5:3b · llama3.2:1b · mistral:7b' },
      ];

      const save = async () => {
        try {
          const r = await fetch('/api/config', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify(form),
          });
          if (!r.ok) throw new Error(`Save failed (${r.status})`);
          setSaved(true); setEditing(false);
          setTimeout(() => setSaved(false), 3000);
        } catch (e) {
          setSaved(false);
          alert(`Save failed: ${e?.message || e}`);
        }
      };

      return (
        <div className="card fadein">
          <div className="card-hdr">
            <span className="card-title">⚙️ Strategy Parameters</span>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              {saved && <span style={{color:'#10b981',fontSize:12,fontWeight:600}}>✓ Saved</span>}
              {editing
                ? <>
                    <button className="btn ghost" style={{padding:'4px 12px',fontSize:12}} onClick={() => setEditing(false)}>Cancel</button>
                    <button className="btn success" style={{padding:'4px 12px',fontSize:12}} onClick={save}>Save Changes</button>
                  </>
                : <button className="btn primary" style={{padding:'4px 12px',fontSize:12}} onClick={() => setEditing(true)}>Edit</button>
              }
            </div>
          </div>
          <div style={{padding:16, display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))', gap:12}}>
            {numDefs.map(d => (
              <div key={d.key} style={{background:'var(--bg-2)',border:'1px solid var(--line-soft)',borderRadius:8,padding:'12px 14px'}}>
                <div className="eyebrow" style={{marginBottom:7}}>{d.label}</div>
                {editing
                  ? <input type="number" step="any" value={form[d.key] ?? ''}
                      onChange={e => setForm(f => ({...f, [d.key]: parseFloat(e.target.value)}))} />
                  : <div style={{fontSize:20,fontWeight:700,fontFamily:'var(--font-mono)',color:'var(--accent)'}}>{params?.[d.key] ?? '—'}</div>
                }
                <div style={{fontSize:11,color:'var(--ink-4)',marginTop:5}}>{d.desc}</div>
              </div>
            ))}
            {txtDefs.map(d => (
              <div key={d.key} style={{background:'var(--bg-2)',border:'1px solid var(--line-soft)',borderRadius:8,padding:'12px 14px'}}>
                <div className="eyebrow" style={{marginBottom:7}}>{d.label}</div>
                {editing
                  ? <input type="text"
                      value={form[d.key] ?? ''}
                      onChange={e => setForm(f => ({...f, [d.key]: e.target.value}))}
                      style={{width:'100%',background:'var(--bg-2)',border:'1px solid var(--line)',borderRadius:6,color:'var(--ink)',padding:'6px 10px',fontSize:13,fontFamily:'var(--font-mono)',outline:'none'}}
                    />
                  : <div style={{fontSize:15,fontWeight:700,fontFamily:'var(--font-mono)',color:'var(--purple)'}}>{params?.[d.key] || <span style={{color:'var(--ink-3)'}}>—</span>}</div>
                }
                <div style={{fontSize:11,color:'var(--ink-4)',marginTop:5}}>{d.desc}</div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const IndianStrategy = ({ broker, health }) => {
      const [alloc, setAlloc] = useState(null);
      const [modes, setModes] = useState([]);
      const [botState, setBotState] = useState(null);
      const [editing, setEditing] = useState(false);
      const [busy, setBusy] = useState(null);
      const [msg, setMsg] = useState(null);
      const [form, setForm] = useState({});

      const label = BROKER_LABELS[broker] || 'Indian Bot';
      const status = health?.services?.['indian-bot'] || 'unknown';
      const running = status === 'running';
      const activeMode = (alloc?.trading_mode || botState?.trading_mode || 'balanced').toLowerCase();
      const botAlloc = botState?.allocation || {};
      const totalBudget = Number(botAlloc.total_budget ?? alloc?.budget ?? 0);
      const perTrade = Number(botAlloc.budget_per_trade ?? 0);
      const maxPos = Number(botAlloc.max_positions ?? alloc?.max_positions ?? 0);
      const stopPct = Number(botAlloc.stop_pct ?? alloc?.stop_pct ?? 0);
      const tpPct = Number(botAlloc.tp_pct ?? alloc?.tp_pct ?? 0);
      const minConf = Number(botAlloc.min_confidence ?? alloc?.min_confidence ?? 0);
      const positionPct = Number(botAlloc.position_pct ?? alloc?.position_pct ?? 0);

      const modeFallback = [
        {id:'ruthless', label:'Ruthless', tagline:'Higher frequency, wider risk', max_positions:5, stop_pct:2.5, tp_pct:5.0, min_confidence:55, position_pct:100},
        {id:'balanced', label:'Balanced', tagline:'Middle risk setting', max_positions:3, stop_pct:1.5, tp_pct:3.0, min_confidence:65, position_pct:80},
        {id:'slow_gainer', label:'Slow Gainer', tagline:'Lower frequency, tighter risk', max_positions:2, stop_pct:1.0, tp_pct:2.0, min_confidence:75, position_pct:60},
        {id:'custom', label:'Custom', tagline:'Manual allocation values'},
      ];
      const modeRows = modes.length ? modes : modeFallback;

      const load = () => {
        fetch(`/api/allocations/${broker}`).then(r => r.json()).then(d => {
          setAlloc(d);
          setForm({
            budget:        d.budget        ?? '',
            max_positions: d.max_positions ?? '',
            stop_pct:      d.stop_pct      ?? '',
            tp_pct:        d.tp_pct        ?? '',
          });
        }).catch(() => {});
        fetch('/api/trading_modes').then(r => r.json()).then(d => setModes(Array.isArray(d) ? d : [])).catch(() => {});
        fetch('/api/indian/state').then(r => r.json()).then(setBotState).catch(() => {});
      };

      useEffect(() => {
        load();
        const id = setInterval(() => {
          fetch('/api/indian/state').then(r => r.json()).then(setBotState).catch(() => {});
        }, 10000);
        return () => clearInterval(id);
      }, [broker]);

      const notify = (ok, text) => {
        setMsg({ok, text});
        setTimeout(() => setMsg(null), 3000);
      };

      const updateAlloc = async (body, done) => {
        setBusy(done || 'save');
        try {
          const r = await fetch(`/api/allocations/${broker}`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify(body),
          });
          const d = await r.json();
          if (d.ok) {
            setAlloc(d.allocation);
            setEditing(false);
            notify(true, 'Saved');
          } else {
            notify(false, d.message || d.error || 'Save failed');
          }
        } catch {
          notify(false, 'Request failed');
        } finally {
          setBusy(null);
        }
      };

      const saveCustom = () => {
        const body = {};
        if (form.budget        !== '') body.budget        = parseFloat(form.budget);
        if (form.max_positions !== '') body.max_positions = parseInt(form.max_positions);
        if (form.stop_pct      !== '') body.stop_pct      = parseFloat(form.stop_pct);
        if (form.tp_pct        !== '') body.tp_pct        = parseFloat(form.tp_pct);
        body.trading_mode = 'custom';
        updateAlloc(body, 'save');
      };

      const fInr = v => {
        const n = Number(v);
        if (!isFinite(n) || n <= 0) return '—';
        return '₹' + n.toLocaleString('en-IN', {maximumFractionDigits:0});
      };
      const Metric = ({label, value, sub}) => (
        <div style={{background:'var(--bg-2)',border:'1px solid var(--line-soft)',borderRadius:8,padding:'12px 14px'}}>
          <div className="eyebrow" style={{marginBottom:7}}>{label}</div>
          <div style={{fontSize:20,fontWeight:700,fontFamily:'var(--font-mono)',color:'var(--accent)'}}>{value}</div>
          {sub && <div style={{fontSize:11,color:'var(--ink-4)',marginTop:5,lineHeight:1.4}}>{sub}</div>}
        </div>
      );
      const Rule = ({title, body}) => (
        <div style={{padding:'13px 14px',borderBottom:'1px solid var(--line-soft)'}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--ink)',marginBottom:4}}>{title}</div>
          <div style={{fontSize:12,color:'var(--ink-3)',lineHeight:1.55}}>{body}</div>
        </div>
      );
      const inputStyle = {
        width:'100%', background:'var(--bg-2)', border:'1px solid var(--line)',
        borderRadius:6, color:'var(--ink)', padding:'7px 10px',
        fontSize:13, fontFamily:'var(--font-mono)', outline:'none',
      };

      return (
